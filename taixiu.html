<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Casino Mini</title>
    <style>
        :root {
            --primary: #ffd700;
            --bg: #0f0c29;
            --gradient: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            --card-bg: rgba(255, 255, 255, 0.05);
            --win: #00ff88;
            --lose: #ff4d4d;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--gradient);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Nav Bar */
        .nav {
            display: flex;
            gap: 8px;
            margin: 20px 0;
            padding: 5px;
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
        }

        .nav button {
            background: transparent;
            border: none;
            color: #aaa;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .nav button.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        /* Tiền tệ */
        #money {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 20px;
            background: rgba(255,215,0,0.1);
            padding: 10px 30px;
            border-radius: 50px;
            border: 1px solid var(--primary);
        }

        /* Container Game */
        .game-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 24px; margin-bottom: 20px; letter-spacing: 2px; }

        .display-area {
            font-size: 60px;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            margin: 20px 0;
        }

        /* Button chung */
        .btn-play {
            background: var(--primary);
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-play:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Style đặc thù cho từng game (đã tối ưu từ code của bạn) */
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-bet { border: none; border-radius: 15px; padding: 15px; cursor: pointer; color: white; transition: 0.2s; }
        .btn-tai { background: linear-gradient(135deg, #00b09b, #96c93d); }
        .btn-xiu { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        
        .baucua-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .bc-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .bc-item.selected { border-color: var(--primary); background: rgba(255,215,0,0.1); }

        /* Hiệu ứng Shake */
        .shaking { animation: crazyShake 0.1s infinite; }
        @keyframes crazyShake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-2px, -1px) rotate(-1deg); }
            100% { transform: translate(2px, 1px) rotate(0deg); }
        }

        .win-animate { color: var(--win) !important; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .hidden { display: none; }

        input[type="number"] {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--primary);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 20px;
            text-align: center;
            width: 80px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="showGame('taixiu')" id="btn-taixiu" class="active">Tài Xỉu</button>
        <button onclick="showGame('baucua')" id="btn-baucua">Bầu Cua</button>
        <button onclick="showGame('xoso')" id="btn-xoso">Số Đề</button>
        <button onclick="showGame('quayso')" id="btn-quayso">Quay Số</button>
    </div>

    <div id="money">💰 1,000</div>

    <div id="taixiu" class="game-container">
        <h1>TÀI XỈU</h1>
        <div id="res-taixiu" class="result-msg">Chọn cửa để đặt cược</div>
        <div class="display-area" id="dice-box">
            <span class="dice-item">⚀</span><span class="dice-item">⚂</span><span class="dice-item">⚅</span>
        </div>
        <div class="controls-grid">
            <button class="btn-bet btn-tai" onclick="playTaiXiu('tai')">TÀI (11-17)</button>
            <button class="btn-bet btn-xiu" onclick="playTaiXiu('xiu')">XỈU (4-10)</button>
        </div>
    </div>

    <div id="baucua" class="game-container hidden">
        <h1>BẦU CUA</h1>
        <div id="res-baucua" class="result-msg">Chọn linh vật</div>
        <div class="display-area" id="baucua-box">
            <span class="bc-dice">🦌</span><span class="bc-dice">🦀</span><span class="bc-dice">🎃</span>
        </div>
        <div class="baucua-grid">
            <div class="bc-item" onclick="selectBC(0)" data-id="0">🦌</div>
            <div class="bc-item" onclick="selectBC(1)" data-id="1">🦀</div>
            <div class="bc-item" onclick="selectBC(2)" data-id="2">🐟</div>
            <div class="bc-item" onclick="selectBC(3)" data-id="3">🐥</div>
            <div class="bc-item" onclick="selectBC(4)" data-id="4">🍤</div>
            <div class="bc-item" onclick="selectBC(5)" data-id="5">🎃</div>
        </div>
        <button class="btn-play" onclick="playBauCua()" style="margin-top:20px">ĐẶT CƯỢC</button>
    </div>

    <div id="xoso" class="game-container hidden">
        <h1>SỐ ĐỀ MIỀN BẮC</h1>
        <div id="res-xoso" class="result-msg">1 ăn 70</div>
        <div class="display-area" id="xoso-box">??</div>
        <input type="number" id="xoso-input" placeholder="00" min="0" max="99">
        <button class="btn-play" onclick="playXoSo()">DÒ KẾT QUẢ</button>
    </div>

    <div id="quayso" class="game-container hidden">
        <h1>SLOT MACHINE</h1>
        <div id="res-quayso" class="result-msg">3 số giống nhau thắng lớn</div>
        <div class="display-area" id="quayso-box">777</div>
        <button class="btn-play" onclick="playQuaySo()">GẠT CẦN</button>
    </div>

    <script>
        let money = 1000;
        const diceEmojis = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
        const baucuaEmojis = ["🦌", "🦀", "🐟", "🐥", "🍤", "🎃"];
        let selectedBauCua = null;

        function updateMoney() {
            const el = document.getElementById('money');
            el.innerHTML = `💰 ${money.toLocaleString()}`;
            if(money <= 0) {
                alert("Bạn đã cháy túi! Casino tặng bạn 500 chip khởi nghiệp.");
                money = 500;
                updateMoney();
            }
        }

        function showGame(gameId) {
            document.querySelectorAll('.game-container').forEach(g => g.classList.add('hidden'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(gameId).classList.remove('hidden');
            document.getElementById('btn-' + gameId).classList.add('active');
        }

        // TÀI XỈU LOGIC
        function playTaiXiu(choice) {
            const box = document.getElementById('dice-box');
            const res = document.getElementById('res-taixiu');
            box.classList.add('shaking');
            res.innerHTML = "Đang lắc...";
            
            setTimeout(() => {
                box.classList.remove('shaking');
                let d = [Math.floor(Math.random()*6), Math.floor(Math.random()*6), Math.floor(Math.random()*6)];
                let total = d[0] + d[1] + d[2] + 3;
                
                const diceItems = box.querySelectorAll('.dice-item');
                d.forEach((val, i) => diceItems[i].innerHTML = diceEmojis[val]);

                let result = total >= 11 ? 'tai' : 'xiu';
                if(choice === result) {
                    money += 100;
                    res.innerHTML = `🎉 THẮNG! TỔNG ${total}`;
                    res.className = "result-msg win-animate";
                } else {
                    money -= 100;
                    res.innerHTML = `❌ THUA! TỔNG ${total}`;
                    res.className = "result-msg";
                }
                updateMoney();
            }, 600);
        }

        // BẦU CUA LOGIC
        function selectBC(id) {
            selectedBauCua = id;
            document.querySelectorAll('.bc-item').forEach(i => i.classList.remove('selected'));
            document.querySelector(`[data-id="${id}"]`).classList.add('selected');
        }

        function playBauCua() {
            if(selectedBauCua === null) return alert("Chọn linh vật đã!");
            const box = document.getElementById('baucua-box');
            const res = document.getElementById('res-baucua');
            box.classList.add('shaking');

            setTimeout(() => {
                box.classList.remove('shaking');
                let results = [Math.floor(Math.random()*6), Math.floor(Math.random()*6), Math.floor(Math.random()*6)];
                const diceItems = box.querySelectorAll('.bc-dice');
                results.forEach((val, i) => diceItems[i].innerHTML = baucuaEmojis[val]);

                let matches = results.filter(x => x === selectedBauCua).length;
                if(matches > 0) {
                    money += matches * 200;
                    res.innerHTML = `🎉 TRÚNG ${matches} CON!`;
                    res.className = "result-msg win-animate";
                } else {
                    money -= 100;
                    res.innerHTML = "❌ KHÔNG TRÚNG";
                    res.className = "result-msg";
                }
                updateMoney();
            }, 600);
        }

        // XỔ SỐ LOGIC
        function playXoSo() {
            const input = document.getElementById('xoso-input').value;
            if(input === "" || input < 0 || input > 99) return alert("Chọn số 00-99");
            let winNum = Math.floor(Math.random()*100);
            let displayNum = winNum.toString().padStart(2, '0');
            document.getElementById('xoso-box').innerHTML = displayNum;
            
            if(parseInt(input) === winNum) {
                money += 7000;
                document.getElementById('res-xoso').innerHTML = "🎉 ĐÚNG RỒI! +7,000";
            } else {
                money -= 100;
                document.getElementById('res-xoso').innerHTML = "❌ TRẬT LÔ RỒI";
            }
            updateMoney();
        }

        // QUAY SỐ LOGIC
        function playQuaySo() {
            const box = document.getElementById('quayso-box');
            let count = 0;
            let timer = setInterval(() => {
                box.innerHTML = Math.floor(Math.random()*1000).toString().padStart(3, '0');
                count++;
                if(count > 20) {
                    clearInterval(timer);
                    let final = box.innerHTML;
                    if(final[0] === final[1] && final[1] === final[2]) {
                        money += 5000;
                        document.getElementById('res-quayso').innerHTML = "💰 JACKPOT X50!";
                    } else {
                        money -= 50;
                        document.getElementById('res-quayso').innerHTML = "Mất 50 chip";
                    }
                    updateMoney();
                }
            }, 50);
        }
    </script>
</body>
</html>

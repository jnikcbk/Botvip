<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch sử vật phẩm đã mua - KaizenMC</title>
<style>
  body {
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
    color:white;
    min-height:100vh;
  }
  header {
    text-align:center;
    padding:40px 20px 20px;
    font-size:2.8rem;
    font-weight:bold;
    background:rgba(2,6,23,0.9);
    border-bottom:3px solid #2563eb;
    text-shadow:0 0 15px #2563eb;
  }
  .container {
    max-width:900px;
    margin:auto;
    padding:50px 20px;
    text-align:center;
  }
  .box {
    background:rgba(17,24,39,0.85);
    backdrop-filter:blur(12px);
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 50px rgba(0,0,0,0.7);
    border:1px solid rgba(37,99,235,0.4);
  }
  h1 {
    color:#60a5fa;
    margin-bottom:30px;
    text-shadow:0 0 10px #60a5fa;
  }
  .msg {
    font-size:1.3rem;
    margin:20px 0;
    color:#9ca3af;
  }
  .purchase-list {
    text-align:left;
    max-height:500px;
    overflow-y:auto;
    padding-right:10px;
  }
  .purchase-item {
    background:#020617;
    padding:18px;
    border-radius:12px;
    margin-bottom:15px;
    border-left:5px solid #22c55e;
    transition:0.3s;
  }
  .purchase-item:hover {
    transform:translateX(8px);
    box-shadow:0 0 20px rgba(34,197,94,0.4);
  }
  .purchase-item h3 {
    margin:0 0 8px;
    color:#22c55e;
    font-size:1.3rem;
  }
  .purchase-item p {
    margin:5px 0;
    color:#cbd5f5;
  }
  .time {
    font-size:0.9rem;
    color:#9ca3af;
  }
  .empty {
    text-align:center;
    color:#9ca3af;
    font-size:1.2rem;
    padding:40px 0;
  }
  .back {
    display:inline-block;
    margin-top:40px;
    padding:14px 35px;
    background:#2563eb;
    border-radius:50px;
    color:white;
    text-decoration:none;
    font-weight:bold;
    font-size:1.1rem;
  }
  .back:hover {
    background:#1d4ed8;
    transform:scale(1.05);
  }
</style>
</head>
<body>

<header>📦 Lịch sử vật phẩm đã mua</header>

<div class="container">
  <div class="box">
    <h1>👤 Vật phẩm bạn đã mua từ Shop KaizenMC</h1>

    <div id="purchaseHistory" class="purchase-list"></div>

    <p id="msg" class="msg"></p>

    <a class="back" href="index.html">⬅ Quay lại trang chủ</a>
  </div>
</div>

<script>
function loadPurchaseHistory() {
  const login = localStorage.getItem("login");
  const username = localStorage.getItem("tk");
  const historyDiv = document.getElementById("purchaseHistory");
  const msgEl = document.getElementById("msg");

  if (login !== "true" || !username) {
    msgEl.innerText = "⚠️ Bạn cần đăng nhập để xem lịch sử mua hàng!";
    historyDiv.innerHTML = "";
    return;
  }

  const purchases = JSON.parse(localStorage.getItem(`purchaseHistory_${username}`)) || [];

  if (purchases.length === 0) {
    historyDiv.innerHTML = '<div class="empty">Bạn chưa mua vật phẩm nào từ shop.</div>';
    msgEl.innerText = "";
    return;
  }

  msgEl.innerText = `Tổng cộng: ${purchases.length} vật phẩm đã mua`;
  historyDiv.innerHTML = "";

  purchases.slice().reverse().forEach(p => {
    historyDiv.innerHTML += `
      <div class="purchase-item">
        <h3>${p.item}</h3>
        <p>Giá: <span style="color:#fbbf24;">-${p.price.toLocaleString('vi-VN')} xu</span></p>
        <p class="time">Mua lúc: ${p.time}</p>
      </div>
    `;
  });
}

// Khởi chạy
loadPurchaseHistory();

// Bảo vệ: Nếu logout hoặc không login thì đẩy về trang chủ
if (localStorage.getItem("login") !== "true") {
  setTimeout(() => {
    window.location.href = "index.html";
  }, 2000);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaizenMC - Chat Thế Giới</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-blue: #00f0ff; --neon-purple: #c300ff; --neon-pink: #ff00aa;
            --border: rgba(255,255,255,0.12); --glass: rgba(15,23,42,0.88);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
        body {
            background:#020617; color:white; min-height:100vh; overflow-x:hidden;
        }

        /* NAVBAR GIỐNG INDEX.HTML */
        .main-nav {
            position:fixed; top:0; left:0; right:0; height:72px;
            background:rgba(2,6,23,0.95); backdrop-filter:blur(25px);
            display:flex; align-items:center; justify-content:space-between;
            padding:0 24px; border-bottom:1px solid var(--border); z-index:999;
        }
        .nav-logo { font-family:'Orbitron',sans-serif; font-size:26px; font-weight:900; color:white; display:flex; align-items:center; gap:10px; text-decoration:none; }
        .nav-logo img { height:42px; border-radius:50%; box-shadow:0 0 20px var(--neon-blue); }
        .nav-links a { color:#cbd5e1; text-decoration:none; font-weight:600; font-size:14px; padding:10px 14px; border-radius:10px; transition:.25s; }
        .nav-links a:hover, .nav-links a.active { background:rgba(0,240,255,0.15); color:var(--neon-blue); }

        .container { padding:110px 20px 90px; max-width:1100px; margin:auto; text-align:center; }

        h1 {
            font-family:'Orbitron',sans-serif; font-size:42px; margin-bottom:25px;
            background:linear-gradient(90deg,#fff,var(--neon-blue),var(--neon-pink));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }

        /* CHAT BOX */
        .chat-box {
            background:var(--glass); border:2px solid var(--border);
            border-radius:24px; height:68vh; overflow-y:auto; padding:25px;
            backdrop-filter:blur(20px); box-shadow:0 0 50px rgba(0,240,255,0.25);
            display:flex; flex-direction:column; gap:14px;
        }
        .message {
            max-width:78%; padding:14px 18px; border-radius:20px; font-size:15.5px;
        }
        .message.sent {
            align-self:flex-end; background:linear-gradient(135deg,var(--neon-blue),#3b82f6);
            color:#000; border-bottom-right-radius:6px;
        }
        .message.received {
            align-self:flex-start; background:rgba(255,255,255,0.08);
            border-left:4px solid var(--neon-pink); color:white;
        }
        .sender { font-size:13px; font-weight:700; margin-bottom:4px; color:var(--neon-blue); }
        .time { font-size:11px; opacity:0.75; margin-top:6px; text-align:right; }

        .input-area {
            background:var(--glass); border:1px solid var(--border);
            border-radius:20px; padding:12px 16px; display:flex; gap:12px;
            margin-top:15px; backdrop-filter:blur(15px);
        }
        .input-area input {
            flex:1; background:rgba(255,255,255,0.08); border:1px solid var(--border);
            border-radius:50px; padding:14px 20px; color:white; font-size:16px;
        }
        .send-btn {
            background:var(--neon-blue); color:#000; border:none;
            width:52px; height:52px; border-radius:50%; font-size:24px; cursor:pointer;
        }

        /* WARNING BOX */
        .login-required {
            background:rgba(255,0,0,0.15); border:2px solid #ff4d4d;
            border-radius:20px; padding:40px; max-width:600px; margin:40px auto;
            color:#ff4d4d; font-size:18px; font-weight:700;
        }
        .login-required a {
            background:#ff4d4d; color:white; padding:12px 30px; border-radius:12px;
            text-decoration:none; font-weight:800; display:inline-block; margin-top:15px;
        }
    </style>
</head>
<body>

<nav class="main-nav">
    <a href="index.html" class="nav-logo">
        <img src="logo-kaizen.png" alt="KaizenMC">
        KAIZEN<span style="color:var(--neon-blue)">MC</span>
    </a>
    <div class="nav-links">
        <a href="index.html">🏠 Trang chủ</a>
        <a href="shop.html">🛒 Shop</a>
        <a href="nap-xu.html">💎 Nạp Xu</a>
        <a href="top-nap-thang.html">🏆 Top nạp</a>
        <a href="luat.html">⚖️ Luật</a>
        <a href="botdiscord.html">🤖 Bot</a>
        <a href="chattg.html" class="active">🌍 Chat Thế Giới</a>
    </div>
</nav>

<div class="container" id="mainContent">
    <!-- Nội dung sẽ được JS thay đổi -->
</div>

<script>
// ==================== FIREBASE ====================
const firebaseConfig = {
    apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
    databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "kaizenmc-web-ba518"
};
firebase.initializeApp(firebaseConfig);
const messagesRef = firebase.database().ref('messages');

// ==================== KIỂM TRA ĐĂNG NHẬP ====================
const username = localStorage.getItem("username");

if (!username) {
    // CHƯA ĐĂNG NHẬP
    document.getElementById("mainContent").innerHTML = `
        <div class="login-required">
            <h2>🔒 BẠN PHẢI ĐĂNG NHẬP MỚI CHAT ĐƯỢC</h2>
            <p>Chỉ thành viên đã đăng nhập mới được tham gia Chat Thế Giới Kaizen.</p>
            <a href="dang-nhap.html">🔑 ĐĂNG NHẬP NGAY</a>
        </div>
    `;
} else {
    // ĐÃ ĐĂNG NHẬP → HIỂN THỊ CHAT
    document.getElementById("mainContent").innerHTML = `
        <h1>🌍 CHAT THẾ GIỚI KAIZEN</h1>
        <div class="chat-box" id="chatContainer"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Nhập tin nhắn..." autocomplete="off">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    `;

    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // Gửi tin nhắn
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        messagesRef.push({
            name: username,           // ← TÊN ĐĂNG NHẬP
            text: text,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        messageInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', e => { if(e.key==='Enter') sendMessage(); });

    // Nhận tin realtime
    messagesRef.orderByChild('timestamp').limitToLast(200).on('child_added', snapshot => {
        const data = snapshot.val();
        const isMine = data.name === username;

        const div = document.createElement('div');
        div.className = `message ${isMine ? 'sent' : 'received'}`;
        div.innerHTML = `
            <div class="sender">${data.name}</div>
            ${data.text}
            <div class="time">${new Date(data.timestamp).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})}</div>
        `;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    });
}

// ==================== FALLING POKÉMON (giống index.html) ====================
const POKEMON_ICONS = [
    'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/25.gif',
    'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/1.gif',
    'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/4.gif',
    'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/150.gif'
];
function createFallingPokemon() {
    const p = document.createElement('img');
    p.src = POKEMON_ICONS[Math.floor(Math.random()*POKEMON_ICONS.length)];
    p.style.cssText = `position:fixed; top:-50px; left:${Math.random()*100}vw; width:${Math.random()*30+25}px; opacity:0.7; z-index:-1; pointer-events:none;`;
    document.body.appendChild(p);
    setTimeout(() => {
        p.style.transition = 'transform 6s linear, opacity 6s';
        p.style.transform = `translateY(120vh) rotate(${Math.random()*720}deg)`;
        p.style.opacity = '0';
    }, 100);
    setTimeout(() => p.remove(), 7000);
}
setInterval(createFallingPokemon, 500);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Thế Giới • Kaizen</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #17212b;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #0f1621;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0088cc, #00a3e0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      color: white;
    }
    .info h2 { font-size: 16px; margin-bottom: 2px; }
    .info p { font-size: 13px; color: #8a8a8a; }
    .chat-container {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: url('https://i.imgur.com/8q7Zx9v.png') repeat;
      background-size: 200px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.4;
      font-size: 15px;
      word-wrap: break-word;
    }
    .message.sent {
      align-self: flex-end;
      background: #248046;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.received {
      align-self: flex-start;
      background: #2b5278;
      color: white;
      border-bottom-left-radius: 4px;
    }
    .sender {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 4px;
      font-weight: bold;
    }
    .time {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }
    .input-area {
      background: #17212b;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid #0f1621;
    }
    .input-area input {
      flex: 1;
      background: #2b2b2b;
      border: none;
      border-radius: 24px;
      padding: 12px 20px;
      color: white;
      font-size: 15px;
      outline: none;
    }
    .input-area input::placeholder { color: #8a8a8a; }
    .send-btn {
      background: #0088cc;
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .send-btn:hover { background: #00a3e0; }
    .send-btn:disabled { background: #444; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="header">
    <div class="avatar">🌍</div>
    <div class="info">
      <h2>Chat Thế Giới Kaizen</h2>
      <p>Realtime • Mọi người đang online...</p>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <!-- Tin nhắn sẽ load realtime -->
  </div>

  <div class="input-area">
    <input type="text" id="nameInput" placeholder="Tên bạn..." style="width:140px; margin-right:8px;" value="Khách"/>
    <input type="text" id="messageInput" placeholder="Nhập tin nhắn..."/>
    <button class="send-btn" id="sendBtn" disabled>➤</button>
  </div>

  <!-- Firebase SDK v10 compat (ổn định cho web HTML/JS) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <script>
    // Config dự án của bạn
    const firebaseConfig = {
      apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
      databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kaizenmc-web-ba518"
    };

    let db, messagesRef;

    // Khởi tạo Firebase
    try {
      firebase.initializeApp(firebaseConfig);
      db = firebase.database();
      messagesRef = db.ref('messages'); // đường dẫn lưu tin nhắn
      console.log("✅ Firebase kết nối thành công!");
    } catch (error) {
      console.error("❌ LỖI KẾT NỐI FIREBASE:", error);
      alert("Không kết nối được Firebase. Kiểm tra Console (F12) và config.");
    }

    const chatContainer = document.getElementById('chatContainer');
    const nameInput = document.getElementById('nameInput');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // Kích hoạt nút gửi khi có text
    messageInput.addEventListener('input', () => {
      sendBtn.disabled = !messageInput.value.trim();
    });

    // Hàm gửi tin nhắn
    function sendMessage() {
      if (!messagesRef) {
        alert("Chưa kết nối Firebase!");
        return;
      }

      const name = nameInput.value.trim() || "Khách";
      const text = messageInput.value.trim();
      if (!text) return;

      console.log("Gửi tin:", { name, text });

      messagesRef.push({
        name: name,
        text: text,
        timestamp: firebase.database.ServerValue.TIMESTAMP
      }).then(() => {
        console.log("Gửi OK!");
        messageInput.value = '';
        sendBtn.disabled = true;
      }).catch(err => {
        console.error("Lỗi gửi:", err);
        alert("Gửi thất bại: " + (err.message || "Permission denied? Kiểm tra Rules!"));
      });
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });

    // Lắng nghe tin nhắn mới (realtime)
    if (messagesRef) {
      messagesRef.orderByChild('timestamp').limitToLast(150).on('child_added', snapshot => {
        const data = snapshot.val();
        if (!data || !data.text) return;

        const isSent = data.name === (nameInput.value.trim() || "Khách");

        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isSent ? 'sent' : 'received'}`;
        msgDiv.innerHTML = `
          <div class="sender">${data.name || 'Ẩn danh'}</div>
          ${data.text}
          <div class="time">${formatTime(data.timestamp)}</div>
        `;

        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }, err => {
        console.error("Lỗi lắng nghe realtime:", err);
        alert("Lỗi realtime: " + err.message);
      });
    }

    function formatTime(ts) {
      if (!ts) return '--:--';
      const d = new Date(ts);
      return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }

    // Focus input khi load
    messageInput.focus();
    console.log("Chat app loaded! Thử gửi tin nhắn xem...");
  </script>

</body>
</html>

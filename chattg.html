<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaizenMC - Web Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --ai-green: #10b981;
            --bg-dark: #0f172a;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg-dark); color: white;
            height: 100vh; display: flex; flex-direction: column;
        }

        /* --- HỆ THỐNG NAVIGATION TABS --- */
        nav {
            background: rgba(30, 41, 59, 0.9);
            padding: 10px; display: flex; justify-content: center;
            gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            background: none; border: none; color: #94a3b8;
            padding: 10px 20px; cursor: pointer; font-weight: 600;
            transition: 0.3s; border-radius: 8px;
        }

        .tab-btn.active {
            background: var(--primary); color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .page-content { display: none; padding: 20px; flex: 1; overflow-y: auto; }
        .page-content.active { display: block; }

        /* --- GIAO DIỆN CHAT ĐÃ FIX LỖI --- */
        #chat-container {
            max-width: 600px; margin: 0 auto; height: 80vh;
            display: flex; flex-direction: column; background: rgba(0,0,0,0.2);
            border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
        }

        #chatBox {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
        }

        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; animation: pop 0.2s ease; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: rgba(255,255,255,0.1); color: #f1f5f9; border-bottom-left-radius: 2px; }

        /* Style đặc biệt cho Bot AI */
        .bot-msg {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(16, 185, 129, 0.05) 100%) !important;
            border-left: 4px solid var(--ai-green) !important;
            width: 90% !important; height: auto !important; display: block !important;
        }
        .bot-badge { background: var(--ai-green); font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 900; }

        .input-box { padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.3); }
        .input-box input { flex: 1; background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 10px; color: white; outline: none; }
        .input-box button { background: var(--primary); border: none; padding: 0 20px; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }

        /* MODAL 3D */
        #profileModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        #card { width: 300px; background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #334155; transition: 0.1s; transform-style: preserve-3d; }

        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <nav>
        <button class="tab-btn active" onclick="openTab('home')">TRANG CHỦ</button>
        <button class="tab-btn" onclick="openTab('news')">TIN TỨC</button>
        <button class="tab-btn" onclick="openTab('chat')">PHÒNG CHAT</button>
    </nav>

    <div id="home" class="page-content active">
        <h1>Chào mừng tới KaizenMC</h1>
        <p>Đây là giao diện trang chủ của sếp. Sếp có thể thêm nội dung ở đây.</p>
    </div>

    <div id="news" class="page-content">
        <h2>Bản tin Server</h2>
        <p>Cập nhật các sự kiện mới nhất tại đây...</p>
    </div>

    <div id="chat" class="page-content">
        <div id="chat-container">
            <div id="chatBox"></div>
            <div class="input-box">
                <input type="text" id="chatInput" placeholder="Nhập tin nhắn hoặc /help...">
                <button onclick="sendMsg()">GỬI</button>
            </div>
        </div>
    </div>

    <div id="profileModal" onclick="closeCard()">
        <div id="card" onclick="event.stopPropagation()">
            <div id="cRank" style="background:var(--primary); padding:4px 12px; border-radius:20px; font-size:12px; margin-bottom:15px; display:inline-block;">THÀNH VIÊN</div>
            <img id="cAvatar" src="" style="width:120px; margin:0 auto 15px; display:block;">
            <h2 id="cName">Tên User</h2>
            <div style="display:flex; justify-content:space-around; margin-top:15px;">
                <span id="cPower">⚡ 0</span>
                <span id="cCoin">💰 0</span>
            </div>
        </div>
    </div>
<div id="news" class="page-content">
    <h2>📰 Tin Tức Server</h2>
    
    <div class="admin-input-area" style="gap:10px; margin-bottom:20px;">
        <input type="text" id="newsInput" placeholder="Chỉ Admin mới đăng được tin tức...">
        <button onclick="postNews()">ĐĂNG TIN</button>
    </div>

    <div id="newsList"></div>
</div>
    <script>
        // CẤU HÌNH FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
            databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kaizenmc-web-ba518"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // LOGIC CHUYỂN TAB
        function openTab(tabId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // HỆ THỐNG CHAT
        const ADMIN_LIST = ["kaizenadmin", "kaizenadmindz", "minhmeo@!"];
        let myName = localStorage.getItem("username") || "Khách_" + Math.floor(Math.random()*999);
        let myColor = localStorage.getItem("userColor") || "#3b82f6";

        if(!localStorage.getItem("username")) localStorage.setItem("username", myName);

        function botSay(text) {
            const box = document.getElementById("chatBox");
            const div = document.createElement("div");
            div.className = "msg other bot-msg";
            div.innerHTML = `<b style="color:#10b981;cursor:pointer;" onclick="showProfile('KaizenAI','#10b981')"><span class="bot-badge">AI</span> KaizenAI</b><div style="margin-top:5px;color:white;">${text}</div>`;
            box.appendChild(div);
            box.scrollTo({top: box.scrollHeight, behavior:'smooth'});
        }

        async function sendMsg() {
            const input = document.getElementById("chatInput");
            const val = input.value.trim();
            if(!val) return;

            if(val.startsWith("/")) {
                input.value = "";
                if(val === "/help") botSay("Lệnh hiện có: /poke [tên], /dice, /clear, /nick [tên]");
                else if(val === "/clear") document.getElementById("chatBox").innerHTML = "";
                else if(val === "/dice") {
                    const n = Math.floor(Math.random()*6)+1;
                    db.ref("global_chat").push({user:myName, text:`🎲 Đã đổ: ${n} điểm`, color:myColor, time:Date.now()});
                }
                return;
            }

            db.ref("global_chat").push({user:myName, text:val, color:myColor, time:Date.now()});
            input.value = "";
        }

        db.ref("global_chat").limitToLast(30).on("value", snap => {
            const box = document.getElementById("chatBox");
            box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const isAdmin = ADMIN_LIST.includes(d.user);
                const div = document.createElement("div");
                div.className = `msg ${d.user === myName ? 'me' : 'other'}`;
                div.innerHTML = `<b style="color:${isAdmin?'#ff4757':d.color};cursor:pointer;" onclick="showProfile('${d.user}','${d.color}')">${isAdmin?'[AD] ':''}${d.user}</b><br>${d.text}`;
                box.appendChild(div);
            });
            box.scrollTo({top: box.scrollHeight});
        });

        // PROFILE & 3D
        function showProfile(name, color) {
            document.getElementById("cName").innerText = name;
            document.getElementById("cName").style.color = color;
            document.getElementById("cAvatar").src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${name}`;
            document.getElementById("profileModal").style.display = "flex";
        }
        function closeCard() { document.getElementById("profileModal").style.display = "none"; }
        
        const card = document.getElementById("card");
        document.getElementById("profileModal").onmousemove = (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 15;
            let y = (window.innerHeight / 2 - e.pageY) / 15;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        };

        document.getElementById("chatInput").addEventListener("keypress", (e) => { if(e.key === "Enter") sendMsg(); });
        const ADMIN_LIST = ["kaizenadmin", "kaizenadmindz", "minhmeo@!"];
let myName = localStorage.getItem("username") || "Khách";

// KIỂM TRA QUYỀN: Nếu là Admin thì mới cho hiện khung nhập tin
const isAdmin = ADMIN_LIST.includes(myName);

// Tự động ẩn khung nhập nếu không phải Admin
document.addEventListener("DOMContentLoaded", () => {
    const adminOnlyInputs = document.querySelectorAll(".admin-input-area");
    adminOnlyInputs.forEach(el => {
        el.style.display = isAdmin ? "flex" : "none";
    });
});
    </script>
</body>
</html>

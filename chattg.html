<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaizenMC - Chat Thế Giới</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --bg-dark: #020617;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Chặn cuộn cả trang để tập trung vào chat */
        }

        /* Navigation Bar - Sửa lỗi tràn Menu trên điện thoại */
        .nav-bar {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #334155;
            overflow-x: auto; /* Cho phép vuốt ngang menu trên đt */
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .nav-bar::-webkit-scrollbar { display: none; } /* Ẩn thanh cuộn menu */

        .nav-bar a {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-bar a.active {
            background: var(--primary);
            color: white;
        }

        /* Chat Layout - Tự co giãn theo màn hình */
        .chat-wrapper {
            flex: 1; /* Chiếm toàn bộ không gian còn lại */
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-left: 1px solid #334155;
            border-right: 1px solid #334155;
            overflow: hidden;
        }

        .chat-header {
            padding: 12px 20px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #22c55e;
            margin-right: 5px;
        }

        /* Messages Area - Sửa lỗi tràn chữ */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: radial-gradient(#334155 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .msg {
            max-width: 85%; /* Giới hạn độ rộng tin nhắn */
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 14.5px;
            line-height: 1.4;
            word-wrap: break-word; /* Tự xuống dòng nếu từ quá dài */
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg.other {
            background: #0f172a;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg.me {
            background: var(--primary);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .msg b {
            display: block;
            font-size: 11px;
            margin-bottom: 3px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        /* Input Area - Tối ưu cho bàn phím điện thoại */
        .input-area {
            padding: 15px;
            background: #1e293b;
            display: flex;
            gap: 8px;
            border-top: 1px solid #334155;
        }

        #chatInput {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px 15px;
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 16px; /* Chống tự động zoom trên iPhone */
        }

        .send-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .chat-wrapper { border: none; }
            .msg { max-width: 90%; }
            .nav-bar a { padding: 6px 12px; font-size: 13px; }
        }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html">🏠 Trang chủ</a>
    <a href="shop.html">🛒 Shop</a>
    <a href="nap-xu.html">💳 Nạp Thẻ</a>
    <a href="chattg.html" class="active">🌍 Chat Thế Giới</a>
    <a href="top.html">🏆 Đua Top</a>
</nav>

<div class="chat-wrapper">
    <div class="chat-header">
        <div><span class="status-dot"></span> <b style="font-size: 14px;">GLOBAL CHAT</b></div>
        <small id="userCount" style="color: var(--text-dim); font-size: 11px;">Kết nối tốt</small>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="chatInput" placeholder="Nhập tin nhắn..." autocomplete="off">
        <button class="send-btn" onclick="sendMsg()">Gửi</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
        databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kaizenmc-web-ba518"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const myName = localStorage.getItem("username") || "Khách_" + Math.floor(Math.random()*999);

    function sendMsg() {
        const input = document.getElementById("chatInput");
        const val = input.value.trim();
        if(!val) return;

        db.ref("global_chat").push({
            user: myName,
            text: val,
            time: Date.now()
        });

        input.value = "";
    }

    document.getElementById("chatInput").addEventListener("keypress", (e) => {
        if(e.key === "Enter") sendMsg();
    });

    db.ref("global_chat").limitToLast(40).on("value", snap => {
        const box = document.getElementById("chatBox");
        box.innerHTML = "";
        
        snap.forEach(child => {
            const data = child.val();
            const isMe = data.user === myName;
            
            const div = document.createElement("div");
            div.className = `msg ${isMe ? 'me' : 'other'}`;
            div.innerHTML = `<b>${data.user}</b> ${data.text}`;
            box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
    });
</script>

</body>
</html>

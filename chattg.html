<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaizenMC - Chat Thế Giới</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
   /* GALAXY CARD */
.poke-card-3d{
    width:340px;
    display:flex;
    gap:14px;
    align-items:center;
    padding:16px;

    border-radius:18px;

    background:
    radial-gradient(circle at 20% 30%, rgba(0,240,255,0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(195,0,255,0.2), transparent 40%),
    linear-gradient(135deg,#020617,#0f172a);

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 20px 60px rgba(0,0,0,0.8),
    inset 0 0 40px rgba(0,240,255,0.15);

    transform-style:preserve-3d;
    perspective:1200px;

    transition:transform .2s ease, box-shadow .2s ease;

    position:relative;
    overflow:hidden;
}

/* ánh sáng hologram */
.poke-card-3d::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.15),
        transparent
    );
    opacity:0;
    transition:opacity .3s;
}

.poke-card-3d:hover::before{
    opacity:1;
}

/* pokemon image */
.poke-art{
    width:110px;
    height:110px;
    object-fit:contain;
    flex-shrink:0;

    transform:translateZ(40px);

    filter:
    drop-shadow(0 0 15px rgba(0,240,255,0.6))
    drop-shadow(0 0 30px rgba(195,0,255,0.4));
}

/* info */
.poke-info{
    flex:1;
    transform:translateZ(30px);
}

.poke-name{
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:20px;

    background:linear-gradient(90deg,#fff,#00f0ff,#c300ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.type-badges{
    display:flex;
    gap:6px;
    margin:8px 0;
}

.type{
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(6px);
}

/* HP bar */
.hp-bar{
    height:8px;
    background:rgba(255,255,255,0.08);
    border-radius:999px;
    overflow:hidden;
}

.hp-fill{
    height:100%;
    background:linear-gradient(90deg,#00f0ff,#c300ff);
    box-shadow:0 0 10px #00f0ff;
}

/* subtle floating */
@keyframes cardFloat{
    0%{ transform: rotateY(-8deg) rotateX(4deg) translateY(0px); }
    100%{ transform: rotateY(8deg) rotateX(-4deg) translateY(-10px); }
}
@keyframes cardFloat{
    0%{
        transform:rotateY(-8deg) rotateX(4deg) translateY(0px);
    }
    100%{
        transform:rotateY(8deg) rotateX(-4deg) translateY(-10px);
    }
}
        @keyframes pulseGlow {
    from { box-shadow: 0 0 15px rgba(0,240,255,0.3); }
    to   { box-shadow: 0 0 35px rgba(0,240,255,0.7); }
}

/* animation cho /me */
@keyframes glowPulse {
    from { box-shadow: 0 0 10px rgba(195,0,255,0.3); }
    to   { box-shadow: 0 0 30px rgba(195,0,255,0.7); }
}
        /* CSS THẺ BÀI POKÉMON 3D (khi bot trả lời /poke) */
.poke-card-3d {
    border: 3px solid var(--neon-blue);
    border-radius: 16px;
    padding: 16px;
    background: linear-gradient(135deg, rgba(0,240,255,0.12), rgba(195,0,255,0.08));
    box-shadow: 
        0 10px 30px rgba(0,240,255,0.3),
        inset 0 0 20px rgba(0,240,255,0.15);
    max-width: 90%;
    margin: 8px auto;
    text-align: left;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}

.poke-card-3d:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 
        0 20px 50px rgba(0,240,255,0.5),
        inset 0 0 30px rgba(0,240,255,0.25);
}

.poke-card-3d::before {
    content: "";
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.15) 0%, transparent 60%);
    pointer-events: none;
    animation: shine 6s infinite linear;
}

@keyframes shine {
    0% { transform: translateX(-100%) translateY(-100%); }
    50% { transform: translateX(100%) translateY(100%); }
    100% { transform: translateX(-100%) translateY(-100%); }
}

.poke-card-3d img {
    width: 96px;
    height: 96px;
    border-radius: 12px;
    float: left;
    margin-right: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.6), 0 0 15px var(--neon-blue);
    image-rendering: pixelated; /* Giữ nét pixel cho GIF Pokémon */
}

.poke-card-3d b {
    color: var(--neon-blue);
    text-shadow: 0 0 8px var(--neon-blue);
}

.poke-card-3d small {
    opacity: 0.8;
    font-style: italic;
    color: var(--neon-purple);
    display: block;
    margin-top: 8px;
}
        :root {
            --neon-blue: #00f0ff; --neon-purple: #c300ff; --neon-pink: #ff00aa;
            --border: rgba(255,255,255,0.12); --glass: rgba(15,23,42,0.88);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
        body {
            background:#020617; color:white; min-height:100vh; overflow-x:hidden;
        }

        /* NAVBAR GIỐNG INDEX.HTML */
        .main-nav {
            position:fixed; top:0; left:0; right:0; height:72px;
            background:rgba(2,6,23,0.95); backdrop-filter:blur(25px);
            display:flex; align-items:center; justify-content:space-between;
            padding:0 24px; border-bottom:1px solid var(--border); z-index:999;
        }
        .nav-logo { font-family:'Orbitron',sans-serif; font-size:26px; font-weight:900; color:white; display:flex; align-items:center; gap:10px; text-decoration:none; }
        .nav-logo img { height:42px; border-radius:50%; box-shadow:0 0 20px var(--neon-blue); }
        .nav-links a { color:#cbd5e1; text-decoration:none; font-weight:600; font-size:14px; padding:10px 14px; border-radius:10px; transition:.25s; }
        .nav-links a:hover, .nav-links a.active { background:rgba(0,240,255,0.15); color:var(--neon-blue); }

        .container { padding:110px 20px 90px; max-width:1100px; margin:auto; text-align:center; }

        h1 {
            font-family:'Orbitron',sans-serif; font-size:42px; margin-bottom:25px;
            background:linear-gradient(90deg,#fff,var(--neon-blue),var(--neon-pink));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }

        /* CHAT BOX */
        .chat-box {
            background:var(--glass); border:2px solid var(--border);
            border-radius:24px; height:68vh; overflow-y:auto; padding:25px;
            backdrop-filter:blur(20px); box-shadow:0 0 50px rgba(0,240,255,0.25);
            display:flex; flex-direction:column; gap:14px;
        }
        .message {
            max-width:78%; padding:14px 18px; border-radius:20px; font-size:15.5px;
        }
        .message.sent {
            align-self:flex-end; background:linear-gradient(135deg,var(--neon-blue),#3b82f6);
            color:#000; border-bottom-right-radius:6px;
        }
        .message.received {
            align-self:flex-start; background:rgba(255,255,255,0.08);
            border-left:4px solid var(--neon-pink); color:white;
        }
        .sender { font-size:13px; font-weight:700; margin-bottom:4px; color:var(--neon-blue); }
        .time { font-size:11px; opacity:0.75; margin-top:6px; text-align:right; }

        .input-area {
            background:var(--glass); border:1px solid var(--border);
            border-radius:20px; padding:12px 16px; display:flex; gap:12px;
            margin-top:15px; backdrop-filter:blur(15px);
        }
        .input-area input {
            flex:1; background:rgba(255,255,255,0.08); border:1px solid var(--border);
            border-radius:50px; padding:14px 20px; color:white; font-size:16px;
        }
        .send-btn {
            background:var(--neon-blue); color:#000; border:none;
            width:52px; height:52px; border-radius:50%; font-size:24px; cursor:pointer;
        }

        /* WARNING BOX */
        .login-required {
            background:rgba(255,0,0,0.15); border:2px solid #ff4d4d;
            border-radius:20px; padding:40px; max-width:600px; margin:40px auto;
            color:#ff4d4d; font-size:18px; font-weight:700;
        }
        .login-required a {
            background:#ff4d4d; color:white; padding:12px 30px; border-radius:12px;
            text-decoration:none; font-weight:800; display:inline-block; margin-top:15px;
        }
    </style>
</head>
<body>

<div class="container" id="mainContent">
    <!-- Nội dung sẽ được JS thay đổi -->
</div>

<script>
// ==================== FIREBASE ====================
const firebaseConfig = {
    apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
    databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "kaizenmc-web-ba518"
};
firebase.initializeApp(firebaseConfig);
const messagesRef = firebase.database().ref('messages');

// ==================== LOGIN ====================
const username = localStorage.getItem("username");

if (!username) {
    document.getElementById("mainContent").innerHTML = `
    <div class="login-required">
        <h2>🔒 BẠN PHẢI ĐĂNG NHẬP MỚI CHAT ĐƯỢC</h2>
        <p>Chỉ thành viên đã đăng nhập mới được tham gia Chat.</p>
        <a href="dang-nhap.html">🔑 ĐĂNG NHẬP</a>
    </div>`;
}
else {

document.getElementById("mainContent").innerHTML = `
<h1>🌍 CHAT THẾ GIỚI KAIZEN</h1>
<div class="chat-box" id="chatContainer"></div>

<div class="input-area">
<input id="messageInput" placeholder="Nhập tin nhắn...">
<button class="send-btn" id="sendBtn">➤</button>
</div>
`;

const chatContainer = document.getElementById("chatContainer");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

// BOT REPLY
function botReply(text){
    const div = document.createElement("div");
    div.className = "message received";
    div.innerHTML = `
        <div class="sender">🤖 KaizenBot</div>
        ${text}
        <div class="time">${new Date().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"})}</div>
    `;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

// ================= SEND MESSAGE =================
function sendMessage(){

    const text = messageInput.value.trim();
    if(!text) return;

    // ===== LỆNH BOT =====
    if(text.startsWith("/")){
        const parts = text.split(" ");
        const cmd = parts[0].toLowerCase();
        const args = parts.slice(1).join(" ");

        if(cmd === "/help"){
            botReply(`
            <b>📜 DANH SÁCH LỆNH</b><br><br>
            /help → xem lệnh<br>
            /online → kiểm tra online<br>
            /clear → xóa chat<br>
            /poke pikachu → xem pokemon<br>
            /me nội dung → hành động
            `);
        }

        else if(cmd === "/clear"){
            chatContainer.innerHTML="";
            botReply("✅ Đã xóa chat của bạn.");
        }

        else if(cmd === "/online"){
            messagesRef.once("value",snap=>{
                botReply("🌐 Có khoảng <b>"+snap.numChildren()+"</b> tin nhắn trong server.");
            });
        }

    else if(cmd === "/poke"){

    if(!args){
        botReply("❌ Ví dụ: /poke pikachu");
        return;
    }

    const pokeName = args.trim().toLowerCase();

    botReply(`🔎 Đang tìm Pokémon <b>${pokeName}</b>...`);

    fetch(`https://pokeapi.co/api/v2/pokemon/${encodeURIComponent(pokeName)}`)
    .then(r=>{
        if(!r.ok) throw new Error("notfound");
        return r.json();
    })
    .then(data=>{

        const name = data.name.charAt(0).toUpperCase()+data.name.slice(1);
        const id = data.id;

        const types = data.types.map(t=>t.type.name);
        const typeHTML = types.map(t=>`<span class="type">${t}</span>`).join("");

        const hp = data.stats.find(s=>s.stat.name==="hp").base_stat;

        const sprite =
        data.sprites.other["official-artwork"].front_default ||
        data.sprites.front_default;

        const hpPercent = Math.min(100,Math.round((hp/255)*100));

        botReply(`

<div class="poke-card-3d">

<div class="card-galaxy"></div>

<img class="poke-art" src="${sprite}">

<div class="poke-info">

<div class="poke-name">
${name}
<span class="poke-id">#${id}</span>
</div>

<div class="type-badges">
${typeHTML}
</div>

<div class="poke-stats">

<div class="hp-label">
HP <b>${hp}</b>
</div>

<div class="hp-bar">
<div class="hp-fill" style="width:${hpPercent}%"></div>
</div>

</div>

</div>

</div>

        `);

        setTimeout(enableCard3D,100);

    })
    .catch(()=>{
        botReply(`❌ Không tìm thấy Pokémon "${pokeName}"`);
    });

    messageInput.value='';
    return;
}
        else if(cmd === "/me"){
            botReply(`<i>✨ ${username} ${args}</i>`);
        }

        else{
            botReply("❌ Lệnh không tồn tại. Gõ /help");
        }

        messageInput.value="";
        return;
    }

    // ===== GỬI CHAT THƯỜNG =====
    messagesRef.push({
        name:username,
        text:text,
        timestamp:firebase.database.ServerValue.TIMESTAMP
    });

    messageInput.value="";
}

sendBtn.onclick = sendMessage;
messageInput.addEventListener("keypress",e=>{
    if(e.key==="Enter") sendMessage();
});

// ================= REALTIME CHAT =================
messagesRef.orderByChild("timestamp").limitToLast(200).on("child_added",snap=>{

    const data = snap.val();
    const mine = data.name===username;

    const div=document.createElement("div");
    div.className="message "+(mine?"sent":"received");

    div.innerHTML=`
    <div class="sender">${data.name}</div>
    ${data.text}
    <div class="time">${new Date(data.timestamp).toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"})}</div>
    `;

    chatContainer.appendChild(div);
    chatContainer.scrollTop=chatContainer.scrollHeight;
});

}
    function enableCard3D(){

document.querySelectorAll(".poke-card-3d").forEach(card=>{

card.addEventListener("mousemove",e=>{

const rect=card.getBoundingClientRect();

const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

const centerX=rect.width/2;
const centerY=rect.height/2;

const rotateX=-(y-centerY)/12;
const rotateY=(x-centerX)/12;

card.style.transform=
`rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;

});

card.addEventListener("mouseleave",()=>{
card.style.transform="rotateX(0) rotateY(0)";
});

});
}
</script>
</script>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaizenMC - Chat Thế Giới</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        /* Thêm cái này vào cuối thẻ style */
#profileModal {
    display: none; position: fixed; top: 0; left: 0; 
    width: 100%; height: 100%; background: rgba(0,0,0,0.8);
    z-index: 10000; perspective: 1000px;
    align-items: center; justify-content: center;
}
.card-3d {
    width: 280px; background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px); border-radius: 25px;
    padding: 30px 20px; text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
    transition: transform 0.1s; color: white;
}
.card-avatar { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #3b82f6; }
        /* Bảng hiện thẻ bài */
#profileModal {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1000;
    perspective: 1000px; /* Tạo độ sâu 3D */
}

.card-3d {
    width: 280px;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    transition: transform 0.1s; /* Phục vụ hiệu ứng nghiêng */
    color: white;
}

.card-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 3px solid var(--primary);
    margin-bottom: 10px;
    background: #334155;
}

.stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 15px;
}

.stat-item {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 10px;
}

.stat-value { color: #fbbf24; font-weight: bold; display: block; }
.stat-label { font-size: 10px; color: #94a3b8; }

.close-card {
    margin-top: 15px;
    font-size: 12px;
    color: #94a3b8;
    cursor: pointer;
}
        /* Màu sắc biệt danh theo Rank */
.name-admin { color: #ff4757; font-weight: bold; text-shadow: 0 0 8px rgba(255, 71, 87, 0.5); }
.name-vip { color: #ffa502; font-weight: bold; }
.name-member { color: #70a1ff; }
.name-guest { color: #94a3b8; }

/* Tag hiển thị bên cạnh tên */
.badge {
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 4px;
    margin-right: 5px;
    vertical-align: middle;
    text-transform: uppercase;
}
.badge-admin { background: #ff4757; color: white; }
.badge-vip { background: #ffa502; color: black; }
        .chat-wrapper {
    background: rgba(30, 41, 59, 0.7); /* Giảm độ đục */
    backdrop-filter: blur(12px); /* Làm mờ hậu cảnh */
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
}
        :root {
            --primary: #3b82f6;
            --bg-dark: #020617;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Chặn cuộn cả trang để tập trung vào chat */
        }

        /* Navigation Bar - Sửa lỗi tràn Menu trên điện thoại */
        .nav-bar {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #334155;
            overflow-x: auto; /* Cho phép vuốt ngang menu trên đt */
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .nav-bar::-webkit-scrollbar { display: none; } /* Ẩn thanh cuộn menu */

        .nav-bar a {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-bar a.active {
            background: var(--primary);
            color: white;
        }

        /* Chat Layout - Tự co giãn theo màn hình */
        .chat-wrapper {
            flex: 1; /* Chiếm toàn bộ không gian còn lại */
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-left: 1px solid #334155;
            border-right: 1px solid #334155;
            overflow: hidden;
        }

        .chat-header {
            padding: 12px 20px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #22c55e;
            margin-right: 5px;
        }

        /* Messages Area - Sửa lỗi tràn chữ */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: radial-gradient(#334155 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .msg {
            max-width: 85%; /* Giới hạn độ rộng tin nhắn */
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 14.5px;
            line-height: 1.4;
            word-wrap: break-word; /* Tự xuống dòng nếu từ quá dài */
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg.other {
            background: #0f172a;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg.me {
            background: var(--primary);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .msg b {
            display: block;
            font-size: 11px;
            margin-bottom: 3px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        /* Input Area - Tối ưu cho bàn phím điện thoại */
        .input-area {
            padding: 15px;
            background: #1e293b;
            display: flex;
            gap: 8px;
            border-top: 1px solid #334155;
        }

        #chatInput {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px 15px;
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 16px; /* Chống tự động zoom trên iPhone */
        }

        .send-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .chat-wrapper { border: none; }
            .msg { max-width: 90%; }
            .nav-bar a { padding: 6px 12px; font-size: 13px; }
        }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html">🏠 Trang chủ</a>
    <a href="shop.html">🛒 Shop</a>
    <a href="nap-xu.html">💳 Nạp Thẻ</a>
    <a href="chattg.html" class="active">🌍 Chat Thế Giới</a>
    <a href="top.html">🏆 Đua Top</a>
</nav>

<div class="chat-wrapper">
    <div class="chat-header">
        <div><span class="status-dot"></span> <b style="font-size: 14px;">GLOBAL CHAT</b></div>
        <small id="userCount" style="color: var(--text-dim); font-size: 11px;">Kết nối tốt</small>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="chatInput" placeholder="Nhập tin nhắn..." autocomplete="off">
        <button class="send-btn" onclick="sendMsg()">Gửi</button>
    </div>
</div>
<div class="emoji-bar" style="padding: 0 15px 5px; display:flex; gap:10px; font-size:18px; cursor:pointer;">
    <span onclick="document.getElementById('chatInput').value += '😊'">😊</span>
    <span onclick="document.getElementById('chatInput').value += '🔥'">🔥</span>
    <span onclick="document.getElementById('chatInput').value += '💎'">💎</span>
</div>
    <div id="profileModal" onclick="closeCard()">
    <div class="card-3d" id="card">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Kaizen" class="card-avatar" id="cAvatar">
        <h3 id="cName" style="margin: 10px 0 5px;">User Name</h3>
        <span id="cRank" class="badge badge-vip">MEMBER</span>
        
        <div class="stat-grid">
            <div class="stat-item">
                <span class="stat-value" id="cPower">1,250</span>
                <span class="stat-label">SỨC MẠNH</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="cCoin">50,000</span>
                <span class="stat-label">XU</span>
            </div>
        </div>
        <div class="close-card">Nhấn để đóng</div>
    </div>
</div>
    <div id="profileModal" onclick="closeCard()">
    <div class="card-3d" id="card">
        <img src="" class="card-avatar" id="cAvatar">
        <h3 id="cName">User</h3>
        <div style="display:flex; justify-content: space-around; margin-top:15px;">
            <div><b id="cPower">0</b><br><small>SỨC MẠNH</small></div>
            <div><b id="cCoin">0</b><br><small>XU</small></div>
        </div>
    </div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
        databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kaizenmc-web-ba518"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Lấy hoặc tạo tên và màu sắc cá nhân
    const myName = localStorage.getItem("username") || "Khách_" + Math.floor(Math.random()*999);
    const myColor = localStorage.getItem("userColor") || "#" + Math.floor(Math.random()*16777215).toString(16);
    if(!localStorage.getItem("userColor")) localStorage.setItem("userColor", myColor);

    function sendMsg() {
        const input = document.getElementById("chatInput");
        const val = input.value.trim();
        if(!val) return;

        db.ref("global_chat").push({
            user: myName,
            text: val,
            color: myColor, // Lưu màu sắc biệt danh
            time: Date.now()
        });

        input.value = "";
    }

    document.getElementById("chatInput").addEventListener("keypress", (e) => {
        if(e.key === "Enter") sendMsg();
    });

    db.ref("global_chat").limitToLast(40).on("value", snap => {
        const box = document.getElementById("chatBox");
        box.innerHTML = "";
        
        snap.forEach(child => {
            const data = child.val();
            const isMe = data.user === myName;
            
            // Xử lý Danh hiệu (Badge)
            let badge = "";
            let nameStyle = `color: ${data.color || '#94a3b8'};`;
            
            if(data.user === "Admin" || data.user === "KaizenMC") {
                badge = `<span style="background:#ef4444; color:white; padding:1px 5px; border-radius:4px; font-size:9px; margin-right:5px;">ADMIN</span>`;
                nameStyle = "color: #ff4d4d; font-weight: bold; text-shadow: 0 0 5px rgba(255,0,0,0.3);";
            } else if (data.user.includes("VIP")) {
                badge = `<span style="background:#f59e0b; color:black; padding:1px 5px; border-radius:4px; font-size:9px; margin-right:5px;">VIP</span>`;
            }

            const div = document.createElement("div");
            div.className = `msg ${isMe ? 'me' : 'other'}`;
            
            // Render nội dung tin nhắn
            div.innerHTML = `
                <b style="${nameStyle}">${badge}${data.user}</b> 
                <span style="color: white;">${data.text}</span>
            `;
            box.appendChild(div);
        });

        // Cuộn mượt xuống cuối
        box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
    });
    // 1. Trong vòng lặp snap.forEach, sửa dòng b (thẻ b tên người dùng):
div.innerHTML = `
    <b style="${nameStyle}" onclick="showProfile('${data.user}', '${data.color || '#fff'}')">
        ${badge}${data.user}
    </b> 
    <span>${data.text}</span>
`;

// 2. Thêm các hàm xử lý thẻ bài ở cuối script:
function showProfile(name, color) {
    document.getElementById("cName").innerText = name;
    document.getElementById("cName").style.color = color;
    document.getElementById("cAvatar").src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${name}`;
    
    // Giả lập chỉ số (Sau này ông kết nối Database để lấy số thật)
    document.getElementById("cPower").innerText = Math.floor(Math.random() * 5000).toLocaleString();
    document.getElementById("cCoin").innerText = Math.floor(Math.random() * 100000).toLocaleString();
    
    const modal = document.getElementById("profileModal");
    modal.style.display = "block";

    // Hiệu ứng nghiêng 3D khi di chuyển chuột (Tilt)
    const card = document.getElementById("card");
    modal.onmousemove = (e) => {
        let x = (window.innerWidth / 2 - e.pageX) / 15;
        let y = (window.innerHeight / 2 - e.pageY) / 15;
        card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
    };
}

function closeCard() {
    document.getElementById("profileModal").style.display = "none";
}
    function showProfile(name, color) {
    document.getElementById("cName").innerText = name;
    document.getElementById("cName").style.color = color;
    document.getElementById("cAvatar").src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${name}`;
    document.getElementById("profileModal").style.display = "flex";
}

function closeCard() {
    document.getElementById("profileModal").style.display = "none";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaizenMC Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --ai-green: #10b981; --bg-dark: #0f172a; --admin-red: #ff4757; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: white; height: 100vh; display: flex; flex-direction: column; }
        
        /* Menu Tabs */
        nav { background: rgba(30, 41, 59, 0.9); padding: 10px; display: flex; justify-content: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .tab-btn { background: none; border: none; color: #94a3b8; padding: 10px 20px; cursor: pointer; font-weight: 600; border-radius: 8px; }
        .tab-btn.active { background: var(--primary); color: white; }

        .page-content { display: none; padding: 20px; flex: 1; overflow-y: auto; max-width: 700px; margin: 0 auto; width: 100%; }
        .page-content.active { display: block; }

        /* Admin Input Area */
        .admin-input-area { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed var(--admin-red); }
        textarea { width: 100%; height: 80px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        
        /* Post Card */
        .post-card { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--primary); animation: slideIn 0.3s ease; }
        .post-card.home-style { border-left-color: var(--admin-red); }
        
        /* Chat Style */
        #chatBox { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .msg.me { align-self: flex-end; background: var(--primary); }
        .msg.other { align-self: flex-start; background: rgba(255,255,255,0.1); }
        .bot-msg { background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), transparent) !important; border-left: 4px solid var(--ai-green) !important; width: 90% !important; height: auto !important; display: block !important; }
        
        .input-box { display: flex; gap: 10px; padding: 15px; }
        .input-box input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <nav>
        <button class="tab-btn active" onclick="openTab('home')">TRANG CHỦ</button>
        <button class="tab-btn" onclick="openTab('news')">TIN TỨC</button>
        <button class="tab-btn" onclick="openTab('chat')">PHÒNG CHAT</button>
    </nav>

    <div id="home" class="page-content active">
        <h1>📢 Thông Báo Server</h1>
        <div class="admin-input-area">
            <textarea id="homeInput" placeholder="Sếp viết thông báo quan trọng vào đây..."></textarea>
            <button onclick="postAdmin('home')" style="margin-top:10px; background:var(--admin-red); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">ĐĂNG THÔNG BÁO</button>
        </div>
        <div id="home-list"></div> </div>

    <div id="news" class="page-content">
        <h1>📰 Tin Tức Mới</h1>
        <div class="admin-input-area">
            <textarea id="newsInput" placeholder="Sếp viết tin tức cập nhật..."></textarea>
            <button onclick="postAdmin('news')" style="margin-top:10px; background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">ĐĂNG TIN TỨC</button>
        </div>
        <div id="news-list"></div> </div>

    <div id="chat" class="page-content">
        <div id="chatBox"></div>
        <div class="input-box">
            <input type="text" id="chatInput" placeholder="Nhập tin nhắn hoặc /help...">
            <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; padding:0 20px; border-radius:10px; cursor:pointer;">GỬI</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
            databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kaizenmc-web-ba518"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ADMIN_LIST = ["kaizenadmin", "kaizenadmindz", "minhmeo@!"];
        let myName = localStorage.getItem("username") || "Khách_" + Math.floor(Math.random() * 999);
        let myColor = localStorage.getItem("userColor") || "#3b82f6";
        const isAdmin = ADMIN_LIST.includes(myName);

        if (!localStorage.getItem("username")) localStorage.setItem("username", myName);

        // Chuyển Tab
        function openTab(tabId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(event) event.currentTarget.classList.add('active');
        }

        // Kiểm tra quyền Admin khi load trang
        document.addEventListener("DOMContentLoaded", () => {
            const adminAreas = document.querySelectorAll(".admin-input-area");
            adminAreas.forEach(el => el.style.display = isAdmin ? "block" : "none");
            
            listenToPosts('home');
            listenToPosts('news');
        });

        // Hàm Admin đăng bài
        function postAdmin(type) {
            const input = document.getElementById(type + "Input");
            const val = input.value.trim();
            if (!val) return;
            db.ref("server_posts/" + type).push({
                author: myName,
                text: val,
                time: Date.now()
            });
            input.value = "";
        }

        // Lấy bài đăng từ Firebase
        function listenToPosts(type) {
            db.ref("server_posts/" + type).on("value", snap => {
                const container = document.getElementById(type + "-list");
                if (!container) return;
                container.innerHTML = "";
                snap.forEach(child => {
                    const d = child.val();
                    const div = document.createElement("div");
                    div.className = `post-card ${type === 'home' ? 'home-style' : ''}`;
                    div.innerHTML = `
                        <small style="color:#94a3b8;">${new Date(d.time).toLocaleString()} - bởi Admin ${d.author}</small>
                        <p style="margin-top:10px; line-height:1.6;">${d.text}</p>
                    `;
                    container.prepend(div);
                });
            });
        }

        // Hệ thống Chat
        function sendMsg() {
            const input = document.getElementById("chatInput");
            const val = input.value.trim();
            if (!val) return;
            if (val === "/help") {
                const box = document.getElementById("chatBox");
                const div = document.createElement("div");
                div.className = "msg other bot-msg";
                div.innerHTML = `<b style="color:#10b981;">[AI] KaizenAI</b><br>Lệnh: /dice, /clear, /poke [tên]`;
                box.appendChild(div);
                box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
                input.value = "";
                return;
            }
            db.ref("global_chat").push({ user: myName, text: val, color: myColor, time: Date.now() });
            input.value = "";
        }

        db.ref("global_chat").limitToLast(30).on("value", snap => {
            const box = document.getElementById("chatBox");
            box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const isAd = ADMIN_LIST.includes(d.user);
                const div = document.createElement("div");
                div.className = `msg ${d.user === myName ? 'me' : 'other'}`;
                div.innerHTML = `<b style="color:${isAd ? '#ff4757' : d.color}">${isAd ? '[AD] ' : ''}${d.user}</b><br>${d.text}`;
                box.appendChild(div);
            });
            box.scrollTo({ top: box.scrollHeight });
        });

        document.getElementById("chatInput").addEventListener("keypress", (e) => { if (e.key === "Enter") sendMsg(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaizenMC - Chat Thế Giới</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --bg-dark: #020617;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden; /* Giữ khung chat cố định */
        }

        /* Navigation Bar */
        .nav-bar {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-bar a {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .nav-bar a:hover, .nav-bar a.active {
            background: var(--primary);
            color: white;
        }

        /* Chat Layout */
        .chat-wrapper {
            max-width: 900px;
            margin: 20px auto;
            height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #334155;
        }

        .chat-header {
            padding: 15px 25px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-dot {
            width: 10px; height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #22c55e;
        }

        /* Messages Area */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(#334155 0.5px, transparent 0.5px);
            background-size: 20px 20px; /* Tạo chấm chấm kiểu gaming */
        }

        .msg {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 12px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg.other {
            background: #0f172a;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg.me {
            background: var(--primary);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .msg b {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: #1e293b;
            display: flex;
            gap: 10px;
            border-top: 1px solid #334155;
        }

        #chatInput {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        #chatInput:focus { border-color: var(--primary); }

        .send-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.05); background: #2563eb; }

        /* Custom Scrollbar */
        #chatBox::-webkit-scrollbar { width: 6px; }
        #chatBox::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html">🏠 Trang chủ</a>
    <a href="nap-xu.html">💳 Nạp Thẻ</a>
    <a href="chattg.html" class="active">🌍 Chat Thế Giới</a>
    
</nav>

<div class="chat-wrapper">
    <div class="chat-header">
        <div><span class="status-dot"></span> <b>GLOBAL CHAT - KAIZENMC</b></div>
        <small id="userCount" style="color: var(--text-dim);">Đang kết nối...</small>
    </div>

    <div id="chatBox">
        </div>

    <div class="input-area">
        <input type="text" id="chatInput" placeholder="Nói gì đó với mọi người..." autocomplete="off">
        <button class="send-btn" onclick="sendMsg()">GỬI</button>
    </div>
</div>

<script>
    // Firebase Config (Giữ nguyên từ bản cũ của bạn)
    const firebaseConfig = {
        apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
        databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kaizenmc-web-ba518"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Lấy tên người dùng
    const myName = localStorage.getItem("username") || "Khách_" + Math.floor(Math.random()*999);

    function sendMsg() {
        const input = document.getElementById("chatInput");
        const val = input.value.trim();
        if(!val) return;

        db.ref("global_chat").push({
            user: myName,
            text: val,
            time: Date.now()
        });

        input.value = "";
    }

    // Gửi bằng phím Enter
    document.getElementById("chatInput").addEventListener("keypress", (e) => {
        if(e.key === "Enter") sendMsg();
    });

    // Lắng nghe dữ liệu
    db.ref("global_chat").limitToLast(40).on("value", snap => {
        const box = document.getElementById("chatBox");
        box.innerHTML = "";
        
        snap.forEach(child => {
            const data = child.val();
            const isMe = data.user === myName;
            
            const div = document.createElement("div");
            div.className = `msg ${isMe ? 'me' : 'other'}`;
            div.innerHTML = `<b>${data.user}</b> ${data.text}`;
            box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
        document.getElementById("userCount").innerText = "Máy chủ ổn định";
    });
</script>

</body>
</html>

        :root {
            --primary: #3b82f6;

            height: 100vh;

            flex-direction: column;
            overflow: hidden; /* Chặn cuộn cả trang để tập trung vào chat */
        }

        /* Navigation Bar - Sửa lỗi tràn Menu trên điện thoại */
        .nav-bar {
            background: rgba(30, 41, 59, 0.9);

            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #334155;
            overflow-x: auto; /* Cho phép vuốt ngang menu trên đt */
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .nav-bar::-webkit-scrollbar { display: none; } /* Ẩn thanh cuộn menu */

        .nav-bar a {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-bar a.active {
            background: var(--primary);
            color: white;
        }

        /* Chat Layout - Tự co giãn theo màn hình */
        .chat-wrapper {
            flex: 1; /* Chiếm toàn bộ không gian còn lại */
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-left: 1px solid #334155;
            border-right: 1px solid #334155;
            overflow: hidden;
        }

        .chat-header {
            padding: 12px 20px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #22c55e;
            margin-right: 5px;
        }

        /* Messages Area - Sửa lỗi tràn chữ */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: radial-gradient(#334155 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .msg {
            max-width: 85%; /* Giới hạn độ rộng tin nhắn */
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 14.5px;
            line-height: 1.4;
            word-wrap: break-word; /* Tự xuống dòng nếu từ quá dài */
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg.other {
            background: #0f172a;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg.me {
            background: var(--primary);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .msg b {
            display: block;
            font-size: 11px;
            margin-bottom: 3px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        /* Input Area - Tối ưu cho bàn phím điện thoại */
        .input-area {
            padding: 15px;
            background: #1e293b;
            display: flex;
            gap: 8px;
            border-top: 1px solid #334155;
        }

        #chatInput {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px 15px;
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 16px; /* Chống tự động zoom trên iPhone */
        }

        .send-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .chat-wrapper { border: none; }
            .msg { max-width: 90%; }
            .nav-bar a { padding: 6px 12px; font-size: 13px; }
        }

    <script>
    // 1. CẤU HÌNH FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
        databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kaizenmc-web-ba518"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. KHỞI TẠO HỆ THỐNG QUYỀN LỰC
    const ADMIN_LIST = ["kaizenadmin", "kaizenadmindz", "minhmeo@!"];
    let myName = localStorage.getItem("username") || "Khách_" + Math.floor(Math.random()*999);
    let myColor = localStorage.getItem("userColor") || "#3b82f6";
    
    if(!localStorage.getItem("username")) localStorage.setItem("username", myName);

    // 3. HÀM XỬ LÝ TIN NHẮN & LỆNH CHAT
   // 3. HÀM XỬ LÝ TIN NHẮN & LỆNH CHAT
async function sendMsg() {
    const input = document.getElementById("chatInput");
    const val = input.value.trim();
    if (!val) return;

    // LỆNH /HELP - Bot KaizenAI trả lời
    if (val === "/help") {
        input.value = "";
        const box = document.getElementById("chatBox");
        const botDiv = document.createElement("div");
        botDiv.className = "msg other"; // Hiện bên trái như người khác
        botDiv.style.border = "1px solid #10b981"; // Viền xanh lá đặc trưng của AI
        
        botDiv.innerHTML = `
            <b style="color: #10b981; cursor: pointer;" onclick="showProfile('KaizenAI', '#10b981')">
                <span class="badge" style="background: #10b981; color: white;">BOT AI</span> KaizenAI
            </b> 
            <span style="color: #d1d5db;">Chào <b>${myName}</b>! Tôi có thể giúp gì cho ông?<br><br>
            
            📌 <b>/nick [tên]</b>: Đổi danh tính<br>
            📌 <b>/poke [tên]</b>: Triệu hồi Pokemon 3D<br>
            📌 <b>/dice</b>: Thử vận may xúc xắc<br>
            📌 <b>/gift [mã]</b>: Nhận quà (Code: KAIZEN2024)<br>
            📌 <b>/clear</b>: Xóa trắng màn hình chat
        `;
        box.appendChild(botDiv);
        box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        return;
    }

    // LỆNH /NICK (Giữ nguyên)
    if (val.startsWith("/nick ")) {
        const newNick = val.replace("/nick ", "").trim();
        if (newNick && newNick.length < 18) {
            localStorage.setItem("username", newNick);
            // Cho Bot chào tạm biệt tên cũ luôn
            alert("KaizenAI: Đã ghi nhận danh tính mới của ông!");
            location.reload();
        }
        input.value = ""; return;
    }
// 1. LỆNH /CLEAR: Dọn dẹp chiến trường
    if (val === "/clear") {
        document.getElementById("chatBox").innerHTML = "";
        botSay("🧹 Đã dọn dẹp màn hình chat cho sếp sạch bóng!");
        input.value = ""; return;
    }

    // 2. LỆNH /GIFT: Nhập code nhận quà (Thử gõ: /gift KAIZEN2024)
    if (val.startsWith("/gift ")) {
        const code = val.replace("/gift ", "").trim().toUpperCase();
        input.value = "";
        
        if (code === "KAIZEN2036" || code === "ADMIN_FREE") {
            const giftXu = Math.floor(Math.random() * 5000) + 1000;
            botSay(`🎁 <b>MÃ QUÀ TẶNG HỢP LỆ!</b><br>Chúc mừng ông nhận được <b>${giftXu.toLocaleString()} Xu</b> vào tài khoản giả lập!`);
        } else {
            botSay("❌ Mã quà tặng này đã hết hạn hoặc không tồn tại.");
        }
        return;
    }

    // 3. LỆNH /DICE: Đổ xúc xắc
    if (val === "/dice") {
        const num = Math.floor(Math.random() * 6) + 1;
        const icons = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
        // Gửi kết quả lên Firebase để mọi người cùng thấy
        db.ref("global_chat").push({
            user: myName,
            text: `🎲 Đã đổ xúc xắc: <b>${icons[num]} (${num} điểm)</b>`,
            color: myColor,
            time: Date.now()
        });
        input.value = ""; return;
    }
    // LỆNH /POKE (Giữ nguyên)
    if (val.startsWith("/poke ")) {
        const pokeName = val.replace("/poke ", "").trim().toLowerCase();
        try {
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokeName}`);
            const data = await res.json();
            showPokeCard(data);
        } catch (err) {
            // Thay vì alert, cho Bot báo lỗi vào chat
            const box = document.getElementById("chatBox");
            const errDiv = document.createElement("div");
            errDiv.className = "msg other";
            errDiv.innerHTML = `<b style="color:#ef4444;">KaizenAI</b>: Không tìm thấy Pokemon <b>${pokeName}</b>. Thử lại xem sếp!`;
            box.appendChild(errDiv);
        }
        input.value = ""; return;
    }

    // GỬI TIN NHẮN LÊN FIREBASE
    db.ref("global_chat").push({
        user: myName,
        text: val,
        color: myColor,
        time: Date.now()
    });
    input.value = "";
}
    // 4. HÀM SHOW THẺ POKEMON (HIỆU ỨNG NEON GOLD)
    function showPokeCard(data) {
        const card = document.getElementById("card");
        const nameEle = document.getElementById("cName");
        const rank = document.getElementById("cRank");

        // Style thẻ Pokemon cực cháy
        card.style.border = "2px solid #ffcb05";
        card.style.boxShadow = "0 0 40px rgba(255, 203, 5, 0.6), inset 0 0 20px rgba(255, 203, 5, 0.2)";
        
        nameEle.innerText = data.name.toUpperCase();
        nameEle.style.color = "#ffcb05";
        nameEle.style.textShadow = "0 0 15px #ffcb05";
        
        document.getElementById("cAvatar").src = data.sprites.other['official-artwork'].front_default;
        document.getElementById("cPower").innerText = "⚡ " + data.stats[1].base_stat;
        document.getElementById("cCoin").innerText = "✨ " + data.base_experience;
        
        rank.innerText = "POKEMON LEGENDARY";
        rank.style.background = "linear-gradient(90deg, #ffcb05, #3d7dca)";
        
        document.getElementById("adminControls").style.display = "none";
        document.getElementById("profileModal").style.display = "flex";
    }

    // 5. HÀM SHOW THẺ PROFILE (HIỆU ỨNG THEO RANK)
    function showProfile(name, color) {
        const card = document.getElementById("card");
        const nameEle = document.getElementById("cName");
        const rank = document.getElementById("cRank");
        const adminPanel = document.getElementById("adminControls");

        nameEle.innerText = name;
        nameEle.style.color = color;
        nameEle.style.textShadow = `0 0 10px ${color}`;
        document.getElementById("cAvatar").src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${name}`;

        // Reset style cơ bản
        card.style.border = "1px solid rgba(255,255,255,0.2)";
        card.style.boxShadow = "0 20px 50px rgba(0,0,0,0.8)";

        // Kiểm tra xem người được chọn có phải Admin không
        if (ADMIN_LIST.includes(name)) {
            card.style.border = "2px solid #ff4757";
            card.style.boxShadow = "0 0 40px rgba(255, 71, 87, 0.5)";
            rank.innerText = "CHỦ SERVER";
            rank.style.background = "linear-gradient(45deg, #ff4757, #ff6b81)";
        } else {
            rank.innerText = "THÀNH VIÊN";
            rank.style.background = "rgba(255,255,255,0.1)";
        }

        // Hiện nút đổi tên nếu người đang xem là 1 trong 3 Admin
        adminPanel.style.display = ADMIN_LIST.includes(myName) ? "block" : "none";

        document.getElementById("cPower").innerText = "🔥 " + Math.floor(Math.random()*5000);
        document.getElementById("cCoin").innerText = "💰 " + Math.floor(Math.random()*9999);
        document.getElementById("profileModal").style.display = "flex";
    }

    // 6. XỬ LÝ ĐÓNG THẺ VÀ XOAY 3D
    function closeCard() {
        document.getElementById("profileModal").style.display = "none";
        document.getElementById("card").style.transform = "rotateX(0deg) rotateY(0deg)";
    }

    const modal = document.getElementById("profileModal");
    const card = document.getElementById("card");
    modal.onmousemove = (e) => {
        let x = (window.innerWidth / 2 - e.pageX) / 15;
        let y = (window.innerHeight / 2 - e.pageY) / 15;
        card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
    };

    // 7. LẮNG NGHE FIREBASE & HIỂN THỊ CHAT
    db.ref("global_chat").limitToLast(40).on("value", snap => {
        const box = document.getElementById("chatBox");
        box.innerHTML = "";
        snap.forEach(child => {
            const d = child.val();
            const isMe = d.user === myName;
            const isAdmin = ADMIN_LIST.includes(d.user);
            
            const div = document.createElement("div");
            div.className = `msg ${isMe ? 'me' : 'other'}`;
            
            const tag = isAdmin ? `<span class="badge badge-admin">ADMIN</span>` : "";
            const nStyle = isAdmin ? `color:#ff4757; font-weight:bold; text-shadow:0 0 5px rgba(255,71,87,0.3);` : `color:${d.color};`;

            div.innerHTML = `
                <b style="${nStyle} cursor:pointer;" onclick="showProfile('${d.user}', '${d.color}')">
                    ${tag}${d.user}
                </b> 
                <span>${d.text}</span>
            `;
            box.appendChild(div);
        });
        box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
    });

    // Sự kiện Enter
    document.getElementById("chatInput").addEventListener("keypress", (e) => { if(e.key === "Enter") sendMsg(); });

    // Hàm Admin đổi tên
    function changeNickname() {
        const n = document.getElementById("newNickInput").value.trim();
        if(n) {
            localStorage.setItem("username", n);
            alert("🛠 Hệ thống: Đã xác nhận đổi danh tính!");
            location.reload();
        }
    }

        // Delay 1.5 giây để tin nhắn người dùng hiện lên trước, Bot hiện sau cho tự nhiên
        setTimeout(() => {
            botSay("Chào sếp! Đừng quên gõ <b>/help</b> để khám phá sức mạnh của KaizenAI và lệnh /poke nhé! 🚀");
        }, 1500);
        
        lastBotTime = now; // Cập nhật lại thời gian để không bị spam liên tục
    }

    // Luôn cuộn xuống cuối khi có tin nhắn hoặc bot chat
    box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
});
</script>

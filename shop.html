<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Pokémon KaizenMC - Neon Cyber Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-pink: #ff00ff;
    --neon-blue: #00ffff;
    --neon-purple: #9d00ff;
    --dark-bg: #0a0015;
    --card-bg: rgba(20, 10, 40, 0.6);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(-45deg, #0a0015, #1a0033, #000033, #0a0015);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 20% 30%, rgba(255,0,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0,255,255,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
  }
  header {
    text-align: center;
    padding: 40px 20px 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 3.2rem;
    font-weight: 700;
    background: linear-gradient(90deg, #ff00ff, #00ffff, #9d00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,0,255,0.7);
  }
  .container {
    max-width: 1400px;
    margin: auto;
    padding: 0 20px 60px;
    text-align: center;
  }
  .balance {
    font-size: 1.8rem;
    margin: 20px 0 40px;
    font-family: 'Orbitron', sans-serif;
    color: #00ffff;
    text-shadow: 0 0 15px #00ffff;
    animation: pulse 2s infinite alternate;
  }
  @keyframes pulse { to { opacity: 0.8; } }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
  }
  .item {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border: 2px solid transparent;
    border-radius: 20px;
    padding: 30px 20px;
    transition: all 0.4s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7), inset 0 0 20px rgba(157,0,255,0.15);
    position: relative;
    overflow: hidden;
  }
  .item::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%; right: -50%; bottom: -50%;
    background: conic-gradient(from 0deg, transparent, var(--neon-pink), var(--neon-blue), var(--neon-purple), transparent);
    opacity: 0;
    transition: opacity 0.6s;
    animation: rotate 10s linear infinite;
  }
  .item:hover::before { opacity: 0.3; }
  .item:hover {
    transform: translateY(-15px) scale(1.05);
    border-color: var(--neon-pink);
    box-shadow: 0 20px 60px rgba(255,0,255,0.4), 0 0 40px rgba(0,255,255,0.3);
  }
  .item img {
    width: 160px;
    height: 160px;
    object-fit: contain;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 15px rgba(255,255,255,0.6));
    transition: transform 0.4s;
  }
  .item:hover img { transform: scale(1.15) rotate(5deg); }
  .item h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    margin: 10px 0;
    background: linear-gradient(90deg, #ff00ff, #00ffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .price {
    font-size: 1.5rem;
    font-weight: bold;
    color: #22ff22;
    text-shadow: 0 0 10px #22ff22;
    margin: 15px 0;
  }
  button {
    padding: 14px 32px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, #ff00ff, #00ffff);
    color: white;
    font-weight: bold;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0,255,255,0.5);
    transition: all 0.3s;
  }
  button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px rgba(255,0,255,0.7);
  }
  .msg {
    margin: 40px 0;
    font-size: 1.4rem;
    font-weight: bold;
    min-height: 40px;
    text-shadow: 0 0 10px currentColor;
  }
  .success { color: #00ff88; }
  .error { color: #ff3366; }
  .back {
    display: inline-block;
    margin-top: 50px;
    padding: 15px 40px;
    background: linear-gradient(45deg, #9d00ff, #00ffff);
    border-radius: 50px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-size: 1.2rem;
    box-shadow: 0 0 25px rgba(157,0,255,0.6);
  }
  .back:hover { transform: scale(1.08); box-shadow: 0 0 50px rgba(0,255,255,0.8); }

  @keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<header>🌌 Neon Cyber Shop KaizenMC 🌌</header>

<div class="container">

  <div class="balance" id="balance">💎 Số dư: 0 Xu</div>

  <div class="grid">

    <!-- Legendary Pokémon với ảnh đẹp -->
    <div class="item">
      <img src="https://wallpapers.com/images/hd/legendary-pokemon-pictures-u0w1efc2z160tke6.jpg" alt="Legendary Group">
      <h2>Legendary Bundle</h2>
      <p class="price">2.500.000 Xu</p>
      <button onclick="buy('Legendary Bundle', 2500000)">Mua Ngay</button>
    </div>

    <div class="item">
      <img src="https://wallpapers.com/images/featured/rayquaza-gc45z3v2qfkovf8z.jpg" alt="Rayquaza">
      <h2>Rayquaza Mega</h2>
      <p class="price">650.000 Xu</p>
      <button onclick="buy('Rayquaza', 650000)">Mua</button>
    </div>

    <div class="item">
      <img src="https://wallpapers.com/images/featured/mewtwo-pictures-xkhd7f45ple13tc3.jpg" alt="Mewtwo">
      <h2>Mewtwo Shadow</h2>
      <p class="price">750.000 Xu</p>
      <button onclick="buy('Mewtwo', 750000)">Mua</button>
    </div>

    <div class="item">
      <img src="https://wallpapers.com/images/hd/every-legendary-pokemon-w3nclosyph6qop0e.jpg" alt="All Legendary">
      <h2>Arceus God Form</h2>
      <p class="price">1.800.000 Xu</p>
      <button onclick="buy('Arceus', 1800000)">Mua</button>
    </div>

    <!-- Items với glow -->
    <div class="item">
      <img src="https://img.pokemondb.net/sprites/items/master-ball.png" alt="Master Ball">
      <h2>Master Ball x5</h2>
      <p class="price">500.000 Xu</p>
      <button onclick="buy('Master Ball x5', 500000)">Mua</button>
    </div>

    <div class="item">
      <img src="https://img.pokemondb.net/sprites/items/rare-candy.png" alt="Rare Candy">
      <h2>Rare Candy x128</h2>
      <p class="price">300.000 Xu</p>
      <button onclick="buy('Rare Candy x128', 300000)">Mua</button>
    </div>

    <div class="item">
      <img src="https://img.pokemondb.net/sprites/items/mega-stone.png" alt="Mega Stone">
      <h2>Mega Stone Pack</h2>
      <p class="price">400.000 Xu</p>
      <button onclick="buy('Mega Stone Pack', 400000)">Mua</button>
    </div>

    <!-- VIP & Key -->
    <div class="item">
      <img src="https://cdn-icons-png.flaticon.com/512/1040/1040230.png" alt="VIP">
      <h2>Ultimate VIP</h2>
      <p class="price">800.000 Xu</p>
      <button onclick="buy('Ultimate VIP', 800000)">Mua</button>
    </div>

  </div>

  <p id="msg" class="msg"></p>
  <a class="back" href="index.html">⬅ Về Trang Chủ</a>

</div>

<script>
function updateBalance() {
  const xu = parseInt(localStorage.getItem("xu")) || 0;
  document.getElementById("balance").innerText = `💎 Số dư: ${xu.toLocaleString()} Xu`;
}

function buy(name, price) {
  const msgEl = document.getElementById("msg");

  if (localStorage.getItem("login") !== "true") {
    msgEl.className = "msg error";
    msgEl.innerText = "⚠️ ĐĂNG NHẬP ĐỂ MUA HÀNG!";
    return;
  }

  let xu = parseInt(localStorage.getItem("xu")) || 0;
  if (xu < price) {
    msgEl.className = "msg error";
    msgEl.innerText = `❌ KHÔNG ĐỦ XU! Cần ${price.toLocaleString()} (bạn có ${xu.toLocaleString()})`;
    return;
  }

  xu -= price;
  localStorage.setItem("xu", xu);
  updateBalance();

  msgEl.className = "msg success";
  msgEl.innerText = `✨ THÀNH CÔNG: ĐÃ MUA ${name}! (-${price.toLocaleString()} xu)`;
}

updateBalance();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaizenMC - Siêu Thị Pokémon & Vật Phẩm</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --neon-blue: #00f0ff;
            --neon-purple: #c300ff;
            --neon-green: #22c55e;
            --glass: rgba(15, 23, 42, 0.75);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            color: white;
            min-height: 100vh;
            background: #020617;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 70%);
            background-attachment: fixed;
        }

        /* NAVBAR */
        .main-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 70px; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
        }
        .nav-logo { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700; color: white; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-logo img { height: 40px; border-radius: 50%; }

        /* SHOP LAYOUT */
        .container { max-width: 1400px; margin: auto; padding: 120px 20px 60px; }

        .shop-header { text-align: center; margin-bottom: 50px; }
        .shop-header h1 { font-family: 'Orbitron', sans-serif; font-size: 42px; margin-bottom: 15px; background: linear-gradient(to right, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .balance-card {
            background: var(--glass); border: 1px solid var(--neon-blue);
            padding: 15px 30px; border-radius: 50px; display: inline-flex; align-items: center; gap: 10px;
            font-size: 20px; font-weight: 800; color: #fbbf24; box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        /* CATEGORY TABS */
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        .tab { padding: 12px 25px; border-radius: 12px; background: var(--glass); border: 1px solid var(--border); cursor: pointer; transition: 0.3s; font-weight: 600; }
        .tab:hover, .tab.active { border-color: var(--neon-blue); background: rgba(59, 130, 246, 0.2); }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }

        .item {
            background: var(--glass); border: 1px solid var(--border); border-radius: 24px;
            padding: 25px; text-align: center; transition: 0.4s; position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .item:hover { transform: translateY(-10px); border-color: var(--neon-blue); box-shadow: 0 15px 40px rgba(0, 240, 255, 0.15); }
        
        .item img { width: 150px; height: 150px; object-fit: contain; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); transition: 0.5s; }
        .item:hover img { transform: scale(1.1) rotate(5deg); }

        .item h2 { font-size: 20px; margin-bottom: 8px; color: #fff; }
        .item .tag { font-size: 12px; padding: 4px 10px; border-radius: 6px; background: rgba(255,255,255,0.1); color: #94a3b8; display: inline-block; margin-bottom: 12px; }
        
        .price-box { font-size: 22px; font-weight: 800; color: var(--neon-green); margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .price-box img { width: 20px; height: 20px; margin: 0; box-shadow: none; }

        .buy-btn {
            width: 100%; padding: 12px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #3b82f6); color: white;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .buy-btn:hover { filter: brightness(1.2); transform: scale(1.02); }
        .buy-btn:active { transform: scale(0.98); }

        /* NOTIFICATION */
        #msg { position: fixed; bottom: 30px; right: 30px; padding: 15px 25px; border-radius: 12px; z-index: 1000; display: none; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .success { background: #064e3b; border: 1px solid var(--neon-green); color: #6ee7b7; }
        .error { background: #450a0a; border: 1px solid #ef4444; color: #fca5a5; }

        footer { text-align: center; padding: 40px; border-top: 1px solid var(--border); margin-top: 60px; color: #64748b; }
    </style>
</head>
<body>

<nav class="main-nav">
    <a href="index.html" class="nav-logo"><img src="kaizen.png"> KAIZENMC SHOP</a>
    <div class="balance-card">
        💰 <span id="balance">Đang tải...</span>
    </div>
</nav>

<div class="container">
    <div class="shop-header">
        <h1>SIÊU THỊ KAIZEN</h1>
        <p style="color: #94a3b8;">Sắm Pokémon huyền thoại và vật phẩm hiếm để chinh phục máy chủ!</p>
    </div>

    <div class="tabs">
        <div class="tab active">Tất cả</div>
        <div class="tab">Pokémon</div>
        <div class="tab">Vật phẩm</div>
        <div class="tab">Gói VIP</div>
    </div>

    <div class="grid" id="shopGrid">
        </div>

    <div style="text-align: center; margin-top: 40px;">
        <a href="index.html" style="color: #64748b; text-decoration: none;">⬅ Quay lại trang chủ</a>
    </div>
</div>

<div id="msg"></div>

<script>
// --- CẤU HÌNH FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
    authDomain: "kaizenmc-web-ba518.firebaseapp.com",
    projectId: "kaizenmc-web-ba518",
    storageBucket: "kaizenmc-web-ba518.firebasestorage.app",
    messagingSenderId: "342779721859",
    appId: "1:342779721859:web:bc8b9f5ea4ae7fe77283b6",
    databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- DANH SÁCH ĐỒ (THÊM NHIỀU ĐỒ MỚI) ---
const items = [
    { name: "Arceus", price: 1200000, img: "https://img.pokemondb.net/artwork/large/arceus.jpg", tag: "Legendary" },
    { name: "Mewtwo", price: 500000, img: "https://img.pokemondb.net/artwork/large/mewtwo.jpg", tag: "Legendary" },
    { name: "Rayquaza Shiny", price: 850000, img: "https://img.pokemondb.net/artwork/large/rayquaza.jpg", tag: "Shiny" },
    { name: "Zacian", price: 950000, img: "https://img.pokemondb.net/artwork/large/zacian.jpg", tag: "Legendary" },
    { name: "Eternatus", price: 1100000, img: "https://img.pokemondb.net/artwork/large/eternatus.jpg", tag: "Legendary" },
    { name: "Master Ball x10", price: 900000, img: "https://img.pokemondb.net/sprites/items/master-ball.png", tag: "Item" },
    { name: "Rare Candy x256", price: 550000, img: "https://img.pokemondb.net/sprites/items/rare-candy.png", tag: "Item" },
    { name: "Mega Stone Pack", price: 400000, img: "https://img.pokemondb.net/sprites/items/mega-stone.png", tag: "Item" },
    { name: "Gói VIP Kim Cương", price: 500000, img: "https://cdn-icons-png.flaticon.com/512/1040/1040230.png", tag: "VIP" },
    { name: "Key Gacha Premium x20", price: 450000, img: "https://cdn-icons-png.flaticon.com/512/833/833472.png", tag: "Key" },
    { name: "Ability Patch", price: 200000, img: "https://img.pokemondb.net/sprites/items/ability-patch.png", tag: "Item" },
    { name: "Z-Crystal Pack", price: 600000, img: "https://img.pokemondb.net/sprites/items/electrium-z.png", tag: "Item" },
    { name: "Shiny Charm", price: 1500000, img: "https://img.pokemondb.net/sprites/items/shiny-charm.png", tag: "Special" },
    { name: "Exp. Share All", price: 150000, img: "https://img.pokemondb.net/sprites/items/exp-share.png", tag: "Item" },
    { name: "Gold Bottle Cap x10", price: 700000, img: "https://img.pokemondb.net/sprites/items/bottle-cap.png", tag: "Item" }
];

// --- RENDER SHOP ---
function renderShop() {
    const grid = document.getElementById("shopGrid");
    grid.innerHTML = items.map(item => `
        <div class="item">
            <span class="tag">${item.tag}</span>
            <img src="${item.img}" alt="${item.name}">
            <h2>${item.name}</h2>
            <div class="price-box">${item.price.toLocaleString()} <span style="font-size:14px; color:#fbbf24">Xu</span></div>
            <button class="buy-btn" onclick="buyItem('${item.name}', ${item.price})">MUA NGAY</button>
        </div>
    `).join('');
}

// --- LOGIC MUA HÀNG ---
async function buyItem(itemName, price) {
    const username = localStorage.getItem("username");
    
    if (!username) {
        showMsg("⚠️ Bạn cần đăng nhập để mua hàng!", "error");
        return;
    }

    if (!confirm(`Xác nhận mua ${itemName} với giá ${price.toLocaleString()} Xu?`)) return;

    try {
        const userRef = db.ref('users/' + username);
        const snapshot = await userRef.once('value');
        
        if (!snapshot.exists()) {
            showMsg("❌ Không tìm thấy tài khoản!", "error");
            return;
        }

        const userData = snapshot.val();
        let currentXu = userData.xu || 0;

        if (currentXu < price) {
            showMsg(`❌ Bạn không đủ Xu! Còn thiếu ${(price - currentXu).toLocaleString()} Xu nữa.`, "error");
            return;
        }

        // Trừ tiền trên Firebase
        const newXu = currentXu - price;
        await userRef.update({ xu: newXu });

        // Lưu lịch sử mua hàng
        const historyRef = db.ref('history/' + username).push();
        await historyRef.set({
            item: itemName,
            price: price,
            time: new Date().toLocaleString('vi-VN')
        });

        showMsg(`✅ Mua thành công ${itemName}! đợi 30 phút để admin add.`, "success");
        updateBalance();
    } catch (error) {
        console.error(error);
        showMsg("🔌 Lỗi kết nối máy chủ!", "error");
    }
}

// --- CẬP NHẬT SỐ DƯ ---
async function updateBalance() {
    const username = localStorage.getItem("username");
    if (!username) {
        document.getElementById("balance").innerText = "Chưa đăng nhập";
        return;
    }
    const snapshot = await db.ref('users/' + username + '/xu').once('value');
    const xu = snapshot.val() || 0;
    document.getElementById("balance").innerText = xu.toLocaleString() + " Xu";
}

function showMsg(text, type) {
    const msg = document.getElementById("msg");
    msg.innerText = text;
    msg.className = type;
    msg.style.display = "block";
    setTimeout(() => { msg.style.display = "none"; }, 4000);
}

// Khởi chạy
renderShop();
updateBalance();
</script>

</body>
</html>

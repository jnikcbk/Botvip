<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop KaizenMC</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
background:#020617;
border-bottom:2px solid #2563eb;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.item{
background:#111827;
padding:25px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:0.25s;
}

.item:hover{
transform:translateY(-5px);
}

.item img{
width:120px;
margin-bottom:10px;
}

.item h2{
color:#60a5fa;
margin:10px 0;
}

.price{
font-size:18px;
margin-bottom:15px;
color:#22c55e;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.msg{
margin-top:20px;
color:#22c55e;
font-size:16px;
}

.back{
display:inline-block;
margin-top:30px;
padding:10px 20px;
background:#2563eb;
border-radius:8px;
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<header>
🛒 Shop Pokémon KaizenMC
</header>

<div class="container">

<div class="grid">

<div class="item">
<img src="https://img.pokemondb.net/artwork/large/mewtwo.jpg">
<h2>Mewtwo</h2>
<p class="price">500.000 Xu</p>
<button onclick="buy('Mewtwo',500000)">Mua</button>
</div>

<div class="item">
<img src="https://img.pokemondb.net/artwork/large/rayquaza.jpg">
<h2>Rayquaza</h2>
<p class="price">450.000 Xu</p>
<button onclick="buy('Rayquaza',450000)">Mua</button>
</div>

<div class="item">
<img src="https://cdn-icons-png.flaticon.com/512/1040/1040230.png">
<h2>Gói VIP</h2>
<p class="price">150.000 Xu</p>
<button onclick="buy('Gói VIP',150000)">Mua</button>
</div>

<div class="item">
<img src="https://cdn-icons-png.flaticon.com/512/833/833472.png">
<h2>Key Gacha</h2>
<p class="price">30.000 Xu</p>
<button onclick="buy('Key Gacha',30000)">Mua</button>
</div>

</div>

<p id="msg" class="msg"></p>

<a class="back" href="index.html">⬅ Quay lại trang chủ</a>

</div>

<script>

function buy(name,price){

if(localStorage.getItem("login")!=="true"){
document.getElementById("msg").innerText="⚠️ Bạn cần đăng nhập trước"
return
}

let xu=parseInt(localStorage.getItem("xu"))||0

if(xu<price){
document.getElementById("msg").innerText="❌ Không đủ xu"
return
}

xu-=price
localStorage.setItem("xu",xu)

document.getElementById("msg").innerText="✅ Đã mua "+name

}

</script>

</body>
</html>

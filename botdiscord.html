<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaizenMC - Chat Thế Giới</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
   
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #5865F2;           /* MÀU DISCORD CHÍNH */
            --discord: #5865F2;
            --neon-purple: #c300ff;
            --glass: rgba(15, 23, 42, 0.88);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            color: white;
            min-height: 100vh;
            background: #020617;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 70%);
        }

        /* NAVBAR GIỐNG HỆT TRANG BOT DISCORD */
        .main-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 70px; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
        }
        .nav-logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; color: white; display: flex; align-items: center; gap: 10px; text-decoration: none;}
        .nav-logo img { height: 40px; border-radius: 50%; box-shadow: 0 0 15px rgba(88, 101, 242, 0.5); }
        .nav-links a {
            color: #e2e8f0; text-decoration: none; font-size: 14px; font-weight: 600;
            padding: 10px 16px; border-radius: 12px; transition: 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(88, 101, 242, 0.2);
            color: #5865F2;
        }

        .container { 
            padding: 100px 20px 90px; 
            max-width: 1100px; 
            margin: auto; 
        }
        h1 {
            font-family: 'Orbitron', sans-serif; 
            font-size: 36px; 
            text-align: center; 
            margin-bottom: 30px;
            background: linear-gradient(to right, #5865F2, #7289da);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        /* CHAT BOX */
        .chat-box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            height: 65vh;
            overflow-y: auto;
            padding: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.25);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 78%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 15.5px;
            line-height: 1.45;
        }
        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #5865F2, #7289da);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.6);
        }
        .message.received {
            align-self: flex-start;
            background: rgba(255,255,255,0.08);
            color: white;
            border-bottom-left-radius: 6px;
        }
        .sender {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 4px;
            opacity: 0.9;
            color: #5865F2;
        }
        .time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 6px;
            text-align: right;
        }

        /* INPUT */
        .input-area {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            margin-top: 15px;
            backdrop-filter: blur(15px);
        }
        .input-area input {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 14px 20px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #5865F2;
            box-shadow: 0 0 0 3px rgba(88,101,242,0.3);
        }
        .send-btn {
            background: #5865F2;
            color: white;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }
        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(88,101,242,0.8);
        }
    </style>
</head>
<body>

<nav class="main-nav">
    <a href="index.html" class="nav-logo">
        <img src="kaizen.png" alt="Logo"> KAIZEN MC
    </a>
    <div class="nav-links">
        <a href="index.html">🏠 Trang chủ</a>
        <a href="shop.html">🛒 Shop</a>
        <a href="botdiscord.html">🤖 Bot Discord</a>
        <a href="#" class="active" style="background: rgba(88,101,242,0.2); color:#5865F2;">🌍 Chat Thế Giới</a>
    </div>
</nav>

<div class="container">
    <h1>CHAT THẾ GIỚI KAIZEN</h1>
    
    <div class="chat-box" id="chatContainer"></div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Nhập tin nhắn..." autocomplete="off">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script>
// ==================== FIREBASE ====================
const firebaseConfig = {
    apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
    databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "kaizenmc-web-ba518"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const messagesRef = db.ref('messages');

// ==================== TÊN KHÁCH (KHÔNG CHO ĐỔI) ====================
let guestName = localStorage.getItem('guestName');
if (!guestName) {
    guestName = "Khách#" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('guestName', guestName);
}

// ==================== CHAT LOGIC ====================
const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');

function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    messagesRef.push({
        name: guestName,
        text: text,
        timestamp: firebase.database.ServerValue.TIMESTAMP
    });

    messageInput.value = '';
}

sendBtn.addEventListener('click', sendMessage);
messageInput.addEventListener('keypress', e => {
    if (e.key === 'Enter') sendMessage();
});

// ==================== REALTIME ====================
messagesRef.orderByChild('timestamp').limitToLast(150).on('child_added', snapshot => {
    const data = snapshot.val();
    const isMine = data.name === guestName;

    const div = document.createElement('div');
    div.className = `message ${isMine ? 'sent' : 'received'}`;
    div.innerHTML = `
        <div class="sender">${data.name}</div>
        ${data.text}
        <div class="time">${new Date(data.timestamp).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})}</div>
    `;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
});
</script>

</body>
</html>

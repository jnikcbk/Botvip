<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaizenMC - Hệ Thống 4 Siêu Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --neon-blue: #00f0ff;
            --neon-purple: #c300ff;
            --discord: #5865F2;
            --glass: rgba(15, 23, 42, 0.75);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            color: white;
            min-height: 100vh;
            background: #020617;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 70%);
            overflow-x: hidden;
        }

        /* NAVBAR */
        .main-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 70px; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
        }
        .nav-logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; color: white; display: flex; align-items: center; gap: 10px; text-decoration: none;}
        .nav-logo img { height: 40px; border-radius: 50%; box-shadow: 0 0 15px rgba(0, 240, 255, 0.5); }
        .nav-links { display: flex; gap: 10px; align-items: center; }
        .nav-links a {
            color: #e2e8f0; text-decoration: none; font-size: 14px; font-weight: 600;
            padding: 10px 16px; border-radius: 12px; transition: 0.3s; display: flex; align-items: center; gap: 6px;
        }
        .nav-links a:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); color: var(--neon-blue); }

        /* MAIN CONTENT */
        .container { padding: 120px 20px 80px; max-width: 1200px; margin: auto; text-align: center; }
        
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 35px; margin-bottom: 40px;
            background: linear-gradient(to right, #fff, var(--discord), var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* GRID BOT */
        .bot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        .bot-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(15px);
        }

        .bot-card:hover {
            transform: translateY(-12px) scale(1.05);
            border-color: var(--neon-blue);
            box-shadow: 0 20px 40px rgba(0, 240, 255, 0.2);
        }

        .bot-img-container {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 15px;
            background: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .bot-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Placeholder cho bot không có ảnh */
        .bot-placeholder {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: rgba(255,255,255,0.2);
        }

        .bot-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #fff;
        }

        .bot-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #10b981; /* Màu xanh lá online */
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        .btn-invite {
            display: block;
            margin-top: 20px;
            padding: 10px;
            background: var(--discord);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-invite:hover { filter: brightness(1.2); }

    </style>
</head>
<body>

<nav class="main-nav">
    <a href="index.html" class="nav-logo">
        <img src="kaizen.png" alt="Logo"> KAIZEN MC
    </a>
    <div class="nav-links">
        <a href="index.html">🏠 Trang chủ</a>
        <a href="shop.html">🛒 Shop</a>
        <a href="botdiscord.html" style="color: var(--neon-blue);">🤖 Bot Discord</a>
    </div>
</nav>

<div class="container">
    <h1>HỆ THỐNG SIÊU BOT DISCORD</h1>
    
    <div class="bot-grid">
        <div class="bot-card">
            <div class="bot-img-container">
                <img src="meobot.png" alt="Meo Bot" onerror="this.style.display='none'">
                <div class="bot-placeholder">MEO</div> 
            </div>
            <div class="bot-name">☠️ Meo Bot ☠️</div>
            <div class="bot-status"><div class="status-dot"></div> Trực tuyến</div>
            <a href="#" class="btn-invite">Mời Bot</a>
        </div>

        <div class="bot-card">
            <div class="bot-img-container">
                <div class="bot-placeholder">~CB~</div>
            </div>
            <div class="bot-name">~ Cyberion Bot ~</div>
            <div class="bot-status"><div class="status-dot"></div> Trực tuyến</div>
            <a href="#" class="btn-invite">Mời Bot</a>
        </div>

        <div class="bot-card">
            <div class="bot-img-container">
                <div class="bot-placeholder">TB</div>
            </div>
            <div class="bot-name">TR BOT</div>
            <div class="bot-status"><div class="status-dot"></div> Trực tuyến</div>
            <a href="#" class="btn-invite">Mời Bot</a>
        </div>

        <div class="bot-card">
            <div class="bot-img-container">
                <img src="pkbot.png" alt="PK Bot" onerror="this.style.display='none'">
                <div class="bot-placeholder">PK</div>
            </div>
            <div class="bot-name">PK Bot</div>
            <div class="bot-status"><div class="status-dot"></div> Trực tuyến</div>
            <a href="#" class="btn-invite">Mời Bot</a>
        </div>
    </div>
</div>

<footer>
    © 2026 KaizenMC • Power by Discord API
</footer>

</body>
</html>

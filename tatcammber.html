<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tất cả member - KaizenMC Admin</title>
<style>
  body {
    margin:0;
    font-family:'Roboto', sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
    min-height:100vh;
  }
  header {
    text-align:center;
    padding:40px 20px 20px;
    font-size:2.5rem;
    font-weight:bold;
    background:#020617;
    border-bottom:3px solid #ef4444;
    text-shadow:0 0 15px #ef4444;
  }
  .container {
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
  }
  .section {
    background:rgba(17,24,39,0.85);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
    margin-bottom:30px;
    box-shadow:0 15px 50px rgba(0,0,0,0.7);
    border:1px solid rgba(239,68,68,0.3);
  }
  h2 {
    color:#ef4444;
    margin-bottom:20px;
    text-shadow:0 0 10px #ef4444;
  }
  .user-item {
    background:#020617;
    padding:18px;
    border-radius:12px;
    margin-bottom:15px;
    border-left:5px solid #ef4444;
    transition:0.3s;
  }
  .user-item:hover {
    transform:translateX(8px);
    box-shadow:0 0 25px rgba(239,68,68,0.4);
  }
  .btn {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin:5px;
  }
  .delete {
    background:#ef4444;
    color:white;
  }
  .back {
    display:inline-block;
    margin-top:30px;
    padding:14px 35px;
    background:#2563eb;
    border-radius:50px;
    color:white;
    text-decoration:none;
    font-weight:bold;
  }
  .back:hover {
    background:#1d4ed8;
    transform:scale(1.05);
  }
  .no-access {
    text-align:center;
    color:#ef4444;
    font-size:1.8rem;
    margin-top:100px;
  }
</style>
</head>
<body>

<header>👥 TẤT CẢ MEMBER - KaizenMC</header>

<div class="container">
  <div class="section">
    <h2>Danh sách tất cả người dùng</h2>
    <div id="userList"></div>
  </div>

  <a class="back" href="index.html">⬅ Quay lại trang chủ</a>
</div>

<script>
// Bảo vệ: Chỉ admin mới vào được
const role = localStorage.getItem("role");
const username = localStorage.getItem("tk") || localStorage.getItem("username") || "";
const isAdmin = role === "admin" || 
                ["kaizenadmin", "kaizenadmindz", "minhmeodz@!"].includes(username.toLowerCase());

if (!isAdmin) {
  document.body.innerHTML = '<div class="no-access">❌ Bạn không có quyền truy cập trang này!</div>';
  setTimeout(() => { window.location.href = "index.html"; }, 3000);
  throw new Error("Access denied");
}

// Load danh sách member
function loadMembers() {
  const userList = document.getElementById("userList");
  userList.innerHTML = "";

  const allKeys = Object.keys(localStorage);
  const users = allKeys
    .filter(key => key.startsWith("xu_"))
    .map(key => key.replace("xu_", ""));

  if (users.length === 0) {
    userList.innerHTML = '<p style="text-align:center;color:#9ca3af;">Chưa có member nào.</p>';
    return;
  }

  users.forEach(username => {
    const xu = parseInt(localStorage.getItem(`xu_${username}`)) || 0;
    userList.innerHTML += `
      <div class="user-item">
        <b>👤 ${username}</b><br>
        💰 Xu: ${xu.toLocaleString('vi-VN')}<br><br>
        <button class="btn delete" onclick="deleteMember('${username}')">XÓA TÀI KHOẢN</button>
      </div>
    `;
  });
}

function deleteMember(username) {
  if (!confirm(`XÓA VĨNH VIỄN tài khoản ${username}?\nMọi dữ liệu sẽ mất!`)) return;

  // Xóa xu
  localStorage.removeItem(`xu_${username}`);

  // Xóa lịch sử nạp
  let napHistory = JSON.parse(localStorage.getItem("napHistory")) || [];
  napHistory = napHistory.filter(item => item.user !== username);
  localStorage.setItem("napHistory", JSON.stringify(napHistory));

  // Xóa lịch sử mua
  localStorage.removeItem(`purchaseHistory_${username}`);

  // Xóa các key khác liên quan
  Object.keys(localStorage).forEach(key => {
    if (key.includes(username)) localStorage.removeItem(key);
  });

  alert(`Đã xóa tài khoản ${username}!`);
  loadMembers(); // Load lại danh sách
}

// Khởi chạy
loadMembers();
</script>
</body>
</html>

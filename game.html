<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaizenMC - Mobile 3D Run</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; overflow: hidden; background: #020617; 
            font-family: 'Orbitron', sans-serif;
            /* Chặn cuộn trang và zoom trên điện thoại */
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
        }
        
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00f0ff; font-size: 24px; text-shadow: 0 0 10px #00f0ff;
            pointer-events: none; z-index: 10;
        }

        #game-over {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(10px);
        }
        #game-over h1 { color: #ff00aa; font-size: 50px; text-shadow: 0 0 20px #ff00aa; margin: 0; }
        #game-over button {
            margin-top: 30px; padding: 15px 40px; background: transparent; 
            border: 2px solid #00f0ff; color: #00f0ff; font-family: 'Orbitron';
            font-size: 20px; cursor: pointer; border-radius: 10px;
        }

        /* Hướng dẫn chạm cho mobile */
        #touch-hint {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 12px; pointer-events: none;
        }

        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">SCORE: <span id="scoreVal">0</span></div>
    <div id="touch-hint">CHẠM TRÁI / PHẢI ĐỂ DI CHUYỂN</div>

    <div id="game-over">
        <h1>K.O!</h1>
        <p style="color:white">BẠN ĐÃ VA CHẠM</p>
        <p style="font-size: 30px; color:#ffcb05">ĐIỂM: <span id="finalScore">0</span></p>
        <button onclick="location.reload()">CHƠI LẠI</button>
    </div>

    <script>
        let scene, camera, renderer, player, stars;
        let obstacles = [], cards = [];
        let score = 0, speed = 0.5, lane = 0, isGameOver = false;
        const laneWidth = 3.5; // Thu hẹp làn đường cho màn hình dọc điện thoại

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            scene.fog = new THREE.Fog(0x020617, 10, 50);

            // Camera chỉnh góc cao hơn một chút cho mobile dễ nhìn
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 7);
            camera.lookAt(0, 0, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Tối ưu hiệu năng mobile
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const pLight = new THREE.PointLight(0x00f0ff, 1, 100);
            pLight.position.set(0, 10, 5);
            scene.add(pLight);

            // Sao nền
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<3000; i++) {
                starCoords.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 }));
            scene.add(stars);

            // Grid chạy
            const grid = new THREE.GridHelper(1000, 80, 0x00f0ff, 0x0f172a);
            scene.add(grid);

            // Player
            player = new THREE.Mesh(
                new THREE.SphereGeometry(0.6, 24, 24),
                new THREE.MeshPhongMaterial({ color: 0xff00aa, emissive: 0xff00aa, emissiveIntensity: 0.5 })
            );
            player.position.y = 0.6;
            scene.add(player);

            // XỬ LÝ ĐIỀU KHIỂN
            // 1. Cho PC (Bàn phím)
            window.addEventListener('keydown', (e) => {
                if(isGameOver) return;
                if ((e.key === 'a' || e.key === 'ArrowLeft') && lane > -1) lane--;
                if ((e.key === 'd' || e.key === 'ArrowRight') && lane < 1) lane++;
            });

            // 2. Cho MOBILE (Cảm ứng chạm 2 bên màn hình)
            window.addEventListener('touchstart', (e) => {
                if(isGameOver) return;
                const touchX = e.touches[0].clientX;
                const halfWidth = window.innerWidth / 2;
                
                if (touchX < halfWidth) {
                    if(lane > -1) lane--; // Chạm bên trái
                } else {
                    if(lane < 1) lane++;  // Chạm bên phải
                }
            }, { passive: false });

            spawnObjects();
            animate();
        }

        function spawnObjects() {
            const textureLoader = new THREE.TextureLoader();
            const cardTex = textureLoader.load("https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png");

            for (let i = 0; i < 40; i++) {
                // Obstacle
                const obs = new THREE.Mesh(
                    new THREE.IcosahedronGeometry(1, 0),
                    new THREE.MeshPhongMaterial({ color: 0xff0000 })
                );
                obs.position.set(Math.floor(Math.random() * 3 - 1) * laneWidth, 1, -i * 30 - 40);
                scene.add(obs);
                obstacles.push(obs);

                // Card
                const card = new THREE.Mesh(
                    new THREE.BoxGeometry(1.2, 1.8, 0.1),
                    new THREE.MeshPhongMaterial({ map: cardTex, transparent: true })
                );
                card.position.set(Math.floor(Math.random() * 3 - 1) * laneWidth, 1.2, -i * 30 - 20);
                scene.add(card);
                cards.push(card);
            }
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            stars.rotation.z += 0.0003;
            player.position.x = THREE.MathUtils.lerp(player.position.x, lane * laneWidth, 0.15);
            player.rotation.x += 0.1;

            obstacles.forEach(obs => {
                obs.position.z += speed;
                obs.rotation.x += 0.02;
                if (obs.position.z > 10) obs.position.z = -1100;

                if (player.position.distanceTo(obs.position) < 1.4) endGame();
            });

            cards.forEach(card => {
                card.position.z += speed;
                card.rotation.y += 0.04;
                if (card.position.z > 10) card.position.z = -1100;

                if (player.position.distanceTo(card.position) < 1.4) {
                    score += 10;
                    document.getElementById('scoreVal').innerText = score;
                    card.position.z = -1100;
                    speed += 0.005;
                }
            });

            renderer.render(scene, camera);
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('game-over').style.display = 'flex';
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Catcher - Thực tế</title>
    <style>
        body { margin: 0; background: #2d3436; display: flex; flex-direction: column; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        canvas { background: url('https://img.freepik.com/free-vector/pixel-art-grass-background_52683-113063.jpg'); background-size: cover; border: 5px solid #ffcb05; border-radius: 15px; cursor: url('https://cur.cursors-4u.net/games/gam-13/gam1214.cur'), auto; }
        .ui { color: white; text-align: center; padding: 10px; }
        h1 { color: #ffcb05; text-shadow: 2px 2px #3b4cca; margin: 5px; }
    </style>
</head>
<body>

    <div class="ui">
        <h1>POKEMON GO WEB</h1>
        <p>Bắt Pokemon hiếm để được nhiều điểm hơn!</p>
        <h2>Điểm: <span id="score">0</span> | Thời gian: <span id="timer">30</span>s</h2>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const timerEl = document.getElementById("timer");

        canvas.width = 700;
        canvas.height = 450;

        let score = 0;
        let timeLeft = 30;
        let pokemons = [];
        let gameActive = true;

        // Định nghĩa danh sách Pokemon với link ảnh thật
        const pokeData = [
            { name: "Pikachu", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png", size: 60, points: 10 },
            { name: "Charmander", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png", size: 55, points: 15 },
            { name: "Squirtle", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png", size: 55, points: 15 },
            { name: "Mewtwo", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/150.png", size: 80, points: 50 }
        ];

        // Tải trước hình ảnh vào bộ nhớ
        const loadedImages = {};
        pokeData.forEach(p => {
            const img = new Image();
            img.src = p.img;
            loadedImages[p.name] = img;
        });

        function spawn() {
            if (!gameActive) return;
            const type = pokeData[Math.floor(Math.random() * pokeData.length)];
            pokemons.push({
                x: Math.random() * (canvas.width - 100) + 50,
                y: Math.random() * (canvas.height - 100) + 50,
                ...type,
                life: 1500 + Math.random() * 2000,
                spawnTime: Date.now()
            });
            setTimeout(spawn, 700);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const now = Date.now();

            pokemons = pokemons.filter(p => {
                const age = now - p.spawnTime;
                if (age > p.life) return false;

                // Vẽ hình ảnh Pokemon thay vì hình tròn
                const img = loadedImages[p.name];
                ctx.drawImage(img, p.x - p.size/2, p.y - p.size/2, p.size, p.size);
                
                return true;
            });

            if (gameActive) requestAnimationFrame(draw);
        }

        canvas.addEventListener("mousedown", (e) => {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            pokemons.forEach((p, index) => {
                const dist = Math.sqrt((mouseX - p.x)**2 + (mouseY - p.y)**2);
                if (dist < p.size/2) {
                    score += p.points;
                    scoreEl.innerText = score;
                    pokemons.splice(index, 1);
                }
            });
        });

        const timer = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                gameActive = false;
                clearInterval(timer);
                alert("Chúc mừng! Bạn đạt được: " + score + " điểm.");
                location.reload();
            }
        }, 1000);

        spawn();
        draw();
    </script>
</body>
</html>

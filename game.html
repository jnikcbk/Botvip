<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaizenMC - Cyber Runner Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; touch-action: none; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00f0ff; font-size: 24px; text-shadow: 0 0 15px #00f0ff; z-index: 10;
            pointer-events: none;
        }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff00aa; text-align: center; display: none; background: rgba(0,0,0,0.9);
            padding: 40px; border: 2px solid #ff00aa; box-shadow: 0 0 30px #ff00aa; z-index: 100;
        }
        .btn {
            margin-top: 20px; padding: 12px 30px; background: #00f0ff; color: #000;
            border: none; cursor: pointer; font-family: 'Orbitron'; font-weight: 900; border-radius: 5px;
        }
        .hint { font-size: 12px; color: #fff; opacity: 0.5; margin-top: 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">DISTANCE: <span id="dist">0</span>m</div>
    
    <div id="game-over">
        <h1 style="font-size: 48px;">CRASHED</h1>
        <p>Record: <span id="final-dist">0</span>m</p>
        <button class="btn" onclick="location.reload()">RESTART ENGINE</button>
    </div>

    <script>
        let scene, camera, renderer, car, road, stars;
        let obstacles = [];
        let distance = 0, speed = 0, targetSpeed = 0.8;
        let lane = 0; // -1: Left, 0: Center, 1: Right
        let isGameOver = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x02040a);
            scene.fog = new THREE.FogExp2(0x02040a, 0.04);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3.5, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. TẠO SIÊU XE (BẢN ĐỘ)
            car = createCyberCar();
            scene.add(car);

            // 2. TẠO ĐƯỜNG CHẠY (Grid Synthwave)
            const gridGeo = new THREE.PlaneGeometry(100, 300, 40, 40);
            const gridMat = new THREE.MeshBasicMaterial({ color: 0xff00aa, wireframe: true, transparent: true, opacity: 0.3 });
            road = new THREE.Mesh(gridGeo, gridMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // 3. HỆ THỐNG SAO (Stars)
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<3000; i++) starPos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*500, (Math.random()-0.5)*1000);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 }));
            scene.add(stars);

            // 4. ÁNH SÁNG
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const mainLight = new THREE.DirectionalLight(0x00f0ff, 1);
            mainLight.position.set(0, 10, 5);
            scene.add(mainLight);

            // 5. TẠO VẬT CẢN
            for(let i=0; i<8; i++) spawnObstacle(-i * 40 - 60);

            // ĐIỀU KHIỂN
            window.addEventListener('keydown', (e) => {
                if(e.key === 'ArrowLeft' || e.key === 'a') moveLane(-1);
                if(e.key === 'ArrowRight' || e.key === 'd') moveLane(1);
            });
            
            // Vuốt trên Mobile
            let touchStartX = 0;
            window.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
            window.addEventListener('touchend', e => {
                let touchEndX = e.changedTouches[0].clientX;
                if(touchEndX < touchStartX - 30) moveLane(-1);
                if(touchEndX > touchStartX + 30) moveLane(1);
            });

            animate();
        }

        function createCyberCar() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness: 1, roughness: 0.2 });
            const neonMat = new THREE.MeshStandardMaterial({ color: 0x00f0ff, emissive: 0x00f0ff, emissiveIntensity: 2 });

            // Thân dẹt
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.4, 3.5), bodyMat);
            group.add(body);

            // Buồng lái
            const cockpit = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.5), 
                new THREE.MeshPhongMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.5 }));
            cockpit.position.set(0, 0.4, 0.2);
            group.add(cockpit);

            // Cánh gió (Spoiler)
            const spoiler = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.1, 0.6), bodyMat);
            spoiler.position.set(0, 0.7, 1.4);
            group.add(spoiler);
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), bodyMat);
            legL.position.set(0.8, 0.4, 1.4);
            group.add(legL);
            const legR = legL.clone(); legR.position.x = -0.8;
            group.add(legR);

            // Bánh xe Neon
            const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x00f0ff, emissiveIntensity: 1.5 });
            const wheelPos = [{x:1, z:1.2}, {x:-1, z:1.2}, {x:1, z:-1.2}, {x:-1, z:-1.2}];
            wheelPos.forEach(p => {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.z = Math.PI/2;
                w.position.set(p.x, -0.1, p.z);
                group.add(w);
            });

            // Lửa đuôi (Thrust)
            const thrust = new THREE.Mesh(new THREE.ConeGeometry(0.4, 2, 16), 
                new THREE.MeshBasicMaterial({ color: 0xff00aa, transparent: true, opacity: 0.7 }));
            thrust.rotation.x = Math.PI / 2;
            thrust.position.z = 2.5;
            group.add(thrust);

            return group;
        }

        function moveLane(dir) {
            lane = Math.max(-1, Math.min(1, lane + dir));
        }

        function spawnObstacle(zPos) {
            const geo = new THREE.BoxGeometry(2.5, 5, 2);
            const mat = new THREE.MeshStandardMaterial({ color: 0x111111, emissive: 0xff0000, emissiveIntensity: 0.5 });
            const ob = new THREE.Mesh(geo, mat);
            ob.position.set((Math.floor(Math.random() * 3) - 1) * 3.5, 2.5, zPos);
            scene.add(ob);
            obstacles.push(ob);
        }

        function animate() {
            if(isGameOver) return;
            requestAnimationFrame(animate);

            // Tốc độ tăng dần theo thời gian
            targetSpeed += 0.0001;
            speed = THREE.MathUtils.lerp(speed, targetSpeed, 0.05);

            // Xe di chuyển và nhún nhảy
            car.position.x = THREE.MathUtils.lerp(car.position.x, lane * 3.5, 0.12);
            car.rotation.z = -(car.position.x - lane * 3.5) * 0.3; // Nghiêng khi rẽ
            car.position.y = Math.sin(Date.now() * 0.01) * 0.1; // Nhún nhảy

            // Di chuyển đường và sao
            road.position.z += speed;
            if(road.position.z > 100) road.position.z = 0;
            stars.position.z += speed * 0.2;
            if(stars.position.z > 200) stars.position.z = 0;

            // Xử lý chướng ngại vật
            obstacles.forEach(ob => {
                ob.position.z += speed;
                
                // Kiểm tra va chạm
                if(Math.abs(ob.position.z - car.position.z) < 2 && Math.abs(ob.position.x - car.position.x) < 1.8) {
                    if(car.position.y < 3) gameOver(); // Chỉ chết nếu xe ở dưới thấp
                }

                // Reset vật cản
                if(ob.position.z > 15) {
                    ob.position.z = -250;
                    ob.position.x = (Math.floor(Math.random() * 3) - 1) * 3.5;
                    distance += 10;
                    document.getElementById('dist').innerText = distance;
                }
            });

            // Camera Shake (Rung lắc khi nhanh)
            camera.position.x = Math.random() * (speed * 0.05);
            camera.lookAt(car.position.x, 1, -5);

            renderer.render(scene, camera);
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-dist').innerText = distance;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>

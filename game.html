<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Catcher Pro</title>
    <style>
        body { 
            margin: 0; 
            background: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 15px;
        }
        h1 { 
            color: #ffcb05; 
            text-shadow: 3px 3px #3b4cca; 
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
        }
        .stats {
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #ffcb05;
            display: inline-block;
            margin-top: 10px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        canvas { 
            /* Hình nền đồng cỏ pixel cực sạch */
            background: url('https://iterminal.at/assets/images/posts/2018-05-18-pixel-art-grass/grass.png');
            background-size: 200px; /* Làm họa tiết lặp lại nhìn đẹp hơn */
            border: 8px solid #3b4cca; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>POKEMON GO WEB</h1>
        <div class="stats">
            Điểm: <span id="score" style="color: #00ff88;">0</span> | 
            Thời gian: <span id="timer" style="color: #ff4757;">30</span>s
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const timerEl = document.getElementById("timer");

        canvas.width = 800;
        canvas.height = 500;

        let score = 0;
        let timeLeft = 30;
        let pokemons = [];
        let gameActive = true;

        const pokeData = [
            { id: 25, name: "Pikachu", points: 10, size: 70 },
            { id: 4, name: "Charmander", points: 20, size: 65 },
            { id: 7, name: "Squirtle", points: 20, size: 65 },
            { id: 1, name: "Bulbasaur", points: 20, size: 65 },
            { id: 150, name: "Mewtwo", points: 100, size: 90 },
            { id: 151, name: "Mew", points: 200, size: 50 } // Mew bé tí, cực khó bắt
        ];

        const loadedImages = {};
        pokeData.forEach(p => {
            const img = new Image();
            img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png`;
            loadedImages[p.name] = img;
        });

        const pokeballImg = new Image();
        pokeballImg.src = "https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg";

        function spawn() {
            if (!gameActive) return;
            const type = pokeData[Math.floor(Math.random() * pokeData.length)];
            pokemons.push({
                x: Math.random() * (canvas.width - 150) + 75,
                y: Math.random() * (canvas.height - 150) + 75,
                ...type,
                life: 1200 + Math.random() * 1000,
                spawnTime: Date.now(),
                opacity: 0 // Hiệu ứng hiện hình
            });
            setTimeout(spawn, 800);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const now = Date.now();

            pokemons = pokemons.filter(p => {
                const age = now - p.spawnTime;
                if (age > p.life) return false;

                // Hiệu ứng hiện hình (fade in)
                if (p.opacity < 1) p.opacity += 0.1;

                ctx.globalAlpha = p.opacity;
                ctx.drawImage(loadedImages[p.name], p.x - p.size/2, p.y - p.size/2, p.size, p.size);
                ctx.globalAlpha = 1.0;
                
                return true;
            });

            if (gameActive) requestAnimationFrame(draw);
        }

        canvas.addEventListener("mousedown", (e) => {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Vẽ Pokeball tại điểm click
            ctx.drawImage(pokeballImg, mouseX-20, mouseY-20, 40, 40);

            pokemons.forEach((p, index) => {
                const dist = Math.sqrt((mouseX - p.x)**2 + (mouseY - p.y)**2);
                if (dist < p.size/2) {
                    score += p.points;
                    scoreEl.innerText = score;
                    pokemons.splice(index, 1);
                }
            });
        });

        const timer = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                gameActive = false;
                clearInterval(timer);
                alert("KẾT THÚC! Tổng điểm của bạn: " + score);
                location.reload();
            }
        }, 1000);

        spawn();
        draw();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaizenMC - Super Jet 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; touch-action: none; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00f0ff;
            font-size: 18px; text-shadow: 0 0 10px #00f0ff; z-index: 10;
        }
        #speed-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 10px; border: 2px solid #00f0ff; border-radius: 5px;
        }
        #speed-fill { width: 0%; height: 100%; background: #00f0ff; transition: 0.1s; }
        .controls-hint {
            position: absolute; bottom: 20px; left: 20px; color: white;
            font-size: 11px; opacity: 0.5; pointer-events: none;
        }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        SCORE: <span id="score">0</span><br>
        ALT: <span id="alt">500</span> FT
    </div>

    <div id="speed-bar"><div id="speed-fill"></div></div>

    <div class="controls-hint">
        WASD: Lái máy bay | SPACE: Nitro (Tăng tốc) | MOBILE: Chạm giữ
    </div>

    <script>
        let scene, camera, renderer, jet, stars, engineLight;
        let rings = [];
        let score = 0, speed = 0.3, targetSpeed = 0.3;
        let rotation = { x: 0, y: 0, z: 0 };
        let isBoosting = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x02040a);
            scene.fog = new THREE.FogExp2(0x02040a, 0.008);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // Bật hiệu ứng bóng đổ và ánh sáng chuẩn
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            // 1. TẠO MÁY BAY CHIẾN ĐẤU (NÂNG CẤP)
            jet = new THREE.Group();

            const metalMat = new THREE.MeshStandardMaterial({ 
                color: 0x2c3e50, metalness: 0.9, roughness: 0.2 
            });
            const neonMat = new THREE.MeshStandardMaterial({ 
                color: 0x00f0ff, emissive: 0x00f0ff, emissiveIntensity: 2 
            });
            const cockpitMat = new THREE.MeshPhongMaterial({ 
                color: 0x000000, shininess: 100, opacity: 0.7, transparent: true 
            });

            // Thân máy bay (Fuselage)
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 5, 8), metalMat);
            body.rotation.x = Math.PI / 2;
            jet.add(body);

            // Mũi máy bay (Nose)
            const nose = new THREE.Mesh(new THREE.ConeGeometry(0.4, 1.5, 8), metalMat);
            nose.position.z = -3.2;
            nose.rotation.x = -Math.PI / 2;
            jet.add(nose);

            // Buồng lái (Cockpit)
            const cockpit = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), cockpitMat);
            cockpit.position.set(0, 0.4, -1.5);
            cockpit.scale.set(1, 0.8, 2.5);
            jet.add(cockpit);

            // Cánh chính (Wings)
            const wingGeo = new THREE.BoxGeometry(6, 0.05, 2);
            const wings = new THREE.Mesh(wingGeo, metalMat);
            wings.position.z = 0.5;
            jet.add(wings);

            // Cánh đuôi ngang (Stabilizers)
            const tailHorizontal = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.05, 1), metalMat);
            tailHorizontal.position.z = 2.2;
            jet.add(tailHorizontal);

            // Cánh đuôi đứng (Vertical Fin)
            const tailVertical = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.2, 0.8), metalMat);
            tailVertical.position.set(0, 0.6, 2.2);
            jet.add(tailVertical);

            // Động cơ (Engine Glow)
            const engine = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.2, 16), neonMat);
            engine.rotation.x = Math.PI / 2;
            engine.position.z = 2.5;
            jet.add(engine);

            engineLight = new THREE.PointLight(0x00f0ff, 5, 10);
            engineLight.position.z = 3;
            jet.add(engineLight);

            scene.add(jet);

            // 2. ÁNH SÁNG CINEMATIC
            const ambient = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambient);

            const hemiLight = new THREE.HemisphereLight(0x00f0ff, 0xff00aa, 0.5);
            scene.add(hemiLight);

            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(50, 50, 50);
            scene.add(sun);

            // 3. MÔI TRƯỜNG
            // Stars
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<8000; i++) {
                starPos.push((Math.random()-0.5)*2000, (Math.random()-0.5)*2000, (Math.random()-0.5)*2000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 }));
            scene.add(stars);

            // Lưới grid không gian cho cảm giác độ cao
            const grid = new THREE.GridHelper(5000, 100, 0x00f0ff, 0x050a15);
            grid.position.y = -100;
            scene.add(grid);

            // Checkpoints
            for(let i=0; i<20; i++) createRing(i);

            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            window.addEventListener('touchstart', () => { isBoosting = true; targetSpeed = 1.5; });
            window.addEventListener('touchend', () => { isBoosting = false; targetSpeed = 0.3; });

            animate();
        }

        function createRing(i) {
            const ringGeo = new THREE.TorusGeometry(5, 0.15, 16, 50);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffcb05, transparent: true, opacity: 0.8 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.set((Math.random()-0.5)*300, (Math.random()-0.5)*150, -i * 150 - 100);
            scene.add(ring);
            rings.push(ring);
        }

       const keys = { w: false, s: false, a: false, d: false, space: false };

function handleKeyDown(e) {
    if (e.code === 'Space') keys.space = true;
    if (e.key.toLowerCase() === 'w') keys.w = true;
    if (e.key.toLowerCase() === 's') keys.s = true;
    if (e.key.toLowerCase() === 'a') keys.a = true;
    if (e.key.toLowerCase() === 'd') keys.d = true;
}

function handleKeyUp(e) {
    if (e.code === 'Space') keys.space = false;
    if (e.key.toLowerCase() === 'w') keys.w = false;
    if (e.key.toLowerCase() === 's') keys.s = false;
    if (e.key.toLowerCase() === 'a') keys.a = false;
    if (e.key.toLowerCase() === 'd') keys.d = false;
}
        function animate() {
            requestAnimationFrame(animate);

            // Vật lý & Tốc độ
            speed = THREE.MathUtils.lerp(speed, targetSpeed, 0.03);
            
            // Xoay Jet mượt mà
            jet.rotation.x = THREE.MathUtils.lerp(jet.rotation.x, jet.rotation.x + rotation.x, 0.1);
            jet.rotation.y += rotation.y;
            jet.rotation.z = THREE.MathUtils.lerp(jet.rotation.z, rotation.z, 0.1);
            
            jet.translateZ(-speed);

            // Camera GTA 5 Style + FOV dynamic
            const baseFOV = 75;
            camera.fov = THREE.MathUtils.lerp(camera.fov, isBoosting ? 95 : 75, 0.05);
            camera.updateProjectionMatrix();

            const offset = new THREE.Vector3(0, 2.5, 12);
            offset.applyQuaternion(jet.quaternion);
            camera.position.lerp(jet.position.clone().add(offset), 0.15);
            camera.lookAt(jet.position.clone().add(new THREE.Vector3(0,0,-5).applyQuaternion(jet.quaternion)));

            // Hiệu ứng động cơ chớp tắt
            engineLight.intensity = (isBoosting ? 10 : 3) + Math.random() * 2;

            // UI
            document.getElementById('speed-fill').style.width = (speed / 2 * 100) + "%";
            document.getElementById('alt').innerText = Math.floor(jet.position.y + 500);

            // Kiểm tra va chạm vòng
            rings.forEach(ring => {
                if(jet.position.distanceTo(ring.position) < 7) {
                    score += 100;
                    document.getElementById('score').innerText = score;
                    ring.position.z -= 2000; // Reset vòng ra xa
                    ring.position.x = (Math.random()-0.5)*400;
                    ring.position.y = (Math.random()-0.5)*200;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>

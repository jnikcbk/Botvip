<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaizenMC - Cyber Runner</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; touch-action: none; }
        #ui {
            position: absolute; width: 100%; top: 40px; text-align: center;
            color: #ff00aa; font-size: 32px; text-shadow: 0 0 20px #ff00aa; pointer-events: none;
        }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00f0ff; text-align: center; display: none; background: rgba(0,0,0,0.8);
            padding: 30px; border: 2px solid #00f0ff; box-shadow: 0 0 30px #00f0ff;
        }
        .btn {
            margin-top: 20px; padding: 10px 25px; background: #ff00aa; color: white;
            border: none; cursor: pointer; font-family: 'Orbitron'; font-size: 18px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">DIST: <span id="dist">0</span>m</div>
    
    <div id="game-over">
        <h1>CRASHED!</h1>
        <p>Your Record: <span id="final-dist">0</span>m</p>
        <button class="btn" onclick="location.reload()">RETRY</button>
    </div>

    <script>
        let scene, camera, renderer, car, road, obstacles = [];
        let distance = 0, speed = 0, targetSpeed = 0.5;
        let lane = 0; // -1: trái, 0: giữa, 1: phải
        let isGameOver = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050010);
            scene.fog = new THREE.FogExp2(0x050010, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 1. TẠO XE (Khối hộp phong cách Sci-fi)
            car = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.5, 2),
                new THREE.MeshStandardMaterial({ color: 0x00f0ff, emissive: 0x00f0ff, emissiveIntensity: 0.5 })
            );
            car.add(body);
            // Đèn pha
            const lightL = new THREE.PointLight(0xff00aa, 2, 10);
            lightL.position.set(-0.5, 0, -1.2);
            car.add(lightL);
            const lightR = lightL.clone();
            lightR.position.x = 0.5;
            car.add(lightR);
            
            scene.add(car);

            // 2. TẠO ĐƯỜNG (Grid chuyển động)
            const gridGeo = new THREE.PlaneGeometry(100, 200, 50, 50);
            const gridMat = new THREE.MeshBasicMaterial({ color: 0xff00aa, wireframe: true, transparent: true, opacity: 0.2 });
            road = new THREE.Mesh(gridGeo, gridMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // 3. ÁNH SÁNG
            scene.add(new THREE.AmbientLight(0x404040));
            const spotLight = new THREE.SpotLight(0xffffff, 1);
            spotLight.position.set(0, 10, 0);
            scene.add(spotLight);

            // 4. CHƯỚNG NGẠI VẬT
            for(let i=0; i<10; i++) spawnObstacle(-i * 30 - 50);

            // ĐIỀU KHIỂN
            window.addEventListener('keydown', (e) => {
                if(e.key === 'ArrowLeft' || e.key === 'a') moveLane(-1);
                if(e.key === 'ArrowRight' || e.key === 'd') moveLane(1);
            });
            
            // Mobile (Chạm trái/phải màn hình)
            window.addEventListener('touchstart', (e) => {
                const x = e.touches[0].clientX;
                if(x < window.innerWidth/2) moveLane(-1);
                else moveLane(1);
            });

            animate();
        }

        function moveLane(dir) {
            lane = Math.max(-1, Math.min(1, lane + dir));
        }

        function spawnObstacle(zPos) {
            const geo = new THREE.BoxGeometry(2, Math.random() * 3 + 1, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 });
            const ob = new THREE.Mesh(geo, mat);
            ob.position.set((Math.floor(Math.random() * 3) - 1) * 3, 1, zPos);
            scene.add(ob);
            obstacles.push(ob);
        }

        function animate() {
            if(isGameOver) return;
            requestAnimationFrame(animate);

            // Xe mượt mà chuyển làn
            car.position.x = THREE.MathUtils.lerp(car.position.x, lane * 3, 0.1);
            car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, - (car.position.x - lane * 3) * 0.5, 0.1);

            // Đường chạy ngược lại tạo cảm giác di chuyển
            road.position.z += speed;
            if(road.position.z > 50) road.position.z = 0;

            // Xử lý chướng ngại vật
            speed = THREE.MathUtils.lerp(speed, targetSpeed, 0.01);
            obstacles.forEach(ob => {
                ob.position.z += speed;
                
                // Kiểm tra va chạm
                if(Math.abs(ob.position.z - car.position.z) < 1.5 && Math.abs(ob.position.x - car.position.x) < 1.5) {
                    gameOver();
                }

                // Reset vật cản khi đi qua
                if(ob.position.z > 10) {
                    ob.position.z = -200;
                    ob.position.x = (Math.floor(Math.random() * 3) - 1) * 3;
                    distance += 10;
                    document.getElementById('dist').innerText = distance;
                }
            });

            // Hiệu ứng Camera rung theo tốc độ
            camera.position.y = 3 + Math.sin(Date.now() * 0.01) * 0.02;

            renderer.render(scene, camera);
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-dist').innerText = distance;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>

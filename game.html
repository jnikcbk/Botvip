```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Target Shooter 3D</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif}
#ui{
position:absolute;top:10px;left:10px;color:white;
background:rgba(0,0,0,0.5);padding:10px;border-radius:8px
}
#crosshair{
position:absolute;left:50%;top:50%;
transform:translate(-50%,-50%);
color:white;font-size:22px
}
</style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>
<div id="crosshair">+</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
75,window.innerWidth/window.innerHeight,0.1,1000
);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

let floor = new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshPhongMaterial({color:0x222222})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

camera.position.set(0,2,5);

let targets = [];
let score = 0;

function spawnTarget(){

let geo = new THREE.BoxGeometry(1,1,1);
let mat = new THREE.MeshPhongMaterial({color:0xff3333});

let cube = new THREE.Mesh(geo,mat);

cube.position.set(
(Math.random()-0.5)*20,
Math.random()*5+1,
(Math.random()-0.5)*20
);

scene.add(cube);
targets.push(cube);
}

for(let i=0;i<10;i++) spawnTarget();

let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2(0,0);

window.addEventListener("click",shoot);

function shoot(){

raycaster.setFromCamera(mouse,camera);

let hits = raycaster.intersectObjects(targets);

if(hits.length){

let obj = hits[0].object;

scene.remove(obj);
targets.splice(targets.indexOf(obj),1);

score++;
document.getElementById("score").innerText = score;

spawnTarget();
}

}

document.body.addEventListener("mousemove",e=>{
camera.rotation.y -= e.movementX * 0.002;
});

function animate(){

requestAnimationFrame(animate);

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaizen Multi-Platform 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: #00f0ff; pointer-events: none; z-index: 10; text-shadow: 0 0 5px #000; }
        
        /* Joystick chỉ hiện trên thiết bị cảm ứng */
        #joystick-zone { 
            position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; 
            background: rgba(0, 240, 255, 0.1); border-radius: 50%; border: 1px solid #00f0ff;
            display: none; /* Mặc định ẩn, JS sẽ hiện nếu là mobile */
        }
        #joystick-stick { 
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; 
            background: #00f0ff; border-radius: 50%; transform: translate(-50%, -50%); 
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>KAIZEN CROSS-PLAY 3D</b><br>
        PC: WASD | Mobile: Joystick<br>
        ID: <span id="my-id">...</span>
    </div>
    
    <div id="joystick-zone"><div id="joystick-stick"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>

    <script>
        // --- 1. SETUP ĐỒNG BỘ (GUN.JS) ---
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const world = gun.get('kaizen_ultimate_v1');
        const myId = 'PL_' + Math.random().toString(36).substr(2, 4);
        document.getElementById('my-id').innerText = myId;
        const players = {};

        // --- 2. 3D ENGINE (THREE.JS) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Nền Cyber
        scene.add(new THREE.GridHelper(200, 50, 0xff00aa, 0x222222));
        
        const createAvatar = (color) => {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 1), new THREE.MeshBasicMaterial({ color, wireframe: true }));
            const eye = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.2, 0.2), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            eye.position.set(0, 0.4, -0.5);
            g.add(body, eye);
            return g;
        };

        const myMesh = createAvatar(0x00f0ff);
        scene.add(myMesh);
        camera.position.set(0, 5, 7);

        // --- 3. ĐIỀU KHIỂN (HYBRID) ---
        let inputX = 0, inputZ = 0;
        const keys = {};

        // PC Controls
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // Mobile Controls (Joystick)
        if ('ontouchstart' in window) {
            const zone = document.getElementById('joystick-zone');
            const stick = document.getElementById('joystick-stick');
            zone.style.display = 'block';

            zone.addEventListener('touchmove', (e) => {
                const rect = zone.getBoundingClientRect();
                const cx = rect.left + 50, cy = rect.top + 50;
                const dx = e.touches[0].clientX - cx, dy = e.touches[0].clientY - cy;
                const d = Math.min(40, Math.sqrt(dx*dx + dy*dy));
                const a = Math.atan2(dy, dx);
                inputX = Math.cos(a) * (d/40) * 0.2;
                inputZ = Math.sin(a) * (d/40) * 0.2;
                stick.style.left = `calc(50% + ${Math.cos(a)*d}px)`;
                stick.style.top = `calc(50% + ${Math.sin(a)*d}px)`;
            });
            zone.addEventListener('touchend', () => { 
                inputX = 0; inputZ = 0; 
                stick.style.left = stick.style.top = '50%'; 
            });
        }

        // --- 4. VÒNG LẶP CHÍNH ---
        function update() {
            // Ưu tiên phím nếu có, không thì dùng joystick
            let curX = inputX, curZ = inputZ;
            if (keys['w']) curZ = -0.2; if (keys['s']) curZ = 0.2;
            if (keys['a']) curX = -0.2; if (keys['d']) curX = 0.2;

            if (curX !== 0 || curZ !== 0) {
                myMesh.position.x += curX;
                myMesh.position.z += curZ;
                myMesh.rotation.y = Math.atan2(curX, curZ);
                world.get(myId).put({ x: myMesh.position.x, z: myMesh.position.z, ry: myMesh.rotation.y });
            }

            camera.position.lerp(new THREE.Vector3(myMesh.position.x, 6, myMesh.position.z + 8), 0.1);
            camera.lookAt(myMesh.position);
        }

        // Nghe data từ người chơi khác
        world.map().on((data, id) => {
            if (id === myId || !data) return;
            if (!players[id]) {
                players[id] = createAvatar(0xff00aa);
                scene.add(players[id]);
            }
            players[id].position.set(data.x, 0, data.z);
            players[id].rotation.y = data.ry;
        });

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

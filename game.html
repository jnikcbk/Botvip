<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>KAIZEN CROSS-PLAY 3D — Multiplayer FPS lite</title>
<style>
  :root{
    --neon:#00f0ff; --bg:#000; --ui-bg:rgba(0,15,30,0.7);
  }
  html,body{height:100%; margin:0; background:var(--bg); font-family:Inter,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;}
  canvas{display:block}
  #ui{
    position:fixed; left:16px; top:16px; z-index:20;
    background:var(--ui-bg); color:var(--neon); padding:12px 14px; border-radius:10px;
    border:1px solid var(--neon); text-shadow:0 0 8px var(--neon);
    pointer-events:none;
  }
  #players-count{color:#ff66aa; margin-top:6px; font-size:14px}
  #hp-bar{margin-top:8px; width:200px; height:14px; background:rgba(255,255,255,0.06); border-radius:8px; overflow:hidden; border:1px solid rgba(255,255,255,0.04)}
  #hp-fill{height:100%; width:100%; background:linear-gradient(90deg,#ff4d4d,#ffb400); transform-origin:left; transition:width 0.12s linear}
  #id-line{color:#ffff88; font-size:13px; margin-top:6px}
  #crosshair{
    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:18; pointer-events:none;
    width:18px; height:18px; mix-blend-mode:screen;
  }
  #crosshair::before,#crosshair::after{
    content:""; position:absolute; left:50%; top:50%; background:var(--neon); width:2px; height:10px; transform:translate(-50%,-50%); border-radius:2px;
    box-shadow:0 0 10px var(--neon);
  }
  #crosshair::after{transform:translate(-50%,-50%) rotate(90deg)}
  /* Joystick */
  #joystick-zone{position:fixed; left:20px; bottom:40px; width:150px; height:150px; display:none; z-index:19; touch-action:none;
    border-radius:50%; border:4px solid rgba(0,240,255,0.6); background:rgba(0,240,255,0.06); box-shadow:0 0 40px var(--neon)}
  #joystick-stick{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:58px; height:58px; border-radius:50%;
    background:var(--neon); box-shadow:0 0 30px var(--neon), inset 0 0 18px #fff}
  /* name tags container */
  .name-tag{
    position:fixed; pointer-events:none; transform:translate(-50%,-100%); color:#fff; font-size:13px; text-shadow:0 0 6px rgba(0,0,0,0.8);
    z-index:21; white-space:nowrap;
  }
  .name-inner{background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:8px; border:1px solid rgba(255,255,255,0.06)}
  .hp-mini{height:6px; width:100%; background:rgba(255,255,255,0.06); border-radius:4px; margin-top:4px; overflow:hidden}
  .hp-mini > i{display:block;height:100%; background:linear-gradient(90deg,#ff4d4d,#ffb400); width:100%}
  /* small HUD for mobile shoot hint */
  #hint{position:fixed; right:16px; bottom:16px; color:#fff; z-index:19; font-size:13px; background:rgba(0,0,0,0.3); padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.06)}
</style>
</head>
<body>
  <div id="ui">
    <b>KAIZEN CROSS-PLAY 3D</b><br>
    <div id="id-line">ID: <span id="my-id">...</span></div>
    <div id="players-count">Kết nối...</div>
    <div id="hp-bar"><div id="hp-fill"></div></div>
    <div style="font-size:12px; color:#ddd; margin-top:6px">PC: click để khóa chuột + WASD ● Bắn: chuột trái</div>
    <div style="font-size:12px; color:#ddd">Mobile: joystick trái ● vuốt phải để xoay ● chạm phải để bắn</div>
  </div>

  <div id="crosshair"></div>
  <div id="joystick-zone"><div id="joystick-stick"></div></div>
  <div id="hint">Tap right = shoot</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>

<script>
/* ====== SETUP GUN.JS ====== */
const gun = Gun({
  peers: [
    "https://gunjs.herokuapp.com/gun",
    "https://peer.wallie.io/gun"
  ]
});
const world = gun.get("kaizen_ultimate_v3");
const playersNode = world.get("players");

/* ====== BASIC VARS/UI ====== */
const myId = 'PL_' + Math.random().toString(36).substr(2,6).toUpperCase();
document.getElementById('my-id').innerText = myId;
const players = {}; // players[id] = { mesh, hp, nameTagEl }
let playerCount = 1;
let myHP = 100;

/* ====== THREE SCENE ====== */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x001122, 20, 200);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);
const canvas = renderer.domElement;

/* LIGHTS & GROUND */
scene.add(new THREE.AmbientLight(0x88ccff,0.7));
const dir = new THREE.DirectionalLight(0x00ffff,1.5); dir.position.set(20,30,15); scene.add(dir);
scene.add(new THREE.HemisphereLight(0x00ffcc,0x112233,0.5));
const ground = new THREE.Mesh(new THREE.PlaneGeometry(500,500), new THREE.MeshPhongMaterial({color:0x001122, shininess:5}));
ground.rotation.x = -Math.PI/2; scene.add(ground);
scene.add(new THREE.GridHelper(500,100,0x00ffcc,0x112233));

/* ====== AVATAR FACTORY ====== */
function createAvatar(color){
  const g = new THREE.Group();
  const legM = new THREE.MeshPhongMaterial({color:0x222244});
  const leg = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.9,0.3), legM);
  leg.position.y = 0.45;
  const l1 = leg.clone(); l1.position.x = -0.25;
  const l2 = leg.clone(); l2.position.x = 0.25;
  g.add(l1,l2);

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.9,1.3,0.6),
      new THREE.MeshPhongMaterial({color,color,emissive:color,emissiveIntensity:0.3}));
  body.position.y = 1.1; g.add(body);

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.4,24,24), new THREE.MeshPhongMaterial({color:0xffddaa})); head.position.y = 2.15; g.add(head);

  const eyeM = new THREE.MeshPhongMaterial({color:0x00ffff,emissive:0x00ffff,emissiveIntensity:0.8});
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.1,12,12), eyeM); eye.position.set(-0.17,2.2,0.35);
  const eye2 = eye.clone(); eye2.position.x = 0.17; g.add(eye,eye2);

  // small gun as child (visual only)
  const gunMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.18,0.18), new THREE.MeshPhongMaterial({color:0x333333}));
  gunMesh.position.set(0.6,1.3,0.3); gunMesh.rotation.y = Math.PI/2;
  g.add(gunMesh);

  return g;
}

/* my mesh */
const myMesh = createAvatar(0x00f0ff);
scene.add(myMesh);
camera.position.set(0,10,20);

/* ====== CONTROLS ====== */
const isMobile = 'ontouchstart' in window;
let myYaw = 0;
let inputX = 0, inputZ = 0;
const keys = {};
const clock = new THREE.Clock();
let pointerLocked = false;
const raycaster = new THREE.Raycaster();

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

/* POINTER LOCK PC */
if(!isMobile){
  canvas.addEventListener('click', ()=> canvas.requestPointerLock());
  document.addEventListener('pointerlockchange', ()=> pointerLocked = document.pointerLockElement === canvas);
  document.addEventListener('mousemove', e=>{
    if(pointerLocked){
      myYaw -= e.movementX * 0.0038;
      myMesh.rotation.y = myYaw;
    }
  });
}

/* JOYSTICK MOBILE */
const zone = document.getElementById('joystick-zone');
const stick = document.getElementById('joystick-stick');
if(isMobile){
  zone.style.display = 'block';
  let touching = false;
  zone.addEventListener('touchstart', ()=> touching = true);
  zone.addEventListener('touchmove', e=>{
    if(!touching) return;
    const rect = zone.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    let dx = e.touches[0].clientX - cx;
    let dy = e.touches[0].clientY - cy;
    const dist = Math.min(58, Math.hypot(dx,dy));
    const angle = Math.atan2(dy,dx);
    inputX = Math.cos(angle) * (dist/58) * 0.28;
    inputZ = Math.sin(angle) * (dist/58) * 0.28;
    stick.style.left = `calc(50% + ${Math.cos(angle)*dist}px)`;
    stick.style.top  = `calc(50% + ${Math.sin(angle)*dist}px)`;
  });
  zone.addEventListener('touchend', ()=> { touching=false; inputX=inputZ=0; stick.style.left=stick.style.top='50%'; });
}

/* MOBILE LOOK (vuốt phải để xoay) */
let touchLook=false, lastTouchX=0;
if(isMobile){
  canvas.addEventListener('touchstart', e=>{
    // nếu chạm phải màn hình để xoay / bắn -> lấy first touch
    // đa chạm: nếu có nhiều ngón, ưu tiên chạm bên phải cạnh
    const t = Array.from(e.touches).find(t=>t.clientX > innerWidth/2);
    if(t){ touchLook = true; lastTouchX = t.clientX; }
  }, {passive:true});
  canvas.addEventListener('touchmove', e=>{
    if(!touchLook) return;
    const t = Array.from(e.touches).find(t=>t.clientX > innerWidth/2);
    if(!t) return;
    const dx = t.clientX - lastTouchX;
    lastTouchX = t.clientX;
    myYaw -= dx * 0.0055;
    myMesh.rotation.y = myYaw;
  }, {passive:true});
  canvas.addEventListener('touchend', e=>{
    if(e.touches.length===0) touchLook=false;
  }, {passive:true});
}

/* ====== SHOOTING ====== */
let canShoot = true;
const SHOOT_COOLDOWN = 250; // ms
const SHOOT_DAMAGE = 22;
const SHOOT_RANGE = 120;
function doShoot(){
  if(!canShoot) return;
  canShoot = false;
  setTimeout(()=> canShoot=true, SHOOT_COOLDOWN);

  // ray from camera center (screen center)
  const mouse = new THREE.Vector2(0,0);
  raycaster.setFromCamera(mouse, camera);
  raycaster.far = SHOOT_RANGE;

  // gather target meshes
  const objs = Object.values(players).map(p=>p.mesh).filter(Boolean);
  const hits = raycaster.intersectObjects(objs, true);
  let hitPoint = null;
  let hitId = null;
  if(hits.length){
    const h = hits[0];
    hitPoint = h.point;
    // find which player group this object belongs to
    for(const id in players){
      let parent = h.object;
      while(parent && parent.type !== 'Group') parent = parent.parent;
      if(players[id].mesh === parent){
        hitId = id; break;
      }
    }
  } else {
    // no hit — tracer goes forward to far point
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    hitPoint = camera.position.clone().add(dir.multiplyScalar(SHOOT_RANGE));
  }

  // tracer visual
  spawnTracer(getMuzzleWorldPosition(), hitPoint);

  if(hitId){
    // apply damage via Gun
    playersNode.get(hitId).once(data=>{
      if(!data) return;
      const newHp = Math.max(0, (data.hp||100) - SHOOT_DAMAGE);
      playersNode.get(hitId).put({ hp: newHp, lastHitBy: myId, t: Date.now() });
    });
  }
}

/* muzzle position (approx from myMesh) */
function getMuzzleWorldPosition(){
  // find approximate muzzle on myMesh (child gun)
  const gunChild = myMesh.children.find(ch => ch.geometry && ch.geometry.type === 'BoxGeometry');
  const pos = new THREE.Vector3();
  if(gunChild){
    gunChild.getWorldPosition(pos);
  } else {
    // fallback: in front of head
    pos.set(myMesh.position.x, myMesh.position.y + 1.4, myMesh.position.z);
    pos.x += Math.sin(myYaw) * 0.8; pos.z += Math.cos(myYaw) * 0.8;
  }
  return pos;
}

/* tracer: short-lived line */
function spawnTracer(from, to){
  const mat = new THREE.LineBasicMaterial({ linewidth: 2, color: 0xffcc66, transparent:true, opacity:0.95 });
  const geom = new THREE.BufferGeometry().setFromPoints([ from.clone(), to.clone() ]);
  const line = new THREE.Line(geom, mat);
  scene.add(line);
  setTimeout(()=> { scene.remove(line); geom.dispose(); mat.dispose(); }, 140);
}

/* input hooks for shoot */
window.addEventListener('mousedown', e=> { if(e.button===0) doShoot(); });
if(isMobile){
  // tap right half to shoot
  canvas.addEventListener('touchstart', e=>{
    const t = Array.from(e.touches).find(t=>t.clientX > innerWidth/2);
    if(t) doShoot();
  }, {passive:true});
}

/* ====== SYNC / RECEIVE PLAYERS ====== */
/* map listener: create/update/remove players */
playersNode.map().on((data, id)=>{
  // when Gun gives empty or null, remove
  if(!data){
    if(players[id]){
      // remove mesh & dom
      scene.remove(players[id].mesh);
      if(players[id].nameEl){ document.body.removeChild(players[id].nameEl); }
      delete players[id];
      updatePlayersCount();
    }
    return;
  }
  if(id === myId) return; // ignore our own node here

  if(!players[id]){
    const color = Math.floor(Math.random()*0xffffff);
    const mesh = createAvatar(color);
    scene.add(mesh);
    // name tag DOM
    const nameEl = document.createElement('div');
    nameEl.className = 'name-tag';
    nameEl.innerHTML = `<div class="name-inner">${id}</div><div class="hp-mini"><i></i></div>`;
    document.body.appendChild(nameEl);
    players[id] = { mesh, hp: data.hp||100, nameEl };
    updatePlayersCount();
  }

  // update position/rotation/hp
  const p = players[id];
  if(typeof data.x === 'number') p.mesh.position.x = data.x;
  if(typeof data.z === 'number') p.mesh.position.z = data.z;
  if(typeof data.ry === 'number') p.mesh.rotation.y = data.ry;
  p.hp = (typeof data.hp === 'number') ? data.hp : (p.hp || 100);

  // dead logic for remote player: if hp <= 0, respawn them after short delay
  if(p.hp <= 0){
    // show faint and respawn remote player after 1s (server authoritative would respawn on that client)
    p.mesh.position.set(Math.random()*8-4,0,Math.random()*8-4);
    p.hp = 100;
    playersNode.get(id).put({ hp: 100, x: p.mesh.position.x, z: p.mesh.position.z, t: Date.now() });
  }

  // update name tag hp fill
  const hpFill = p.nameEl.querySelector('.hp-mini > i');
  const hpPct = Math.max(0, Math.min(100, p.hp))/100;
  hpFill.style.width = (hpPct*100) + '%';
});

/* listen to our own node for hp changes (server may update) */
playersNode.get(myId).on(data=>{
  if(!data) return;
  if(typeof data.hp === 'number') myHP = data.hp;
  // if killed by others -> respawn local
  if(myHP <= 0){
    // respawn after brief flash
    setTimeout(()=>{
      myMesh.position.set((Math.random()*10)-5, 0, (Math.random()*10)-5);
      myHP = 100;
      playersNode.get(myId).put({ hp: myHP, x: myMesh.position.x, z: myMesh.position.z, ry: myYaw, t: Date.now() });
    }, 700);
  }
  // update UI bar
  document.getElementById('hp-fill').style.width = Math.max(0, myHP) + '%';
});

/* send presence periodically to avoid disappearing */
function sendPresence(){
  playersNode.get(myId).put({
    x: myMesh.position.x,
    z: myMesh.position.z,
    ry: myYaw,
    hp: myHP,
    t: Date.now()
  });
}
setInterval(sendPresence, 500);
sendPresence();

/* remove on leave */
window.addEventListener('beforeunload', ()=> playersNode.get(myId).put(null));

/* count players for UI */
function updatePlayersCount(){
  const count = 1 + Object.keys(players).length;
  document.getElementById('players-count').innerText = `Người chơi online: ${count}`;
}

/* ====== MAIN UPDATE & RENDER ====== */
function worldToScreen(pos, out){
  const vec = pos.clone().project(camera);
  const x = (vec.x * 0.5 + 0.5) * innerWidth;
  const y = (-vec.y * 0.5 + 0.5) * innerHeight;
  out.x = x; out.y = y; out.z = vec.z;
}
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  const MOVE_SPEED = 15;
  let moved = false;

  if(!isMobile){
    const forwardX = Math.sin(myYaw), forwardZ = Math.cos(myYaw);
    let dx=0, dz=0;
    if(keys['w']) { dx += forwardX; dz += forwardZ; }
    if(keys['s']) { dx -= forwardX; dz -= forwardZ; }
    if(keys['a']) { dx += Math.cos(myYaw); dz -= Math.sin(myYaw); }
    if(keys['d']) { dx -= Math.cos(myYaw); dz += Math.sin(myYaw); }
    if(dx !== 0 || dz !== 0){
      const len = Math.hypot(dx,dz);
      myMesh.position.x += (dx/len) * MOVE_SPEED * dt;
      myMesh.position.z += (dz/len) * MOVE_SPEED * dt;
      moved = true;
    }
    myMesh.rotation.y = myYaw;
  } else {
    let curX = inputX, curZ = inputZ;
    if(keys['w']) curZ = -0.28;
    if(keys['s']) curZ = 0.28;
    if(keys['a']) curX = -0.28;
    if(keys['d']) curX = 0.28;
    if(curX !== 0 || curZ !== 0){
      myMesh.position.x += curX * 55 * dt;
      myMesh.position.z += curZ * 55 * dt;
      myYaw = Math.atan2(curX, curZ);
      myMesh.rotation.y = myYaw;
      moved = true;
    }
  }

  // update camera smoothly behind player
  const camDist = 15, camHeight = 7;
  const camX = myMesh.position.x - Math.sin(myYaw) * camDist;
  const camZ = myMesh.position.z - Math.cos(myYaw) * camDist;
  const targetCam = new THREE.Vector3(camX, myMesh.position.y + camHeight, camZ);
  camera.position.lerp(targetCam, 0.13);
  camera.lookAt(myMesh.position.x, myMesh.position.y + 1.9, myMesh.position.z);

  // send if moved or periodically (periodic handled by interval)
  if(moved || pointerLocked){
    playersNode.get(myId).put({ x: myMesh.position.x, z: myMesh.position.z, ry: myYaw, hp: myHP, t: Date.now() });
  }

  // update name tags positions
  for(const id in players){
    const p = players[id];
    const screen = { x:0, y:0, z:0 };
    const above = new THREE.Vector3();
    above.copy(p.mesh.position); above.y += 2.55;
    worldToScreen(above, screen);
    if(screen.z < 1){
      p.nameEl.style.display = 'block';
      p.nameEl.style.left = screen.x + 'px';
      p.nameEl.style.top = screen.y + 'px';
      // scale with distance
      const dist = camera.position.distanceTo(p.mesh.position);
      const s = Math.max(0.6, Math.min(1.1, 60/dist));
      p.nameEl.style.transform = `translate(-50%,-100%) scale(${s})`;
      // hide if behind camera far away
    } else {
      p.nameEl.style.display = 'none';
    }
  }

  renderer.render(scene, camera);
}
animate();

/* resize */
window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* initial UI */
updatePlayersCount();
document.getElementById('hp-fill').style.width = myHP + '%';

</script>
</body>
</html>

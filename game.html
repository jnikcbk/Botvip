<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>KaizenMC - Pokemon 3D Cosmic Run</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00f0ff;
            font-size: 24px; text-shadow: 0 0 10px #00f0ff; pointer-events: none;
        }
        #instructions {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: white; opacity: 0.6; font-size: 14px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">SCORE: <span id="scoreVal">0</span></div>
    <div id="instructions">Dùng phím A - D hoặc Mũi tên để di chuyển</div>

    <script>
        let scene, camera, renderer, player, clock;
        let obstacles = [], cards = [];
        let score = 0;
        let speed = 0.5;
        let lane = 0; // -1: trái, 0: giữa, 1: phải
        const laneWidth = 4;

        function init() {
            // 1. Khởi tạo không gian (Scene)
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            scene.fog = new THREE.Fog(0x020617, 10, 50);

            // 2. Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 6);
            camera.lookAt(0, 0, -5);

            // 3. Renderer (Trình hiển thị)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 4. Ánh sáng Neon
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            const light = new THREE.PointLight(0x00f0ff, 1, 100);
            light.position.set(0, 10, 10);
            scene.add(light);

            // 5. Đường chạy (Floor)
            const trackGeo = new THREE.PlaneGeometry(12, 1000);
            const trackMat = new THREE.MeshPhongMaterial({ 
                color: 0x0f172a, 
                emissive: 0x00f0ff, 
                emissiveIntensity: 0.1,
                side: THREE.DoubleSide 
            });
            const track = new THREE.Mesh(trackGeo, trackMat);
            track.rotation.x = -Math.PI / 2;
            scene.add(track);

            // Lưới (Grid) cho đẹp
            const grid = new THREE.GridHelper(1000, 100, 0x00f0ff, 0x222222);
            grid.position.y = 0.05;
            scene.add(grid);

            // 6. Người chơi (Cầu năng lượng)
            const playerGeo = new THREE.SphereGeometry(0.6, 32, 32);
            const playerMat = new THREE.MeshPhongMaterial({ color: 0xff00aa, emissive: 0xff00aa });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 0.6;
            scene.add(player);

            clock = new THREE.Clock();
            window.addEventListener('keydown', handleInput);
            spawnObjects();
            animate();
        }

        function handleInput(e) {
            if ((e.key === 'a' || e.key === 'ArrowLeft') && lane > -1) lane--;
            if ((e.key === 'd' || e.key === 'ArrowRight') && lane < 1) lane++;
        }

        function spawnObjects() {
            for (let i = 0; i < 50; i++) {
                // Tạo chướng ngại vật (Khối đỏ)
                const obsGeo = new THREE.BoxGeometry(2, 2, 2);
                const obsMat = new THREE.MeshPhongMaterial({ color: 0xff4d4d });
                const obs = new THREE.Mesh(obsGeo, obsMat);
                obs.position.set(Math.floor(Math.random() * 3 - 1) * laneWidth, 1, -i * 20 - 20);
                scene.add(obs);
                obstacles.push(obs);

                // Tạo thẻ bài Pokemon (Khối vàng xoay)
                const cardGeo = new THREE.BoxGeometry(1, 1.5, 0.1);
                const cardMat = new THREE.MeshPhongMaterial({ color: 0xffcb05, emissive: 0xffcb05 });
                const card = new THREE.Mesh(cardGeo, cardMat);
                card.position.set(Math.floor(Math.random() * 3 - 1) * laneWidth, 1, -i * 20 - 10);
                scene.add(card);
                cards.push(card);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Di chuyển người chơi mượt mà giữa các làn
            player.position.x = THREE.MathUtils.lerp(player.position.x, lane * laneWidth, 0.1);

            // Di chuyển vật thể về phía người chơi
            obstacles.forEach(obs => {
                obs.position.z += speed;
                if (obs.position.z > 5) obs.position.z = -900;

                // Kiểm tra va chạm vật cản
                if (Math.abs(obs.position.z - player.position.z) < 1 && Math.abs(obs.position.x - player.position.x) < 1) {
                    alert("GAME OVER! Score: " + score);
                    location.reload();
                }
            });

            cards.forEach(card => {
                card.position.z += speed;
                card.rotation.y += 0.05; // Xoay thẻ bài
                if (card.position.z > 5) card.position.z = -900;

                // Kiểm tra ăn thẻ
                if (Math.abs(card.position.z - player.position.z) < 1 && Math.abs(card.position.x - player.position.x) < 1) {
                    score += 10;
                    document.getElementById('scoreVal').innerText = score;
                    card.position.z = -900; // Đẩy ra xa coi như biến mất
                    speed += 0.01; // Tăng tốc độ
                }
            });

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>KaizenMC - 3D Multiworld</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00f0ff; pointer-events: none; }
        #chat-hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #555; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>KAIZEN 3D REAL-TIME</h1>
        <p>Dùng WASD để di chuyển | Mouse để xoay</p>
        <p>ONLINE: <span id="peer-count">1</span></p>
    </div>
    <div id="chat-hint">Mọi người đang ở trong cùng một không gian số...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>

    <script>
        // 1. THIẾT LẬP KẾT NỐI (CHƠI CHUNG)
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const world = gun.get('kaizen-mc-3d-world');
        const myId = Math.random().toString(36).substr(2, 9);
        const players = {};

        // 2. KHỞI TẠO 3D ENGINE
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Nền lưới Cyber
        const grid = new THREE.GridHelper(100, 50, 0xff00aa, 0x222222);
        scene.add(grid);

        // Ánh sáng
        const light = new THREE.PointLight(0x00f0ff, 1, 100);
        light.position.set(0, 10, 0);
        scene.add(light);

        // 3. TẠO NHÂN VẬT (CỦA MÌNH)
        const createPlayerMesh = (color = 0x00f0ff) => {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color, wireframe: true }));
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            head.position.y = 0.8;
            group.add(body, head);
            return group;
        };

        const myMesh = createPlayerMesh(0x00f0ff);
        scene.add(myMesh);
        camera.position.set(0, 5, 10);
        camera.lookAt(myMesh.position);

        // 4. LOGIC DI CHUYỂN
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function updateMovement() {
            let moved = false;
            if (keys['w']) { myMesh.position.z -= 0.1; moved = true; }
            if (keys['s']) { myMesh.position.z += 0.1; moved = true; }
            if (keys['a']) { myMesh.position.x -= 0.1; moved = true; }
            if (keys['d']) { myMesh.position.x += 0.1; moved = true; }

            if (moved) {
                // Gửi vị trí lên hệ thống để người khác thấy
                world.get(myId).put({ x: myMesh.position.x, z: myMesh.position.z });
            }
            camera.position.lerp(new THREE.Vector3(myMesh.position.x, 5, myMesh.position.z + 10), 0.1);
        }

        // 5. ĐỒNG BỘ CÁC NGƯỜI CHƠI KHÁC
        world.map().once((data, id) => {
            if (id === myId) return;
            if (!players[id]) {
                players[id] = createPlayerMesh(0xff00aa);
                scene.add(players[id]);
            }
            players[id].position.x = data.x;
            players[id].position.z = data.z;
        });

        // 6. RENDER LOOP
        function animate() {
            requestAnimationFrame(animate);
            updateMovement();
            
            // Hiệu ứng xoay nhẹ cho các player khác nhìn cho "bay bổng"
            Object.values(players).forEach(p => p.rotation.y += 0.01);
            myMesh.rotation.y += 0.01;

            renderer.render(scene, camera);
        }

        animate();

        // Fix co giãn màn hình
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hứng Bóng Đơn Giản</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { border: 2px solid #fff; background: #000; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .score { position: absolute; top: 20px; font-size: 24px; }
    </style>
</head>
<body>

    <div class="score">Điểm: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        // Cấu hình màn hình
        canvas.width = 400;
        canvas.height = 500;

        // Thông số bóng
        let ball = { x: 200, y: 200, dx: 4, dy: 4, radius: 10 };
        // Thông số thanh đỡ
        let paddle = { width: 80, height: 10, x: 160, speed: 7 };
        let score = 0;
        let rightPressed = false;
        let leftPressed = false;

        // Bắt sự kiện bàn phím
        document.addEventListener("keydown", (e) => {
            if(e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
            if(e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
        });
        document.addEventListener("keyup", (e) => {
            if(e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
            if(e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
        });

        function draw() {
            // Xóa canvas sau mỗi khung hình
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Vẽ bóng
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#00ff88";
            ctx.fill();
            ctx.closePath();

            // Vẽ thanh đỡ
            ctx.fillStyle = "#fff";
            ctx.fillRect(paddle.x, canvas.height - paddle.height - 10, paddle.width, paddle.height);

            // Di chuyển bóng
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Va chạm tường trái/phải
            if(ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) ball.dx *= -1;
            // Va chạm tường trên
            if(ball.y - ball.radius < 0) ball.dy *= -1;

            // Va chạm thanh đỡ
            if(ball.y + ball.radius > canvas.height - paddle.height - 10) {
                if(ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                    ball.dy = -ball.dy;
                    score++;
                    scoreElement.innerText = score;
                    ball.dx *= 1.05; // Tăng tốc độ dần cho khó
                    ball.dy *= 1.05;
                } else if (ball.y > canvas.height) {
                    alert("GAME OVER! Điểm của bạn: " + score);
                    document.location.reload();
                }
            }

            // Di chuyển thanh đỡ
            if(rightPressed && paddle.x < canvas.width - paddle.width) paddle.x += paddle.speed;
            if(leftPressed && paddle.x > 0) paddle.x -= paddle.speed;

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>

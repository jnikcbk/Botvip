```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Easy Shooter 3D</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px
}

#crosshair{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:22px;
color:white
}

#joy{
position:absolute;
bottom:40px;
left:40px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,0.1);
display:none
}

#stick{
position:absolute;
left:50%;
top:50%;
width:40px;
height:40px;
background:white;
border-radius:50%;
transform:translate(-50%,-50%)
}
</style>
</head>

<body>

<div id="ui">Score: <span id="score">0</span></div>
<div id="crosshair">+</div>

<div id="joy"><div id="stick"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const isMobile = 'ontouchstart' in window

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,0.7))

let light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,5)
scene.add(light)

let floor = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshPhongMaterial({color:0x222222})
)
floor.rotation.x=-Math.PI/2
scene.add(floor)

camera.position.set(0,2,5)

let yaw=0
let pitch=0

let keys={}
let speed=0.15

window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true)
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false)

document.body.addEventListener("click",()=>{
if(!isMobile) document.body.requestPointerLock()
})

document.addEventListener("mousemove",e=>{
if(document.pointerLockElement){

yaw -= e.movementX*0.002
pitch -= e.movementY*0.002

pitch=Math.max(-1.2,Math.min(1.2,pitch))

}
})

let targets=[]
let score=0

function spawn(){

let cube=new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshPhongMaterial({color:0xff4444})
)

cube.position.set(
(Math.random()-0.5)*40,
Math.random()*4+1,
(Math.random()-0.5)*40
)

scene.add(cube)
targets.push(cube)

}

for(let i=0;i<12;i++) spawn()

let raycaster=new THREE.Raycaster()

window.addEventListener("click",shoot)

function shoot(){

raycaster.setFromCamera(new THREE.Vector2(0,0),camera)

let hit=raycaster.intersectObjects(targets)

if(hit.length){

let obj=hit[0].object
scene.remove(obj)
targets.splice(targets.indexOf(obj),1)

score++
document.getElementById("score").innerText=score

spawn()

}

}

if(isMobile){

let joy=document.getElementById("joy")
let stick=document.getElementById("stick")
joy.style.display="block"

let moveX=0
let moveZ=0

joy.addEventListener("touchmove",e=>{

let rect=joy.getBoundingClientRect()

let cx=rect.left+60
let cy=rect.top+60

let dx=e.touches[0].clientX-cx
let dy=e.touches[0].clientY-cy

let dist=Math.min(40,Math.hypot(dx,dy))
let ang=Math.atan2(dy,dx)

moveX=Math.cos(ang)*(dist/40)
moveZ=Math.sin(ang)*(dist/40)

stick.style.left=`calc(50% + ${Math.cos(ang)*dist}px)`
stick.style.top=`calc(50% + ${Math.sin(ang)*dist}px)`

})

joy.addEventListener("touchend",()=>{
moveX=0
moveZ=0
stick.style.left="50%"
stick.style.top="50%"
})

window.mobileMove=()=>{

camera.position.x += moveX*0.4
camera.position.z += moveZ*0.4

}

}else{

window.mobileMove=()=>{}

}

function update(){

if(keys["w"]){
camera.position.x += Math.sin(yaw)*speed
camera.position.z += Math.cos(yaw)*speed
}

if(keys["s"]){
camera.position.x -= Math.sin(yaw)*speed
camera.position.z -= Math.cos(yaw)*speed
}

if(keys["a"]){
camera.position.x += Math.cos(yaw)*speed
camera.position.z -= Math.sin(yaw)*speed
}

if(keys["d"]){
camera.position.x -= Math.cos(yaw)*speed
camera.position.z += Math.sin(yaw)*speed
}

camera.rotation.order="YXZ"
camera.rotation.y=yaw
camera.rotation.x=pitch

mobileMove()

}

function animate(){

requestAnimationFrame(animate)

update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>

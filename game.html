<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaizen 3D Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: #00f0ff; font-family: sans-serif; pointer-events: none; z-index: 10; }
        /* Joystick ảo */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid #00f0ff; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #00f0ff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #00f0ff; }
    </style>
</head>
<body>
    <div id="ui">
        <b>KAIZEN 3D MOBILE</b><br>
        Online: <span id="count">1</span>
    </div>
    
    <div id="joystick-zone"><div id="joystick-stick"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>

    <script>
        // --- ĐỒNG BỘ MULTIPLAYER ---
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const world = gun.get('kaizen_v4_3d');
        const myId = 'P_' + Math.random().toString(36).substr(2, 5);
        const players = {};

        // --- 3D SCENE ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 5, 40);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Tắt antialias cho mượt máy yếu
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Nền Cyber Grid
        const grid = new THREE.GridHelper(200, 60, 0xff00aa, 0x111111);
        scene.add(grid);

        // Tạo nhân vật
        function createBox(color) {
            const g = new THREE.Group();
            const b = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshBasicMaterial({ color, wireframe: true }));
            g.add(b);
            return g;
        }

        const myMesh = createBox(0x00f0ff);
        scene.add(myMesh);
        camera.position.set(0, 5, 8);

        // --- ĐIỀU KHIỂN JOYSTICK ---
        let moveX = 0, moveZ = 0;
        const stick = document.getElementById('joystick-stick');
        const zone = document.getElementById('joystick-zone');

        zone.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = zone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.min(60, Math.sqrt(dx*dx + dy*dy));
            const angle = Math.atan2(dy, dx);

            moveX = Math.cos(angle) * (dist / 60) * 0.15;
            moveZ = Math.sin(angle) * (dist / 60) * 0.15;

            stick.style.left = `calc(50% + ${Math.cos(angle) * dist}px)`;
            stick.style.top = `calc(50% + ${Math.sin(angle) * dist}px)`;
        });

        zone.addEventListener('touchend', () => {
            moveX = 0; moveZ = 0;
            stick.style.left = '50%'; stick.style.top = '50%';
        });

        // --- ĐỒNG BỘ DATA ---
        world.map().on((data, id) => {
            if (id === myId || !data) return;
            if (!players[id]) {
                players[id] = createBox(0xff00aa);
                scene.add(players[id]);
            }
            players[id].position.set(data.x, 0, data.z);
        });

        // --- RENDER ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (moveX !== 0 || moveZ !== 0) {
                myMesh.position.x += moveX;
                myMesh.position.z += moveZ;
                world.get(myId).put({ x: myMesh.position.x, z: myMesh.position.z });
            }

            camera.position.x = THREE.MathUtils.lerp(camera.position.x, myMesh.position.x, 0.1);
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, myMesh.position.z + 8, 0.1);
            camera.lookAt(myMesh.position);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

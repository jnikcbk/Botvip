<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Catcher</title>
    <style>
        body { margin: 0; background: #2d3436; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; }
        canvas { background: url('https://img.freepik.com/free-vector/pixel-art-grass-background_52683-113063.jpg'); background-size: cover; border: 4px solid #f1c40f; border-radius: 10px; cursor: crosshair; }
        .info { color: white; margin-bottom: 10px; text-align: center; }
        h1 { color: #ffcb05; text-shadow: 2px 2px #3b4cca; margin: 0; }
    </style>
</head>
<body>

    <div class="info">
        <h1>POKEMON CATCHER</h1>
        <p>Bấm vào các vòng tròn Pokemon để bắt! Đừng để chúng biến mất.</p>
        <h2>Điểm: <span id="score">0</span> | Thời gian: <span id="timer">30</span>s</h2>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const timerEl = document.getElementById("timer");

        canvas.width = 600;
        canvas.height = 400;

        let score = 0;
        let timeLeft = 30;
        let pokemons = [];
        let gameActive = true;

        // Các loại Pokemon (giả lập bằng màu sắc và kích thước)
        const pokeTypes = [
            { name: "Pikachu", color: "#f1c40f", radius: 25, points: 10 },
            { name: "Charmander", color: "#e67e22", radius: 20, points: 20 },
            { name: "Squirtle", color: "#3498db", radius: 18, points: 30 },
            { name: "Mewtwo", color: "#9b59b6", radius: 12, points: 100 } // Hiếm và khó bấm
        ];

        function createPokemon() {
            if (!gameActive) return;
            const type = pokeTypes[Math.floor(Math.random() * pokeTypes.length)];
            const pokemon = {
                x: Math.random() * (canvas.width - 50) + 25,
                y: Math.random() * (canvas.height - 50) + 25,
                ...type,
                life: 2000 + Math.random() * 2000, // Tồn tại trong 2-4 giây
                spawnTime: Date.now()
            };
            pokemons.push(pokemon);

            // Cứ sau 0.8s lại tạo 1 con mới
            setTimeout(createPokemon, 800);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const now = Date.now();

            pokemons = pokemons.filter(p => {
                const age = now - p.spawnTime;
                if (age > p.life) return false; // Pokemon biến mất nếu quá thời gian

                // Vẽ hiệu ứng vòng tròn (Pokeball style)
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Vẽ mắt đơn giản
                ctx.fillStyle = "black";
                ctx.fillRect(p.x - 5, p.y - 5, 4, 4);
                ctx.fillRect(p.x + 2, p.y - 5, 4, 4);

                return true;
            });

            if (gameActive) requestAnimationFrame(draw);
        }

        // Xử lý khi click (ném Pokeball)
        canvas.addEventListener("mousedown", (e) => {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            pokemons.forEach((p, index) => {
                const dist = Math.sqrt((mouseX - p.x)**2 + (mouseY - p.y)**2);
                if (dist < p.radius) {
                    score += p.points;
                    scoreEl.innerText = score;
                    pokemons.splice(index, 1); // Bắt được thì xóa khỏi mảng
                }
            });
        });

        // Đếm ngược thời gian
        const countdown = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                gameActive = false;
                clearInterval(countdown);
                alert("Hết giờ! Bạn đã bắt được số Pokemon trị giá: " + score + " điểm!");
                location.reload();
            }
        }, 1000);

        createPokemon();
        draw();
    </script>
</body>
</html>

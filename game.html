<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaizenMC - Cyber Runner Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f0ff; --neon-pink: #ff00aa; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; touch-action: none; }
        
        /* UI Chính */
        #hud {
            position: absolute; top: 20px; left: 20px; color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue); z-index: 10;
        }
        #score-container { font-size: 28px; font-weight: 900; }
        #speedometer { font-size: 14px; opacity: 0.8; margin-top: 5px; }

        /* Hiệu ứng nháy khi ăn item */
        .flash { animation: flash-anim 0.2s; }
        @keyframes flash-anim {
            0% { background: white; }
            100% { background: transparent; }
        }

        /* Màn hình kết thúc */
        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: white; display: none;
        }
        .panel {
            padding: 50px; border: 3px solid var(--neon-pink);
            box-shadow: 0 0 40px var(--neon-pink); background: #050010;
            text-align: center; border-radius: 20px;
        }
        h1 { font-size: 60px; margin: 0; color: var(--neon-pink); letter-spacing: 5px; }
        .stat { font-size: 20px; margin: 20px 0; }
        .btn-retry {
            background: var(--neon-blue); color: #000; border: none;
            padding: 15px 40px; font-family: 'Orbitron'; font-weight: 900;
            font-size: 18px; cursor: pointer; transition: 0.3s;
        }
        .btn-retry:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--neon-blue); }

        /* Progress Bar cho kỹ năng */
        #boost-bar {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 10px; border: 1px solid var(--neon-blue);
        }
        #boost-fill { width: 0%; height: 100%; background: var(--neon-blue); transition: 0.1s; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="score-container">DISTANCE: <span id="dist-val">0</span>m</div>
        <div id="speedometer">VELOCITY: <span id="speed-val">0</span> KM/H</div>
    </div>

    <div id="boost-bar"><div id="boost-fill"></div></div>

    <div id="overlay">
        <div class="panel">
            <h1>SYSTEM CRASH</h1>
            <div class="stat">COORDINATES REACHED: <span id="final-dist">0</span>m</div>
            <button class="btn-retry" onclick="location.reload()">REBOOT SYSTEM</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        /**
         * CYBER RUNNER ULTIMATE ENGINE
         * Bản quyền thuộc về KaizenMC
         * Quy mô: ~500 dòng code logic
         */

        // --- CẤU HÌNH HỆ THỐNG ---
        const CONFIG = {
            LANE_WIDTH: 4,
            CAR_Y: 0.5,
            INITIAL_SPEED: 0.7,
            MAX_SPEED: 3.5,
            OBSTACLE_SPAWN_DIST: 50,
            BUILDING_COUNT: 40
        };

        // --- BIẾN TOÀN CỤC ---
        let scene, camera, renderer, clock;
        let playerCar, road, stars, sun;
        let obstacles = [], buildings = [], powerUps = [];
        let score = 0, speed = CONFIG.INITIAL_SPEED, targetLane = 0;
        let isDead = false, invulnerable = 0;

        // --- KHỞI TẠO HỆ THỐNG ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020005);
            scene.fog = new THREE.FogExp2(0x020005, 0.03);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1500);
            camera.position.set(0, 4, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            createPlayer();
            createEnvironment();
            setupLights();
            createObstaclesPool();
            
            // Event Listeners
            window.addEventListener('keydown', handleInput);
            window.addEventListener('touchstart', handleTouch);
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        // --- TẠO NGƯỜI CHƠI (XE SIÊU CẤP) ---
        function createPlayer() {
            playerCar = new THREE.Group();
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x080808, metalness: 1, roughness: 0.2 });
            const neonMat = new THREE.MeshStandardMaterial({ color: 0x00f0ff, emissive: 0x00f0ff, emissiveIntensity: 2 });

            // Chassis
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 4), bodyMat);
            playerCar.add(body);

            // Cabin
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.6, 1.5), 
                new THREE.MeshPhongMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.4 }));
            cabin.position.set(0, 0.5, 0);
            playerCar.add(cabin);

            // Wings & Fins
            const wing = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 1), bodyMat);
            wing.position.set(0, 0.2, 0.5);
            playerCar.add(wing);

            // Neon Stripes
            const stripeL = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.1, 3.8), neonMat);
            stripeL.position.set(0.85, 0.2, 0);
            playerCar.add(stripeL);
            const stripeR = stripeL.clone();
            stripeR.position.x = -0.85;
            playerCar.add(stripeR);

            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.5, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x00f0ff, emissiveIntensity: 1 });
            const wPositions = [[1,1.3], [-1,1.3], [1,-1.3], [-1,-1.3]];
            wPositions.forEach(p => {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.z = Math.PI/2;
                w.position.set(p[0], -0.1, p[1]);
                playerCar.add(w);
            });

            // Thruster Flame
            const flame = new THREE.Mesh(new THREE.ConeGeometry(0.5, 2, 12), 
                new THREE.MeshBasicMaterial({ color: 0xff00aa, transparent: true, opacity: 0.8 }));
            flame.rotation.x = Math.PI/2;
            flame.position.z = 2.8;
            flame.name = "flame";
            playerCar.add(flame);

            scene.add(playerCar);
        }

        // --- TẠO MÔI TRƯỜNG (PHỐ THỊ CYBERPUNK) ---
        function createEnvironment() {
            // Road
            const roadGeo = new THREE.PlaneGeometry(20, 1000, 1, 100);
            const roadMat = new THREE.MeshBasicMaterial({ color: 0xff00aa, wireframe: true, transparent: true, opacity: 0.2 });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // Buildings
            for(let i=0; i < CONFIG.BUILDING_COUNT; i++) {
                const h = Math.random() * 30 + 10;
                const w = Math.random() * 5 + 5;
                const geo = new THREE.BoxGeometry(w, h, w);
                const mat = new THREE.MeshStandardMaterial({ color: 0x050505, emissive: 0xff00aa, emissiveIntensity: 0.1 });
                const b = new THREE.Mesh(geo, mat);
                
                const side = Math.random() > 0.5 ? 1 : -1;
                b.position.set(side * (Math.random() * 20 + 15), h/2, -i * 25);
                scene.add(b);
                buildings.push(b);
            }

            // Stars
            const sGeo = new THREE.BufferGeometry();
            const sPos = [];
            for(let i=0; i<5000; i++) sPos.push((Math.random()-0.5)*1000, Math.random()*500, (Math.random()-0.5)*1000);
            sGeo.setAttribute('position', new THREE.Float32BufferAttribute(sPos, 3));
            stars = new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 }));
            scene.add(stars);

            // Sun (Neon Circle)
            const sunGeo = new THREE.CircleGeometry(50, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xff00aa, transparent: true, opacity: 0.5 });
            sun = new THREE.Mesh(sunGeo, sunMat);
            sun.position.set(0, 10, -400);
            scene.add(sun);
        }

        function setupLights() {
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            const pLight = new THREE.PointLight(0x00f0ff, 2, 20);
            pLight.position.set(0, 5, 0);
            scene.add(pLight);
        }

        // --- QUẢN LÝ VẬT CẢN & ITEMS ---
        function createObstaclesPool() {
            for(let i=0; i<10; i++) {
                spawnObstacle(-100 - (i * CONFIG.OBSTACLE_SPAWN_DIST));
            }
        }

        function spawnObstacle(z) {
            const types = ['wall', 'pillar', 'laser'];
            const type = types[Math.floor(Math.random() * types.length)];
            let geo, mat, mesh;

            if(type === 'wall') {
                geo = new THREE.BoxGeometry(3, 2, 1);
                mat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 });
            } else {
                geo = new THREE.CylinderGeometry(0.5, 0.5, 10, 8);
                mat = new THREE.MeshStandardMaterial({ color: 0x00f0ff, emissive: 0x00f0ff });
            }

            mesh = new THREE.Mesh(geo, mat);
            mesh.position.set((Math.floor(Math.random()*3)-1)*CONFIG.LANE_WIDTH, 1, z);
            scene.add(mesh);
            obstacles.push({ mesh, type });
        }

        // --- LOGIC ĐIỀU KHIỂN ---
        function handleInput(e) {
            if(isDead) return;
            if(e.key === 'ArrowLeft' || e.key === 'a') targetLane = Math.max(-1, targetLane - 1);
            if(e.key === 'ArrowRight' || e.key === 'd') targetLane = Math.min(1, targetLane + 1);
        }

        let touchX = 0;
        function handleTouch(e) {
            touchX = e.touches[0].clientX;
            if(touchX < window.innerWidth/2) targetLane = Math.max(-1, targetLane - 1);
            else targetLane = Math.min(1, targetLane + 1);
        }

        // --- VÒNG LẶP CHÍNH (FRAME HANDLER) ---
        function animate() {
            if(isDead) return;
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime();

            updatePhysics();
            updateEnvironment(delta);
            checkCollisions();
            updateUI();

            renderer.render(scene, camera);
        }

        function updatePhysics() {
            // Speed progression
            if(speed < CONFIG.MAX_SPEED) speed += 0.0005;
            
            // Player movement
            playerCar.position.x = THREE.MathUtils.lerp(playerCar.position.x, targetLane * CONFIG.LANE_WIDTH, 0.15);
            playerCar.rotation.z = -(playerCar.position.x - targetLane * CONFIG.LANE_WIDTH) * 0.2;
            playerCar.position.y = CONFIG.CAR_Y + Math.sin(Date.now() * 0.01) * 0.1;

            // Flame flicker
            const flame = playerCar.getObjectByName("flame");
            flame.scale.setScalar(1 + Math.random() * 0.2);
            flame.material.opacity = 0.5 + Math.random() * 0.5;
        }

        function updateEnvironment(t) {
            // Road scroll
            road.position.z += speed;
            if(road.position.z > 50) road.position.z = 0;

            // Stars move slower (Parallax)
            stars.position.z += speed * 0.5;
            if(stars.position.z > 500) stars.position.z = 0;

            // Obstacles scroll
            obstacles.forEach(obj => {
                obj.mesh.position.z += speed;
                if(obj.mesh.position.z > 20) {
                    obj.mesh.position.z = -400;
                    obj.mesh.position.x = (Math.floor(Math.random()*3)-1)*CONFIG.LANE_WIDTH;
                    score += 10;
                }
            });

            // Buildings pulse with music-like rhythm
            buildings.forEach((b, i) => {
                b.position.z += speed;
                const scale = 1 + Math.sin(t * 2 + i) * 0.1;
                b.scale.set(1, scale, 1);
                if(b.position.z > 50) b.position.z = -450;
            });

            // Camera follow & shake
            camera.position.x = THREE.MathUtils.lerp(camera.position.x, playerCar.position.x * 0.5, 0.05);
            camera.position.y = 4 + Math.random() * (speed * 0.02);
        }

        function checkCollisions() {
            const playerBox = new THREE.Box3().setFromObject(playerCar);
            
            obstacles.forEach(obj => {
                const obBox = new THREE.Box3().setFromObject(obj.mesh);
                if(playerBox.intersectsBox(obBox)) {
                    die();
                }
            });
        }

        function updateUI() {
            document.getElementById('dist-val').innerText = Math.floor(score);
            document.getElementById('speed-val').innerText = Math.floor(speed * 100);
            document.getElementById('boost-fill').style.width = (speed / CONFIG.MAX_SPEED * 100) + "%";
        }

        function die() {
            isDead = true;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('final-dist').innerText = score;
            
            // Particle Explosion (Simple)
            playerCar.visible = false;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // KÍCH HOẠT HỆ THỐNG
        init();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaizenMC - Pokemon Warp Hunter 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; touch-action: none; user-select: none; }
        
        #ui {
            position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around;
            color: #00f0ff; font-size: 20px; text-shadow: 0 0 10px #00f0ff; pointer-events: none; z-index: 10;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; border: 2px solid rgba(0, 240, 255, 0.5);
            border-radius: 50%; pointer-events: none; z-index: 5;
        }

        #game-over {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px);
        }
        #game-over h1 { color: #ff00aa; font-size: 50px; text-shadow: 0 0 20px #ff00aa; }
        #game-over button {
            padding: 15px 40px; background: transparent; border: 2px solid #00f0ff;
            color: #00f0ff; font-family: 'Orbitron'; font-size: 20px; cursor: pointer; border-radius: 10px;
        }

        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="scoreVal">0</span></div>
        <div>HP: <span id="hpVal">100</span>%</div>
    </div>

    <div id="crosshair"></div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p style="color:white">PHI THUYỀN ĐÃ BỊ HƯ HỎNG NẶNG</p>
        <button onclick="location.reload()">SỬA CHỮA & THỬ LẠI</button>
    </div>

    <script>
        let scene, camera, renderer, raycaster, mouse;
        let pokemons = [], stars = [];
        let score = 0, hp = 100, isGameOver = false;
        let speed = 0.8;

        const pokeIDs = [25, 6, 9, 3, 150, 151, 384]; // Pikachu, Charizard...

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.02);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Tạo hiệu ứng Warp Stars
            const starGeo = new THREE.BufferGeometry();
            const positions = [];
            for(let i=0; i<1500; i++) {
                positions.push(Math.random()*40-20, Math.random()*40-20, Math.random()*-100);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
            stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // Ánh sáng
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            // Sự kiện click/touch
            window.addEventListener('mousedown', onSelect);
            window.addEventListener('touchstart', onSelect);

            spawnLoop();
            animate();
        }

        function spawnLoop() {
            if(isGameOver) return;
            spawnPokemon();
            setTimeout(spawnLoop, 1000 - (score * 2)); // Càng nhiều điểm spawn càng nhanh
        }

        function spawnPokemon() {
            const id = pokeIDs[Math.floor(Math.random() * pokeIDs.length)];
            const texture = new THREE.TextureLoader().load(`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`);
            
            const material = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(material);
            
            // Spawn ở xa (Z âm) và ngẫu nhiên X, Y
            sprite.position.set(Math.random()*10-5, Math.random()*10-5, -60);
            sprite.scale.set(3, 3, 1);
            
            scene.add(sprite);
            pokemons.push(sprite);
        }

        function onSelect(event) {
            if(isGameOver) return;

            // Lấy tọa độ chuột/touch
            let clientX = event.clientX || event.touches[0].clientX;
            let clientY = event.clientY || event.touches[0].clientY;

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(pokemons);

            if (intersects.length > 0) {
                const target = intersects[0].object;
                captureEffect(target.position);
                scene.remove(target);
                pokemons = pokemons.filter(p => p !== target);
                score += 10;
                document.getElementById('scoreVal').innerText = score;
            }
        }

        function captureEffect(pos) {
            // Hiệu ứng nổ đơn giản khi bắt được
            const geo = new THREE.SphereGeometry(0.5, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(pos);
            scene.add(mesh);
            setTimeout(() => scene.remove(mesh), 200);
        }

        function animate() {
            if(isGameOver) return;
            requestAnimationFrame(animate);

            // Hiệu ứng sao bay (Warp)
            const positions = stars.geometry.attributes.position.array;
            for(let i=0; i<positions.length; i+=3) {
                positions[i+2] += speed * 2;
                if(positions[i+2] > 5) positions[i+2] = -100;
            }
            stars.geometry.attributes.position.needsUpdate = true;

            // Di chuyển Pokemon về phía camera
            pokemons.forEach((p, index) => {
                p.position.z += speed;
                
                // Nếu Pokemon đâm trúng màn hình (vượt quá camera)
                if(p.position.z > 4) {
                    hp -= 20;
                    document.getElementById('hpVal').innerText = hp;
                    scene.remove(p);
                    pokemons.splice(index, 1);
                    
                    if(hp <= 0) endGame();
                }
            });

            renderer.render(scene, camera);
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('game-over').style.display = 'flex';
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>

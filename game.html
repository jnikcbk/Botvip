<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>KaizenMC - Pokemon Shooter Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f0ff; --pink: #ff00aa; }
        body { margin: 0; background: #020617; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        .ui-top { position: absolute; top: 20px; display: flex; gap: 40px; background: rgba(0,0,0,0.5); padding: 15px 30px; border-radius: 20px; border: 1px solid var(--neon); backdrop-filter: blur(10px); }
        .stat span { color: var(--neon); font-weight: 900; font-size: 1.5rem; }

        canvas { 
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            border: 3px solid var(--neon);
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.2);
            cursor: none; /* Ẩn chuột để dùng tâm ngắm riêng */
        }

        .combo-text {
            position: absolute;
            font-size: 3rem;
            font-weight: 900;
            color: var(--pink);
            pointer-events: none;
            animation: zoomOut 0.5s ease-out forwards;
        }

        @keyframes zoomOut {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="ui-top">
        <div class="stat">SCORE: <span id="score">0</span></div>
        <div class="stat">COMBO: <span id="combo">0</span></div>
        <div class="stat">TIME: <span id="timer">30</span>s</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 900;
        canvas.height = 550;

        let score = 0, combo = 0, timeLeft = 30, gameActive = true;
        let mouseX = 0, mouseY = 0;
        let pokemons = [], lasers = [], particles = [];

        const pokeIDs = [6, 9, 3, 25, 150, 151, 54, 143]; // Charizard, Blastoise, Venusaur, Pikachu...
        const images = {};

        pokeIDs.forEach(id => {
            const img = new Image();
            img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
            images[id] = img;
        });

        // Lắng nghe di chuyển chuột
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        // Bắn Laser
        canvas.addEventListener('mousedown', () => {
            if(!gameActive) return;
            lasers.push({ x: canvas.width/2, y: canvas.height, tx: mouseX, ty: mouseY, life: 10 });
            checkHit();
        });

        function spawn() {
            if(!gameActive) return;
            const id = pokeIDs[Math.floor(Math.random() * pokeIDs.length)];
            pokemons.push({
                id, x: Math.random() * (canvas.width - 100) + 50,
                y: Math.random() * (canvas.height - 200) + 50,
                size: 70, 
                vx: (Math.random() - 0.5) * 4, // Pokemon biết di chuyển qua lại
                vy: (Math.random() - 0.5) * 4,
                life: 2000
            });
            setTimeout(spawn, 700);
        }

        function checkHit() {
            let hit = false;
            pokemons.forEach((p, i) => {
                const dist = Math.sqrt((mouseX - p.x)**2 + (mouseY - p.y)**2);
                if(dist < p.size/2) {
                    hit = true;
                    createExplosion(p.x, p.y, "#00f0ff");
                    score += 10 + (combo * 2);
                    combo++;
                    pokemons.splice(i, 1);
                }
            });
            if(!hit) combo = 0;
            updateUI();
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 20, color });
            }
        }

        function updateUI() {
            document.getElementById("score").innerText = score;
            document.getElementById("combo").innerText = combo;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Vẽ Pokemon & Di chuyển
            pokemons.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 50 || p.x > canvas.width-50) p.vx *= -1;
                if(p.y < 50 || p.y > canvas.height-150) p.vy *= -1;
                ctx.shadowBlur = 15; ctx.shadowColor = "rgba(0,240,255,0.5)";
                ctx.drawImage(images[p.id], p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            });

            // 2. Vẽ Lasers
            lasers = lasers.filter(l => {
                ctx.beginPath();
                ctx.strokeStyle = "white"; ctx.lineWidth = l.life;
                ctx.moveTo(l.x, l.y); ctx.lineTo(l.tx, l.ty);
                ctx.stroke();
                l.life -= 2; return l.life > 0;
            });

            // 3. Vẽ Hiệu ứng hạt (Explosion)
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
                p.life--; return p.life > 0;
            });

            // 4. Vẽ Súng & Tâm ngắm (Cannon)
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#ff00aa";
            ctx.beginPath(); // Tâm ngắm
            ctx.arc(mouseX, mouseY, 20, 0, Math.PI*2);
            ctx.moveTo(mouseX-30, mouseY); ctx.lineTo(mouseX+30, mouseY);
            ctx.moveTo(mouseX, mouseY-30); ctx.lineTo(mouseX, mouseY+30);
            ctx.stroke();

            ctx.fillStyle = "#00f0ff"; // Thân súng
            ctx.fillRect(canvas.width/2 - 20, canvas.height - 40, 40, 40);

            if(gameActive) requestAnimationFrame(draw);
        }

        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = timeLeft;
            if(timeLeft <= 0) {
                gameActive = false; clearInterval(timer);
                alert("GAME OVER! SCORE: " + score);
                location.reload();
            }
        }, 1000);

        spawn(); draw();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaizenMC - Neon Breaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Orbitron', sans-serif; cursor: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 10px; width: 100%; display: flex;
            justify-content: space-around; color: #00f0ff; font-size: 20px;
            text-shadow: 0 0 10px #00f0ff; pointer-events: none;
        }
        #game-over {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: #ff0055; z-index: 100;
        }
        .btn {
            margin-top: 20px; padding: 15px 40px; background: #00f0ff;
            color: #000; border: none; font-weight: 900; cursor: pointer;
            font-family: 'Orbitron'; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>CORE HEALTH: <span id="hp">100</span>%</div>
        <div>DATA SAVED: <span id="score">0</span></div>
    </div>

    <div id="game-over">
        <h1 style="font-size: 50px;">SERVER CRASHED</h1>
        <p style="color: white;">SCORE: <span id="final-score">0</span></p>
        <button class="btn" onclick="location.reload()">REBOOT SYSTEM</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0, hp = 100, gameActive = true;
    let particles = [], blocks = [];
    let mouse = { x: canvas.width / 2, y: canvas.height - 100 };

    class Block {
        constructor() {
            this.size = Math.random() * 30 + 20;
            this.x = Math.random() * (canvas.width - this.size);
            this.y = -this.size;
            this.speed = Math.random() * 2 + 2 + (score / 50);
            this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            this.text = ["BUG", "VIRUS", "LAG", "ERROR"][Math.floor(Math.random()*4)];
        }
        draw() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.fillStyle = "#000";
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.strokeRect(this.x, this.y, this.size, this.size);
            
            ctx.shadowBlur = 0;
            ctx.fillStyle = this.color;
            ctx.font = "10px Orbitron";
            ctx.fillText(this.text, this.x, this.y - 5);
        }
        update() {
            this.y += this.speed;
            if (this.y > canvas.height) {
                hp -= 10;
                document.getElementById('hp').innerText = hp;
                blocks.splice(blocks.indexOf(this), 1);
                if (hp <= 0) endGame();
            }
        }
    }

    function endGame() {
        gameActive = false;
        document.getElementById('game-over').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<15; i++) {
            particles.push({
                x, y,
                vx: (Math.random()-0.5)*10,
                vy: (Math.random()-0.5)*10,
                size: Math.random()*3,
                life: 1,
                color
            });
        }
    }

    function animate() {
        if (!gameActive) return;
        ctx.fillStyle = "rgba(5, 5, 5, 0.2)"; // Màn hình mờ dần tạo trail
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Vẽ kiếm Laser
        ctx.beginPath();
        ctx.moveTo(mouse.x - 60, mouse.y);
        ctx.lineTo(mouse.x + 60, mouse.y);
        ctx.lineWidth = 8;
        ctx.strokeStyle = "#fff";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#00f0ff";
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Quản lý Block
        if (Math.random() < 0.03 + (score/2000)) blocks.push(new Block());

        blocks.forEach((b, index) => {
            b.update();
            b.draw();

            // Va chạm với kiếm (Chém)
            if (b.y + b.size > mouse.y - 10 && b.y < mouse.y + 10 &&
                b.x + b.size > mouse.x - 65 && b.x < mouse.x + 65) {
                createExplosion(b.x + b.size/2, b.y + b.size/2, b.color);
                blocks.splice(index, 1);
                score += 1;
                document.getElementById('score').innerText = score;
            }
        });

        // Hạt hiệu ứng
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
            if (p.life <= 0) particles.splice(i, 1);
        });

        requestAnimationFrame(animate);
    }

    window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('touchmove', e => {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
        e.preventDefault();
    }, { passive: false });

    animate();
</script>
</body>
</html>

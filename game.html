<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>KaizenMC - Pokemon Battle RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f0ff; --pink: #ff00aa; --yellow: #ffcb05; }
        body { 
            margin: 0; background: #020617; color: white; 
            font-family: 'Orbitron', sans-serif; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; 
        }

        /* Giao diện UI xịn xò */
        .ui-container {
            position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between;
            background: rgba(15, 23, 42, 0.8); padding: 20px; border-radius: 15px; border: 1px solid var(--blue);
            backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
        }

        .hp-bar-container {
            position: fixed; bottom: 50px; width: 400px; height: 30px;
            background: #333; border: 2px solid #fff; border-radius: 15px; overflow: hidden;
        }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4d4d, #ff0000); transition: 0.1s; }

        canvas { 
            background: url('https://wallpaperaccess.com/full/585193.png') center/cover;
            border: 4px solid var(--blue); border-radius: 20px; cursor: url('https://cur.cursors-4u.net/games/gam-13/gam1214.cur'), auto;
        }

        /* Hiệu ứng số damage bay lên */
        .dmg {
            position: absolute; color: var(--yellow); font-weight: 900; font-size: 24px;
            pointer-events: none; animation: flyUp 0.6s ease-out forwards; text-shadow: 0 0 5px black;
        }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }

        .ult-btn {
            position: fixed; right: 50px; bottom: 50px; padding: 20px;
            background: var(--pink); border-radius: 50%; border: none; color: white;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer;
            box-shadow: 0 0 20px var(--pink); display: none;
        }
    </style>
</head>
<body>

    <div class="ui-container">
        <div>LEVEL: <span id="lvl" style="color:var(--yellow)">1</span></div>
        <div style="text-align: center">ĐANG CHIẾN ĐẤU: <br><span id="pkm-name" style="color:var(--blue)">---</span></div>
        <div>SCORE: <span id="score" style="color:var(--pink)">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="hp-bar-container">
        <div id="hp-fill"></div>
        <div style="position:absolute; top:5px; width:100%; text-align:center; font-size:12px">ENEMY HP</div>
    </div>

    <button id="ultBtn" class="ult-btn">KAIZEN<br>ULTI</button>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 900; canvas.height = 500;

        let score = 0, currentLevel = 1, ultCharge = 0;
        let activePokemon = null;
        let shake = 0;

        const pokeData = [
            { id: 25, name: "Pikachu", hp: 100, size: 150 },
            { id: 6, name: "Charizard", hp: 500, size: 220 },
            { id: 150, name: "Mewtwo", hp: 2000, size: 250 },
            { id: 384, name: "Rayquaza", hp: 5000, size: 300 }
        ];

        function spawn() {
            const data = pokeData[Math.min(currentLevel - 1, pokeData.length - 1)];
            activePokemon = {
                ...data,
                maxHp: data.hp * currentLevel,
                currentHp: data.hp * currentLevel,
                x: canvas.width/2, y: canvas.height/2 + 50,
                img: new Image()
            };
            activePokemon.img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${data.id}.png`;
            document.getElementById("pkm-name").innerText = data.name.toUpperCase();
        }

        canvas.addEventListener('mousedown', (e) => {
            if(!activePokemon) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Kiểm tra click trúng Pokemon
            const dist = Math.sqrt((x - activePokemon.x)**2 + (y - (activePokemon.y - 50))**2);
            if(dist < activePokemon.size/2) {
                dealDamage(x, y);
            }
        });

        function dealDamage(x, y) {
            let dmg = 20 + (currentLevel * 5);
            if(ultCharge >= 100) dmg *= 5; // X5 damage khi dùng Ulti

            activePokemon.currentHp -= dmg;
            score += 10;
            ultCharge += 2;
            shake = 10; // Rung màn hình

            // Hiệu ứng số damage
            const div = document.createElement('div');
            div.className = 'dmg';
            div.style.left = x + 'px'; div.style.top = y + 'px';
            div.innerText = `-${dmg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 600);

            if(activePokemon.currentHp <= 0) {
                currentLevel++;
                score += 1000;
                spawn();
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById("score").innerText = score;
            document.getElementById("lvl").innerText = currentLevel;
            const hpPercent = (activePokemon.currentHp / activePokemon.maxHp) * 100;
            document.getElementById("hp-fill").style.width = hpPercent + "%";
            
            if(ultCharge >= 100) document.getElementById("ultBtn").style.display = "block";
            else document.getElementById("ultBtn").style.display = "none";
        }

        document.getElementById("ultBtn").onclick = () => {
            ultCharge = 0;
            alert("KAIZEN MODE ACTIVATED: SÁT THƯƠNG X5!");
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Hiệu ứng Rung (Screen Shake)
            let sx = (Math.random()-0.5) * shake;
            let sy = (Math.random()-0.5) * shake;
            if(shake > 0) shake *= 0.9;

            if(activePokemon && activePokemon.img.complete) {
                ctx.save();
                ctx.translate(sx, sy);
                
                // Vẽ bóng (Shadow)
                ctx.beginPath();
                ctx.ellipse(activePokemon.x, activePokemon.y + 50, 60, 20, 0, 0, Math.PI*2);
                ctx.fillStyle = "rgba(0,0,0,0.3)";
                ctx.fill();

                // Vẽ Pokemon chính
                ctx.shadowBlur = 20; ctx.shadowColor = var(--blue);
                ctx.drawImage(
                    activePokemon.img, 
                    activePokemon.x - activePokemon.size/2, 
                    activePokemon.y - activePokemon.size, 
                    activePokemon.size, activePokemon.size
                );
                ctx.restore();
            }

            requestAnimationFrame(draw);
        }

        spawn(); draw();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAIZEN CROSS-PLAY 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        #ui { 
            position: absolute; top: 15px; left: 15px; color: #00f0ff; 
            pointer-events: none; z-index: 10; 
            text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
            font-size: 18px; line-height: 1.4;
            background: rgba(0, 15, 30, 0.6); padding: 12px 18px; border-radius: 12px;
        }
        #players-count {
            font-size: 14px; color: #ff00aa; margin-top: 4px;
        }
       
        /* Joystick đẹp hơn, neon glow */
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px; width: 140px; height: 140px;
            background: rgba(0, 240, 255, 0.08); 
            border: 3px solid rgba(0, 240, 255, 0.6);
            border-radius: 50%; 
            box-shadow: 0 0 30px #00f0ff;
            display: none;
            touch-action: none;
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%; width: 52px; height: 52px;
            background: #00f0ff; 
            border-radius: 50%; 
            box-shadow: 0 0 25px #00f0ff, inset 0 0 15px #ffffff;
            transform: translate(-50%, -50%);
            transition: all 0.05s;
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>KAIZEN CROSS-PLAY 3D</b><br>
        PC: WASD • Mobile: Joystick<br>
        ID: <span id="my-id">...</span><br>
        <span id="players-count">Đang kết nối...</span>
    </div>
   
    <div id="joystick-zone"><div id="joystick-stick"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script>
        // --- 1. SETUP GUN.JS (đồng bộ realtime) ---
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const world = gun.get('kaizen_ultimate_v2');
        const myId = 'PL_' + Math.random().toString(36).substr(2, 6).toUpperCase();
        document.getElementById('my-id').innerText = myId;

        const players = {};
        let playerCount = 1;

        // --- 2. THREE.JS + CẢNH ĐẸP CYBER ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x001122, 30, 180);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // ÁNH SÁNG NEON
        const ambient = new THREE.AmbientLight(0x88ccff, 0.6);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0x00ffff, 1.2);
        dirLight.position.set(15, 25, 10);
        scene.add(dirLight);
        const hemi = new THREE.HemisphereLight(0x00ffcc, 0x112233, 0.4);
        scene.add(hemi);

        // SÀN ĐẤT ĐẸP
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(400, 400),
            new THREE.MeshPhongMaterial({ color: 0x001122, shininess: 10 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);
        scene.add(new THREE.GridHelper(400, 80, 0x00ffcc, 0x112233));

        // --- AVATAR ĐẸP (không wireframe nữa) ---
        const createAvatar = (color) => {
            const group = new THREE.Group();

            // Chân
            const legMat = new THREE.MeshPhongMaterial({ color: 0x222244, shininess: 20 });
            const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.85, 0.28), legMat);
            leftLeg.position.set(-0.22, 0.42, 0);
            const rightLeg = leftLeg.clone();
            rightLeg.position.x = 0.22;
            group.add(leftLeg, rightLeg);

            // Thân
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.85, 1.25, 0.55),
                new THREE.MeshPhongMaterial({ color: color, shininess: 80, emissive: color, emissiveIntensity: 0.15 })
            );
            body.position.y = 1.05;
            group.add(body);

            // Đầu
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.38, 32, 32),
                new THREE.MeshPhongMaterial({ color: 0xffddbb, shininess: 30 })
            );
            head.position.y = 2.05;
            group.add(head);

            // Mắt neon (cả 2 bên)
            const eyeMat = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.6 });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 16), eyeMat);
            leftEye.position.set(-0.16, 2.15, 0.32);
            const rightEye = leftEye.clone();
            rightEye.position.x = 0.16;
            group.add(leftEye, rightEye);

            return group;
        };

        // Avatar của bạn (màu cyan nổi bật)
        const myMesh = createAvatar(0x00f0ff);
        myMesh.position.y = 0;
        scene.add(myMesh);
        camera.position.set(0, 8, 15);

        // --- 3. ĐIỀU KHIỂN (PC + MOBILE) ---
        let inputX = 0, inputZ = 0;
        const keys = {};

        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        // Joystick Mobile (đẹp + mượt hơn)
        if ('ontouchstart' in window) {
            const zone = document.getElementById('joystick-zone');
            const stick = document.getElementById('joystick-stick');
            zone.style.display = 'block';

            let touching = false;
            zone.addEventListener('touchstart', (e) => { touching = true; });
            zone.addEventListener('touchmove', (e) => {
                if (!touching) return;
                const rect = zone.getBoundingClientRect();
                const cx = rect.left + 70;
                const cy = rect.top + 70;
                let dx = e.touches[0].clientX - cx;
                let dy = e.touches[0].clientY - cy;
                const dist = Math.min(55, Math.hypot(dx, dy));
                const angle = Math.atan2(dy, dx);

                inputX = Math.cos(angle) * (dist / 55) * 0.25;
                inputZ = Math.sin(angle) * (dist / 55) * 0.25;

                stick.style.left = `calc(50% + ${Math.cos(angle) * dist}px)`;
                stick.style.top = `calc(50% + ${Math.sin(angle) * dist}px)`;
            });
            zone.addEventListener('touchend', () => {
                touching = false;
                inputX = 0; inputZ = 0;
                stick.style.left = stick.style.top = '50%';
            });
        }

        // --- 4. VÒNG LẶP CHÍNH + CAMERA THEO HƯỚNG ---
        function update() {
            let curX = inputX;
            let curZ = inputZ;

            // Ưu tiên WASD trên PC
            if (keys['w']) curZ = -0.25;
            if (keys['s']) curZ = 0.25;
            if (keys['a']) curX = -0.25;
            if (keys['d']) curX = 0.25;

            if (curX !== 0 || curZ !== 0) {
                myMesh.position.x += curX;
                myMesh.position.z += curZ;
                myMesh.rotation.y = Math.atan2(curX, curZ);

                // Gửi vị trí lên Gun
                world.get(myId).put({
                    x: myMesh.position.x,
                    z: myMesh.position.z,
                    ry: myMesh.rotation.y
                });
            }

            // Camera luôn ở sau lưng người chơi (theo hướng quay)
            const offset = new THREE.Vector3(0, 6.5, 14);
            offset.applyEuler(new THREE.Euler(0, myMesh.rotation.y + Math.PI, 0));
            const targetCam = myMesh.position.clone().add(offset);
            camera.position.lerp(targetCam, 0.12);
            camera.lookAt(myMesh.position.x, myMesh.position.y + 1.8, myMesh.position.z);
        }

        // Nhận dữ liệu người chơi khác (hỗ trợ rất nhiều người)
        world.map().on((data, id) => {
            if (id === myId || !data) return;

            if (!players[id]) {
                const randColor = new THREE.Color().setHSL(Math.random(), 0.85, 0.65).getHex();
                players[id] = createAvatar(randColor);
                scene.add(players[id]);
                playerCount++;
                document.getElementById('players-count').innerText = `Người chơi: ${playerCount}`;
            }

            players[id].position.set(data.x, 0, data.z);
            players[id].rotation.y = data.ry || 0;
        });

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Khởi tạo đếm người chơi
        setTimeout(() => {
            document.getElementById('players-count').innerText = `Người chơi: ${playerCount}`;
        }, 800);
    </script>
</body>
</html>

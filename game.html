<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAIZEN CROSS-PLAY 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        #ui { 
            position: absolute; top: 15px; left: 15px; color: #00f0ff; 
            pointer-events: none; z-index: 10; 
            text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
            font-size: 18px; line-height: 1.4;
            background: rgba(0, 15, 30, 0.7); padding: 15px 20px; border-radius: 12px;
            border: 1px solid #00f0ff;
        }
        #players-count { font-size: 15px; color: #ff00aa; margin-top: 6px; }
        #info-pc { font-size: 14px; color: #ffff00; margin-top: 8px; }

        /* Joystick siêu đẹp */
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px;
            background: rgba(0, 240, 255, 0.09); 
            border: 4px solid rgba(0, 240, 255, 0.7);
            border-radius: 50%; 
            box-shadow: 0 0 40px #00f0ff;
            display: none;
            touch-action: none;
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%; width: 58px; height: 58px;
            background: #00f0ff; 
            border-radius: 50%; 
            box-shadow: 0 0 30px #00f0ff, inset 0 0 20px #fff;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>KAIZEN CROSS-PLAY 3D</b><br>
        PC: <span style="color:#ffff00">CLICK màn hình khóa chuột</span> + WASD<br>
        Mobile: Joystick<br>
        ID: <span id="my-id">...</span><br>
        <span id="players-count">Đang kết nối...</span>
    </div>
   
    <div id="joystick-zone"><div id="joystick-stick"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script>
        // === SETUP GUN.JS ===
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const world = gun.get('kaizen_ultimate_v3');
        const myId = 'PL_' + Math.random().toString(36).substr(2, 6).toUpperCase();
        document.getElementById('my-id').innerText = myId;

        const players = {};
        let playerCount = 1;

        // === THREE.JS + CẢNH ĐẸP ===
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x001122, 20, 200);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const canvas = renderer.domElement;

        // Ánh sáng neon
        scene.add(new THREE.AmbientLight(0x88ccff, 0.7));
        const dirLight = new THREE.DirectionalLight(0x00ffff, 1.5);
        dirLight.position.set(20, 30, 15);
        scene.add(dirLight);
        scene.add(new THREE.HemisphereLight(0x00ffcc, 0x112233, 0.5));

        // Sàn + grid
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(500, 500),
            new THREE.MeshPhongMaterial({ color: 0x001122, shininess: 5 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);
        scene.add(new THREE.GridHelper(500, 100, 0x00ffcc, 0x112233));

        // === AVATAR ĐẸP ===
        const createAvatar = (color) => {
            const g = new THREE.Group();
            // Chân
            const legM = new THREE.MeshPhongMaterial({ color: 0x222244 });
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.9, 0.3), legM);
            leg.position.y = 0.45;
            const l1 = leg.clone(); l1.position.x = -0.25;
            const l2 = leg.clone(); l2.position.x = 0.25;
            g.add(l1, l2);

            // Thân neon
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.9, 1.3, 0.6),
                new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.3 })
            );
            body.position.y = 1.1;
            g.add(body);

            // Đầu
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32),
                new THREE.MeshPhongMaterial({ color: 0xffddaa }));
            head.position.y = 2.15;
            g.add(head);

            // Mắt neon sáng
            const eyeM = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.8 });
            const eye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeM);
            eye.position.set(-0.17, 2.2, 0.35);
            const eye2 = eye.clone(); eye2.position.x = 0.17;
            g.add(eye, eye2);

            return g;
        };

        const myMesh = createAvatar(0x00f0ff);
        scene.add(myMesh);
        camera.position.set(0, 10, 20);

        // === BIẾN ĐIỀU KHIỂN ===
        const isMobile = 'ontouchstart' in window;
        let myYaw = 0;
        let inputX = 0, inputZ = 0;
        const keys = {};
        const clock = new THREE.Clock();
        let pointerLocked = false;

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // === POINTER LOCK CHO PC (SIÊU DỄ) ===
        if (!isMobile) {
            canvas.addEventListener('click', () => canvas.requestPointerLock());
            document.addEventListener('pointerlockchange', () => {
                pointerLocked = document.pointerLockElement === canvas;
            });
            document.addEventListener('mousemove', e => {
                if (pointerLocked) {
                    myYaw -= e.movementX * 0.0035;
                    myMesh.rotation.y = myYaw;
                }
            });
        }

        // === JOYSTICK MOBILE ===
        if (isMobile) {
            const zone = document.getElementById('joystick-zone');
            const stick = document.getElementById('joystick-stick');
            zone.style.display = 'block';

            let touching = false;
            zone.addEventListener('touchstart', () => touching = true);
            zone.addEventListener('touchmove', e => {
                if (!touching) return;
                const rect = zone.getBoundingClientRect();
                const cx = rect.left + 75, cy = rect.top + 75;
                let dx = e.touches[0].clientX - cx;
                let dy = e.touches[0].clientY - cy;
                const dist = Math.min(58, Math.hypot(dx, dy));
                const angle = Math.atan2(dy, dx);

                inputX = Math.cos(angle) * (dist / 58) * 0.28;
                inputZ = Math.sin(angle) * (dist / 58) * 0.28;

                stick.style.left = `calc(50% + ${Math.cos(angle) * dist}px)`;
                stick.style.top  = `calc(50% + ${Math.sin(angle) * dist}px)`;
            });
            zone.addEventListener('touchend', () => {
                touching = false;
                inputX = inputZ = 0;
                stick.style.left = stick.style.top = '50%';
            });
        }

        // === VÒNG LẶP CHÍNH (ĐÃ LÀM LẠI HOÀN TOÀN) ===
        function update() {
            const delta = Math.min(clock.getDelta(), 0.1);
            const MOVE_SPEED = 15;                 // tốc độ chuẩn game
            let moved = false;

            if (!isMobile) {
                // === PC: CHUỘT XOAY + WASD DI CHUYỂN THEO HƯỚNG ===
                const forwardX = Math.sin(myYaw);
                const forwardZ = Math.cos(myYaw);

                let dx = 0, dz = 0;
                if (keys['w']) { dx += forwardX; dz += forwardZ; }
                if (keys['s']) { dx -= forwardX; dz -= forwardZ; }
                if (keys['a']) { dx += Math.cos(myYaw); dz -= Math.sin(myYaw); }
                if (keys['d']) { dx -= Math.cos(myYaw); dz += Math.sin(myYaw); }

                if (dx !== 0 || dz !== 0) {
                    const len = Math.hypot(dx, dz);
                    myMesh.position.x += (dx / len) * MOVE_SPEED * delta;
                    myMesh.position.z += (dz / len) * MOVE_SPEED * delta;
                    moved = true;
                }
                myMesh.rotation.y = myYaw;

            } else {
                // === MOBILE: Joystick + WASD (giữ nguyên cảm giác cũ) ===
                let curX = inputX, curZ = inputZ;
                if (keys['w']) curZ = -0.28;
                if (keys['s']) curZ = 0.28;
                if (keys['a']) curX = -0.28;
                if (keys['d']) curX = 0.28;

                if (curX !== 0 || curZ !== 0) {
                    myMesh.position.x += curX * 55 * delta;   // giữ tốc độ cũ
                    myMesh.position.z += curZ * 55 * delta;
                    myYaw = Math.atan2(curX, curZ);
                    myMesh.rotation.y = myYaw;
                    moved = true;
                }
            }

            // Gửi dữ liệu (luôn gửi khi xoay hoặc di chuyển)
            if (moved || pointerLocked) {
                world.get(myId).put({
                    x: myMesh.position.x,
                    z: myMesh.position.z,
                    ry: myYaw
                });
            }

            // Camera luôn theo sau lưng (đẹp + mượt)
            const camDist = 15;
            const camHeight = 7;
            const camX = myMesh.position.x - Math.sin(myYaw) * camDist;
            const camZ = myMesh.position.z - Math.cos(myYaw) * camDist;
            const targetCam = new THREE.Vector3(camX, myMesh.position.y + camHeight, camZ);

            camera.position.lerp(targetCam, 0.13);
            camera.lookAt(myMesh.position.x, myMesh.position.y + 1.9, myMesh.position.z);
        }

        // Nhận người chơi khác
        world.map().on((data, id) => {
            if (id === myId || !data) return;
            if (!players[id]) {
                const randColor = Math.random() * 0xffffff;
                players[id] = createAvatar(randColor);
                scene.add(players[id]);
                playerCount++;
                document.getElementById('players-count').innerText = `Người chơi online: ${playerCount}`;
            }
            players[id].position.set(data.x || 0, 0, data.z || 0);
            players[id].rotation.y = data.ry || 0;
        });

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Khởi động
        setTimeout(() => {
            document.getElementById('players-count').innerText = `Người chơi online: ${playerCount}`;
        }, 600);
    </script>
</body>
</html>

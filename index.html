<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meo Bot and Cyberion Bot PREMIUM</title>
    <style>
        :root {
            --primary: #5865F2;
            --bg: #0f0f13;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #2c2f33, #0f0f13);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #5865F2, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: #b9bbbe; margin-bottom: 40px; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        /* Bot Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.2);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #43b581;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .bot-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #2f3136;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .bot-name { font-size: 1.4rem; font-weight: bold; margin-bottom: 20px; display: block; }

        /* Nút bấm */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: #4752c4; }

        .btn-sub { background: rgba(255, 255, 255, 0.1); color: white; font-size: 0.9rem; }
        .btn-sub:hover { background: rgba(255, 255, 255, 0.2); }

        /* Ô Thêm Bot */
        .add-card {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            min-height: 250px;
        }

        .add-card:hover {
            border-color: #5865f2;
            background: rgba(88, 101, 242, 0.05);
        }

        .add-icon {
            font-size: 50px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 10px;
        }

        a { text-decoration: none; color: inherit; }
        /* Nút Mời Bot ở góc trên */
.invite-dropdown {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
}

.invite-btn {
    background: #5865F2; /* Màu Discord */
    color: white;
    padding: 12px 25px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.invite-btn:hover {
    background: #4752C4;
    transform: scale(1.05);
}

.dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    top: 110%;
    background: #2f3136;
    min-width: 180px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    border-radius: 8px;
    overflow: hidden;
}

.dropdown-content a {
    color: white;
    padding: 12px 16px;
    text-decoration: none;
    display: block;
    font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.dropdown-content a:hover {
    background: #40444b;
}

/* Hiển thị menu khi di chuột vào */
.invite-dropdown:hover .dropdown-content {
    display: block;
}
     .status-dot {
    box-shadow: 0 0 10px #43b581;
    animation: blink 2s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}
        /* Các nhóm lệnh trong bảng */
.group { margin-bottom: 15px; text-align: left; }
.group h3 { font-size: 15px; margin-bottom: 5px; text-transform: uppercase; }
.group p { 
    background: rgba(255,255,255,0.05); 
    padding: 10px; 
    border-radius: 8px; 
    font-size: 13px; 
    font-family: monospace; 
    line-height: 1.5; 
    margin: 0; 
    border: 1px solid rgba(255,255,255,0.1); 
}

/* Thanh cuộn cho bảng danh sách lệnh */
#setup-card::-webkit-scrollbar { width: 5px; }
#setup-card::-webkit-scrollbar-thumb { background: #5865f2; border-radius: 10px; }
    </style>
</head>
<body>
<div class="invite-dropdown">
    <button class="invite-btn">➕ Mời Bot</button>
    <div class="dropdown-content">
        <a href="https://discord.com/oauth2/authorize?client_id=1471048517706449099&permissions=8&integration_type=0&scope=bot" target="_blank">
            Mời MEO Bot 1
        </a>
        
        <a href="https://discord.com/oauth2/authorize?client_id=1477295832335384598&permissions=8&integration_type=0&scope=bot" target="_blank">
            Mời Cyberion Bot 2
        </a>
    </div>
</div>
    <h1>PREMIUM BOT PANEL</h1>
    <p>Quản lý hệ thống Bot Discord của bạn</p>

    <div class="container">
        <div class="card">
            <div class="bot-img">🤖</div>
            <span class="bot-name"><span class="status-dot"></span>ＭＥＯ ＢＯＴ Ｘ✦𓆩ＶＪ𓆪</span>
            <div class="btn-group">
                <a href="https://discord.com/oauth2/authorize?client_id=1471048517706449099&response_type=code&redirect_uri=https%3A%2F%2Ftenweb.vercel.app%2Fapi%2Fauth%2Fcallback&scope=identify">
                    <button class="btn-main" style="width: 100%;">Quản lý ngay</button>
                </a>
                <button class="btn-sub">Cài đặt lệnh</button>

        <div class="card">
            <div class="bot-img">🤖</div>
            <span class="bot-name"><span class="status-dot"></span> ⌁ Cyberion Bot ⌁ X Zyro</span>
            <div class="btn-group">
                <a href="https://discord.com/oauth2/authorize?client_id=1477295832335384598&permissions=8&response_type=code&redirect_uri=https%3A%2F%2Ftenweb.vercel.app%2Fapi%2Fauth%2Fcallback&integration_type=0&scope=identify+bot+rpc+guilds.channels.read+guilds+identify.premium+email">
                    <button class="btn-main" style="width: 100%;">Quản lý ngay</button>
                </a>
                <button class="btn-sub">Cài đặt lệnh</button>
                <button class="btn-sub">Xem thống kê</button>
            </div>
        </div>

      <div id="setup-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(8px);">
    <div id="setup-card" style="background: #1e1f22; padding: 25px; border-radius: 20px; width: 95%; max-width: 550px; border: 2px solid #5865F2; color: white; max-height: 85vh; overflow-y: auto; transition: 0.3s;">
        
        <h2 id="setup-title" style="margin-top: 0; position: sticky; top: 0; background: #1e1f22; padding-bottom: 10px; text-align: center; font-size: 1.5rem; text-transform: uppercase;">MENU HỆ THỐNG</h2>
        <p id="setup-desc" style="font-size: 13px; color: #b9bbbe; text-align: center; margin-bottom: 20px;"></p>

        <div id="command-list-content"></div>

        <button onclick="closeSetup()" style="width: 100%; background: #ffffff; color: #000; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.2s;" id="close-btn">ĐÃ HIỂU</button>
    </div>
</div>
<script>
    const MEO_COMMANDS = `
        <div class="group"><h3 style="color:#00FFFF">🛡️ Quản Trị Viên</h3><p>!mkick, !mban, !mmute, !botban, !botunban, !xoaxu, !addxu, !addfxu, !resetxu, !taocode</p></div>
        <div class="group"><h3 style="color:#FFD700">💰 Kinh Tế & Ngân Hàng</h3><p>!money, !xu, !bank, !gui, !rut, !vay, !trano, !topxu, !thongbaono, !cuopnganhang, !tui, shop, use</p></div>
        <div class="group"><h3 style="color:#FF00FF">🎮 Trò Chơi & Giải Trí</h3><p>!cheu, !big, !big2, !anh, !keobuabao, !kbb, !spin, !solo, !cuoc, !hoi, !ai</p></div>
        <div class="group"><h3 style="color:#ffffff">🏴 Băng Đảng (Gang)</h3><p>!taobang, !bang, !moibang, !joinbang, !donggop, !nangbang, !roibang, !danhbang, !dongbang, !tatcabang</p></div>
        <div class="group"><h3 style="color:#00FF00">💎 VIP & Premium</h3><p>!buyvip, !buysupervip, !buyultravip, !kickhoat, !daily, !rob, !premiumspin</p></div>
        <div class="group"><h3 style="color:#00d2ff">📊 Thông Tin Khác</h3><p>!server, !mhelp, !mhclear, !mping</p></div>
    `;

    const CYBER_COMMANDS = `
        <div class="group"><h3 style="color:#ff4d4d">🎣 HỆ THỐNG KINH TẾ (FISHING)</h3><p>!fish, !moruong, !vi, !doixu, !top</p></div>
        <div class="group"><h3 style="color:#ffa500">🎲 KHU VUI CHƠI GIẢI TRÍ</h3><p>!taixiu [tiền] [tai/xiu], !de [số] [tiền], !baucua [tiền] [con]</p></div>
        <div class="group"><h3 style="color:#ffffff">⚖️ TÒA ÁN - CHẠY ÁN</h3><p>!phientoa @user [tội], !luatsu, !thue [gói]</p></div>
        <div class="group"><h3 style="color:#00FFFF">🚀 ROBLOX TOOLS (VIP)</h3><p>!rbcheck, !ttacc, !rbavatar, !rbjoin, !rblog, !rbfriends, !rbgroup</p></div>
        <div class="group"><h3 style="color:#ff0000">🔐 TIỆN ÍCH & QUẢN TRỊ</h3><p>!laymk, !joinvip, !addmoney, !resetmoney, !xoamoney, !checkgianlan</p></div>
    `;

    function openSetup(botIndex, botName) {
        const overlay = document.getElementById('setup-overlay');
        const card = document.getElementById('setup-card');
        const title = document.getElementById('setup-title');
        const desc = document.getElementById('setup-desc');
        const content = document.getElementById('command-list-content');
        const closeBtn = document.getElementById('close-btn');

        // KIỂM TRA THEO VỊ TRÍ CARD (0 là Bot đầu tiên, 1 là Bot thứ hai)
        if (botIndex === 0) { 
            title.innerText = "📜 MEO BOT - HỆ THỐNG LỆNH";
            title.style.color = "#00FFFF";
            card.style.borderColor = "#00FFFF";
            desc.innerText = "Danh sách lệnh toàn diện cho MEO BOT";
            content.innerHTML = MEO_COMMANDS;
            closeBtn.style.background = "#00FFFF";
            closeBtn.style.color = "#000";
        } else {
            title.innerText = "🎮 LEVIATHAN SYSTEM - MENU TỐI CAO";
            title.style.color = "#ff0000";
            card.style.borderColor = "#ff0000";
            desc.innerHTML = "Chào sếp! Hệ thống đã được hiệu chỉnh.<br>Kiếm tiền triệu - Chạy án tỷ đô!";
            content.innerHTML = CYBER_COMMANDS;
            closeBtn.style.background = "#ff0000";
            closeBtn.style.color = "#fff";
        }

        overlay.style.display = 'flex';
    }

    function closeSetup() {
        document.getElementById('setup-overlay').style.display = 'none';
    }

    // Gán sự kiện cho các nút "Cài đặt lệnh"
    const cards = document.querySelectorAll('.card');
    cards.forEach((card, index) => {
        const setupBtn = card.querySelector('.btn-sub:nth-child(2)'); // Lấy nút Cài đặt lệnh
        if (setupBtn) {
            setupBtn.onclick = function() {
                const name = card.querySelector('.bot-name').innerText;
                openSetup(index, name); // Truyền index vào để phân biệt
            };
        }
    });

    window.onclick = function(e) { if (e.target.id === 'setup-overlay') closeSetup(); }
</script>
<style>
    .group { margin-bottom: 15px; text-align: left; }
    .group h3 { font-size: 15px; margin-bottom: 5px; text-transform: uppercase; }
    .group p { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; font-size: 13px; font-family: monospace; line-height: 1.5; margin: 0; border: 1px solid rgba(255,255,255,0.1); }
    #setup-card::-webkit-scrollbar { width: 5px; }
    #setup-card::-webkit-scrollbar-thumb { background: #5865f2; border-radius: 10px; }
</style>
 <div id="setup-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(8px);">
    <div id="setup-card" style="background: #1e1f22; padding: 25px; border-radius: 20px; width: 95%; max-width: 550px; border: 2px solid #5865F2; color: white; max-height: 85vh; overflow-y: auto;">
        <h2 id="setup-title" style="text-align: center; text-transform: uppercase;">MENU HỆ THỐNG</h2>
        <p id="setup-desc" style="font-size: 13px; color: #b9bbbe; text-align: center; margin-bottom: 20px;">Danh sách lệnh được cập nhật mới nhất</p>
        <div id="command-list-content"></div>
        <button onclick="closeSetup()" style="width: 100%; background: #ffffff; color: #000; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px;">ĐÃ HIỂU</button>
    </div>
</div>

<div id="stats-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(8px);">
    <div style="background: #1e1f22; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; border: 2px solid #43b581; color: white; text-align: center;">
        <h2 id="stats-title-text" style="color: #43b581; margin-top: 0;">THỐNG KÊ HOẠT ĐỘNG</h2>
        <div style="text-align: left; margin-top: 20px;">
            <p>🌐 Số Máy Chủ: <span id="stat-servers" style="float: right; color: #43b581; font-weight: bold;">--</span></p>
            <p>👥 Người Dùng: <span id="stat-users" style="float: right; color: #43b581; font-weight: bold;">--</span></p>
            <div style="width: 100%; background: #333; height: 8px; border-radius: 4px; margin: 20px 0 10px;">
                <div id="cpu-bar-inner" style="width: 0%; background: #43b581; height: 100%; border-radius: 4px; transition: 1.5s cubic-bezier(0.1, 0.7, 1.0, 0.1);"></div>
            </div>
            <label style="font-size: 12px; color: #b9bbbe;">Tải CPU Hệ Thống</label>
        </div>
        <button onclick="closeStats()" style="width: 100%; background: #43b581; color: white; padding: 12px; border: none; border-radius: 10px; margin-top: 25px; cursor: pointer; font-weight: bold;">ĐÓNG</button>
    </div>
</div>

<script>
    const MEO_CMD = `<div class="group"><h3 style="color:#00FFFF">🛡️ Quản Trị Viên</h3><p>!mkick, !mban, !mmute, !botban, !botunban, !xoaxu, !addxu, !addfxu, !resetxu, !taocode</p></div><div class="group"><h3 style="color:#FFD700">💰 Kinh Tế & Ngân Hàng</h3><p>!money, !xu, !bank, !gui, !rut, !vay, !trano, !topxu, !thongbaono, !cuopnganhang, !tui, shop, use</p></div><div class="group"><h3 style="color:#FF00FF">🎮 Trò Chơi & Giải Trí</h3><p>!cheu, !big, !big2, !anh, !keobuabao, !kbb, !spin, !solo, !cuoc, !hoi, !ai</p></div><div class="group"><h3 style="color:#ffffff">🏴 Băng Đảng (Gang)</h3><p>!taobang, !bang, !moibang, !joinbang, !donggop, !nangbang, !roibang, !danhbang, !dongbang, !tatcabang</p></div><div class="group"><h3 style="color:#00FF00">💎 VIP & Premium</h3><p>!buyvip, !buysupervip, !buyultravip, !kickhoat, !daily, !rob, !premiumspin</p></div><div class="group"><h3 style="color:#00d2ff">📊 Thông Tin Khác</h3><p>!server, !mhelp, !mhclear, !mping</p></div>`;
    
    const CYBER_CMD = `<div class="group"><h3 style="color:#ff4d4d">🎣 HỆ THỐNG KINH TẾ (FISHING)</h3><p>!fish, !moruong, !vi, !doixu, !top</p></div><div class="group"><h3 style="color:#ffa500">🎲 KHU VUI CHƠI GIẢI TRÍ</h3><p>!taixiu [tiền] [tai/xiu], !de [số] [tiền], !baucua [tiền] [con]</p></div><div class="group"><h3 style="color:#ffffff">⚖️ TÒA ÁN - CHẠY ÁN</h3><p>!phientoa @user [tội], !luatsu, !thue [gói]</p></div><div class="group"><h3 style="color:#00FFFF">🚀 ROBLOX TOOLS (VIP)</h3><p>!rbcheck, !ttacc, !rbavatar, !rbjoin, !rblog, !rbfriends, !rbgroup</p></div><div class="group"><h3 style="color:#ff0000">🔐 TIỆN ÍCH & QUẢN TRỊ</h3><p>!laymk, !joinvip, !addmoney, !resetmoney, !xoamoney, !checkgianlan</p></div>`;

    function openSetup(index) {
        const title = document.getElementById('setup-title');
        const card = document.getElementById('setup-card');
        const content = document.getElementById('command-list-content');
        
        if (index === 0) {
            title.innerText = "📜 MEO BOT COMMANDS";
            title.style.color = "#00FFFF";
            card.style.borderColor = "#00FFFF";
            content.innerHTML = MEO_CMD;
        } else {
            title.innerText = "🎮 LEVIATHAN COMMANDS";
            title.style.color = "#ff4d4d";
            card.style.borderColor = "#ff4d4d";
            content.innerHTML = CYBER_CMD;
        }
        document.getElementById('setup-overlay').style.display = 'flex';
    }

    function openStats(index) {
        const servers = index === 0 ? "125 Máy chủ" : "89 Máy chủ";
        const users = index === 0 ? "45,000 Thành viên" : "21,500 Thành viên";
        const cpu = index === 0 ? "15%" : "38%";
        
        document.getElementById('stat-servers').innerText = servers;
        document.getElementById('stat-users').innerText = users;
        document.getElementById('stats-overlay').style.display = 'flex';
        
        // Reset thanh bar về 0 rồi mới chạy để tạo hiệu ứng
        document.getElementById('cpu-bar-inner').style.width = "0%";
        setTimeout(() => {
            document.getElementById('cpu-bar-inner').style.width = cpu;
        }, 50);
    }

    function closeSetup() { document.getElementById('setup-overlay').style.display = 'none'; }
    function closeStats() { document.getElementById('stats-overlay').style.display = 'none'; }

    // Gán sự kiện cực chuẩn cho các nút
    window.onload = () => {
        const cards = document.querySelectorAll('.card');
        cards.forEach((card, index) => {
            const btns = card.querySelectorAll('.btn-sub');
            if(btns.length >= 2) {
                btns[0].onclick = () => openSetup(index); // Nút Cài đặt
                btns[1].onclick = () => openStats(index); // Nút Thống kê
            }
        });
    };

    // Đóng khi bấm ra vùng đen
    window.onclick = (e) => {
        if (e.target.id === 'setup-overlay') closeSetup();
        if (e.target.id === 'stats-overlay') closeStats();
    };
</script>
</body>
</html>

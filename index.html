<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meo Bot and Cyberion Bot PREMIUM</title>
    <style>
        :root {
            --primary: #5865F2;
            --bg: #0f0f13;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #2c2f33, #0f0f13);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #5865F2, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: #b9bbbe; margin-bottom: 40px; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        /* Bot Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.2);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #43b581;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .bot-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #2f3136;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .bot-name { font-size: 1.4rem; font-weight: bold; margin-bottom: 20px; display: block; }

        /* Nút bấm */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: #4752c4; }

        .btn-sub { background: rgba(255, 255, 255, 0.1); color: white; font-size: 0.9rem; }
        .btn-sub:hover { background: rgba(255, 255, 255, 0.2); }

        /* Ô Thêm Bot */
        .add-card {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            min-height: 250px;
        }

        .add-card:hover {
            border-color: #5865f2;
            background: rgba(88, 101, 242, 0.05);
        }

        .add-icon {
            font-size: 50px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 10px;
        }

        a { text-decoration: none; color: inherit; }
        /* Nút Mời Bot ở góc trên */
.invite-dropdown {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
}

.invite-btn {
    background: #5865F2; /* Màu Discord */
    color: white;
    padding: 12px 25px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.invite-btn:hover {
    background: #4752C4;
    transform: scale(1.05);
}

.dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    top: 110%;
    background: #2f3136;
    min-width: 180px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    border-radius: 8px;
    overflow: hidden;
}

.dropdown-content a {
    color: white;
    padding: 12px 16px;
    text-decoration: none;
    display: block;
    font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.dropdown-content a:hover {
    background: #40444b;
}

/* Hiển thị menu khi di chuột vào */
.invite-dropdown:hover .dropdown-content {
    display: block;
}
    </style>
</head>
<body>
<div class="invite-dropdown">
    <button class="invite-btn">➕ Mời Bot</button>
    <div class="dropdown-content">
        <a href="https://discord.com/oauth2/authorize?client_id=1471048517706449099&permissions=8&integration_type=0&scope=bot" target="_blank">
            Mời MEO Bot 1
        </a>
        
        <a href="https://discord.com/oauth2/authorize?client_id=1477295832335384598&permissions=8&integration_type=0&scope=bot" target="_blank">
            Mời Cyberion Bot 2
        </a>
    </div>
</div>
    <h1>PREMIUM BOT PANEL</h1>
    <p>Quản lý hệ thống Bot Discord của bạn</p>

    <div class="container">
        <div class="card">
            <div class="bot-img">🤖</div>
            <span class="bot-name"><span class="status-dot"></span>ＭＥＯ ＢＯＴ Ｘ✦𓆩ＶＪ𓆪</span>
            <div class="btn-group">
                <a href="https://discord.com/oauth2/authorize?client_id=1471048517706449099&response_type=code&redirect_uri=https%3A%2F%2Ftenweb.vercel.app%2Fapi%2Fauth%2Fcallback&scope=identify">
                    <button class="btn-main" style="width: 100%;">Quản lý ngay</button>
                </a>
                <button class="btn-sub">Cài đặt lệnh</button>
                <button class="btn-sub">Xem thống kê</button>
            </div>
        </div>

        <div class="card">
            <div class="bot-img">🤖</div>
            <span class="bot-name"><span class="status-dot"></span> ⌁ Cyberion Bot ⌁ X Zyro</span>
            <div class="btn-group">
                <a href="https://discord.com/oauth2/authorize?client_id=ID_BOT_2_CUA_BAN&scope=identify%20guilds&response_type=code&redirect_uri=https%3A%2F%2Fweddiscordbot.vercel.app%2Fapi%2Fauth%2Fcallback">
                    <button class="btn-main" style="width: 100%;">Quản lý ngay</button>
                </a>
                <button class="btn-sub">Cài đặt lệnh</button>
                <button class="btn-sub">Xem thống kê</button>
            </div>
        </div>

       
    </div>
<div id="setup-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
    <div style="background: #1e1f22; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid #5865F2; text-align: center; color: white;">
        <h2 id="setup-title" style="color: #5865F2; margin-top: 0;">Setup Bot</h2>
        <div style="text-align: left; margin-top: 20px;">
            <label style="color: #b9bbbe; font-size: 14px;">Prefix (Dấu lệnh)</label>
            <input type="text" id="prefix-input" placeholder="Ví dụ: !" style="width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #333; background: #0f0f13; color: white; box-sizing: border-box;">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 30px;">
            <button onclick="saveSettings()" style="flex: 1; background: #5865F2; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Lưu lại</button>
            <button onclick="closeSetup()" style="flex: 1; background: rgba(255,255,255,0.1); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer;">Hủy</button>
        </div>
    </div>
</div>
   <script>
    // 1. Hàm mở bảng cài đặt và đổi tên bot theo ngữ cảnh
    function openSetup(botName) {
        // Xử lý xóa các ký tự thừa nếu có để tên bot gọn sạch
        const cleanName = botName.replace('online', '').trim(); 
        document.getElementById('setup-title').innerText = "Cấu hình " + cleanName;
        document.getElementById('setup-overlay').style.display = 'flex';
    }

    // 2. Hàm đóng bảng
    function closeSetup() {
        document.getElementById('setup-overlay').style.display = 'none';
    }

    // 3. Hàm lưu cấu hình
    function saveSettings() {
        const val = document.getElementById('prefix-input').value;
        alert("Hệ thống: Đã cập nhật Prefix thành [" + (val || "!") + "] cho Bot!");
        closeSetup();
    }

    // 4. KẾT NỐI CẢ 2 NÚT: Tự động tìm tất cả nút "Cài đặt lệnh" trên trang
    document.querySelectorAll('.btn-sub').forEach(button => {
        if (button.innerText.includes('Cài đặt')) {
            button.onclick = function() {
                // Tìm thẻ '.bot-name' nằm trong cùng một ô '.card' với nút vừa bấm
                const card = this.closest('.card');
                const name = card.querySelector('.bot-name').innerText;
                openSetup(name);
            };
        }
    });

    // 5. Tính năng phụ: Bấm ra vùng tối bên ngoài để đóng bảng cho nhanh
    window.onclick = function(event) {
        const overlay = document.getElementById('setup-overlay');
        if (event.target == overlay) {
            closeSetup();
        }
    }
</script>
</body>
</html>

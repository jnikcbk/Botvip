<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaizenMC</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
min-height:100vh;
background:
radial-gradient(circle at 20% 30%,rgba(59,130,246,0.25),transparent 40%),
radial-gradient(circle at 80% 20%,rgba(168,85,247,0.25),transparent 40%),
radial-gradient(circle at 50% 80%,rgba(37,99,235,0.25),transparent 40%),
#020617;
}

header{
text-align:center;
padding:22px;
font-size:28px;
font-weight:bold;
letter-spacing:1px;
background:rgba(2,6,23,0.9);
border-bottom:2px solid #2563eb;
box-shadow:0 0 20px rgba(37,99,235,0.4);
}

nav{
display:flex;
justify-content:center;
gap:15px;
background:#0f172a;
padding:12px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
padding:8px 16px;
border-radius:8px;
transition:0.25s;
font-size:14px;
}

nav a:hover{
background:#2563eb;
box-shadow:0 0 10px #2563eb;
}

.container{
padding:70px 20px;
text-align:center;
}

.server-box{
background:rgba(17,24,39,0.85);
padding:40px;
border-radius:16px;
display:inline-block;
max-width:420px;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
border:1px solid rgba(255,255,255,0.05);
backdrop-filter:blur(8px);
}

.server-box img{
width:180px;
margin:15px 0;
}

.server-box h1{
margin-top:0;
font-size:28px;
}

.server-box p{
color:#cbd5f5;
font-size:15px;
}

.btn{
display:inline-block;
margin:10px;
padding:12px 24px;
background:linear-gradient(90deg,#2563eb,#3b82f6);
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.25s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(37,99,235,0.6);
}

.user{
margin-top:15px;
font-size:16px;
color:#60a5fa;
}

.logout{
background:linear-gradient(90deg,#ef4444,#dc2626);
border:none;
cursor:pointer;
}

footer{
margin-top:80px;
background:#020617;
padding:25px;
text-align:center;
font-size:14px;
border-top:1px solid #1e293b;
}

footer img{
border-radius:50%;
margin-top:10px;
box-shadow:0 0 15px rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<header>
🌌 KaizenMC Minecraft Server
</header>

<nav>
<a href="index.html">Trang chủ</a>
<a href="dang-ky.html">Đăng ký</a>
<a href="dang-nhap.html">Đăng nhập</a>
<a href="shop.html">Shop</a>
<a href="nap-xu.html">Nạp xu</a>
<a href="luat.html">Luật SV</a>
</nav>

<div class="container">

<div class="server-box">

<h1>Chào mừng đến KaizenMC</h1>

<p>Server Minecraft giải trí với nhiều tính năng hấp dẫn.</p>

<img src="kaizen.png">

<br>

<a class="btn" href="shop.html">🛒 Vào Shop</a>
<a class="btn" href="nap-xu.html">💎 Nạp Xu</a>

<div class="user" id="userBox"></div>

<button class="btn logout" onclick="logout()" id="logoutBtn" style="display:none;">Đăng xuất</button>

</div>

</div>

<footer>
© 2026 KaizenMC • Owner
<br>
<img src="owner.png" width="80">
</footer>

<script>

let login = localStorage.getItem("login")
let user = localStorage.getItem("tk")

if(login === "true"){
document.getElementById("userBox").innerHTML="👤 Đã đăng nhập: <b>"+user+"</b>"
document.getElementById("logoutBtn").style.display="inline-block"
}else{
document.getElementById("userBox").innerHTML="⚠️ Bạn chưa đăng nhập"
}

function logout(){
localStorage.removeItem("login")
location.reload()
}
  
let user=localStorage.getItem("tk")
let xu=parseInt(localStorage.getItem("xu_"+user))||0

document.getElementById("userBox").innerHTML=
"👤 "+user+" | 💰 "+xu+" xu"
  
</script>


</body>
</html>

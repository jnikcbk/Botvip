<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaizenMC</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

header{
background:#020617;
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
border-bottom:2px solid #2563eb;
}

nav{
display:flex;
justify-content:center;
gap:18px;
background:#111827;
padding:12px;
}

nav a{
color:white;
text-decoration:none;
padding:8px 16px;
border-radius:8px;
transition:0.25s;
}

nav a:hover{
background:#2563eb;
}

.container{
padding:60px 20px;
text-align:center;
}

.container h1{
font-size:38px;
margin-bottom:10px;
}

.container p{
opacity:0.8;
}

.btn{
display:inline-block;
margin:12px;
padding:14px 24px;
background:#2563eb;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.25s;
}

.btn:hover{
background:#1d4ed8;
transform:scale(1.05);
}

.server-box{
margin-top:30px;
background:#111827;
padding:25px;
border-radius:14px;
display:inline-block;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.server-box img{
width:180px;
margin-bottom:10px;
}

.user{
margin-top:15px;
font-size:16px;
color:#60a5fa;
}

.logout{
margin-top:10px;
background:#ef4444;
}

footer{
margin-top:60px;
background:#020617;
padding:25px;
text-align:center;
font-size:14px;
opacity:0.8;
}

footer img{
margin-top:10px;
border-radius:50%;
}

</style>
</head>

<body>

<header>
🌍 KaizenMC Minecraft Server
</header>

<nav>
<a href="index.html">Trang chủ</a>
<a href="dang-ky.html">Đăng ký</a>
<a href="dang-nhap.html">Đăng nhập</a>
<a href="shop.html">Shop</a>
<a href="nap-xu.html">Nạp xu</a>
</nav>

<div class="container">

<h1>Chào mừng đến với KaizenMC</h1>

<p>Server Minecraft giải trí với nhiều tính năng hấp dẫn.</p>

<div class="server-box">

<img src="kaizen.png">

<br>

<a class="btn" href="shop.html">Vào Shop</a>

<a class="btn" href="nap-xu.html">Nạp Xu</a>

<div class="user" id="userBox"></div>

<button class="btn logout" onclick="logout()" id="logoutBtn" style="display:none;">Đăng xuất</button>

</div>

</div>

<footer>
© 2026 KaizenMC • Owner
<br>
<img src="owner.png" width="80">
</footer>

<script>

let login = localStorage.getItem("login")
let user = localStorage.getItem("tk")

if(login === "true"){
document.getElementById("userBox").innerHTML="👤 Đã đăng nhập: <b>"+user+"</b>"
document.getElementById("logoutBtn").style.display="inline-block"
}else{
document.getElementById("userBox").innerHTML="⚠️ Bạn chưa đăng nhập"
}

function logout(){
localStorage.removeItem("login")
location.reload()
}

</script>

</body>
</html>

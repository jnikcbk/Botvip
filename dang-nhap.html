<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.box{
background:rgba(17,24,39,0.9);
padding:45px;
border-radius:16px;
width:350px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:34px;
margin-bottom:8px;
}

h1{
margin:5px 0 25px 0;
font-size:26px;
}

.input-group{
position:relative;
margin-bottom:12px;
}

input{
width:100%;
padding:12px 12px 12px 38px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
outline:none;
font-size:14px;
transition:0.25s;
}

input:focus{
background:#374151;
box-shadow:0 0 0 2px #2563eb;
}

.icon{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
opacity:0.6;
}

button{
width:100%;
padding:13px;
margin-top:12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#2563eb,#3b82f6);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.25s;
font-size:15px;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 20px rgba(37,99,235,0.6);
}

.msg{
margin-top:12px;
color:#f87171;
font-size:14px;
}

a{
display:block;
margin-top:18px;
color:#60a5fa;
text-decoration:none;
font-size:14px;
}

a:hover{
text-decoration:underline;
}

.footer{
margin-top:20px;
font-size:12px;
color:#9ca3af;
}

</style>
</head>

<body>

<div class="box">

<div class="logo">🌍</div>
<h1>KaizenMC Login</h1>

<div class="input-group">
<span class="icon">👤</span>
<input id="user" placeholder="Tên tài khoản">
</div>

<div class="input-group">
<span class="icon">🔒</span>
<input id="pass" type="password" placeholder="Mật khẩu">
</div>

<button onclick="login()">Đăng nhập</button>

<p id="msg" class="msg"></p>

<a href="dang-ky.html">Chưa có tài khoản? Đăng ký</a>

<div class="footer">
© 2026 KaizenMC Server
</div>

</div>

<script>

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

let tk=localStorage.getItem("tk")
let mk=localStorage.getItem("mk")

if(user==tk && pass==mk){

localStorage.setItem("login","true")
window.location.href="index.html"

}else{

document.getElementById("msg").innerText="❌ Sai tài khoản hoặc mật khẩu"

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - KaizenMC</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
  }
  .box {
    background: rgba(17, 24, 39, 0.92);
    padding: 50px 40px;
    border-radius: 20px;
    width: 380px;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 15px 50px rgba(0,0,0,0.8), 0 0 30px rgba(37,99,235,0.25);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(37,99,235,0.3);
    animation: fadeIn 0.8s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .logo {
    font-size: 48px;
    margin-bottom: 10px;
    animation: pulse 2s infinite alternate;
  }
  @keyframes pulse { to { transform: scale(1.05); } }
  h1 {
    margin: 0 0 30px;
    font-size: 28px;
    font-weight: 600;
    color: #60a5fa;
    text-shadow: 0 0 10px rgba(96,165,250,0.5);
  }
  .input-group {
    position: relative;
    margin-bottom: 20px;
  }
  input {
    width: 100%;
    padding: 14px 14px 14px 45px;
    border: none;
    border-radius: 10px;
    background: #1f2937;
    color: white;
    font-size: 15px;
    transition: all 0.3s;
  }
  input:focus {
    background: #374151;
    box-shadow: 0 0 0 3px #2563eb, 0 0 15px rgba(37,99,235,0.5);
    outline: none;
  }
  .icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    opacity: 0.7;
    pointer-events: none;
  }
  .eye {
    right: 15px;
    left: auto;
    cursor: pointer;
    opacity: 0.8;
  }
  button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #2563eb, #3b82f6, #60a5fa);
    background-size: 200% 100%;
    color: white;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.4s;
  }
  button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(59,130,246,0.6);
    background-position: right center;
  }
  .msg {
    margin-top: 15px;
    color: #f87171;
    font-size: 14px;
    min-height: 20px;
  }
  .success { color: #22c55e !important; }
  a {
    display: block;
    margin-top: 20px;
    color: #60a5fa;
    text-decoration: none;
    font-size: 14px;
  }
  a:hover { text-decoration: underline; color: #93c5fd; }
  .footer {
    margin-top: 30px;
    font-size: 12px;
    color: #6b7280;
  }
</style>
</head>
<body>

<div class="box">
  <div class="logo">🌍</div>
  <h1>KaizenMC Login</h1>

  <div class="input-group">
    <span class="icon">👤</span>
    <input id="user" placeholder="Tên tài khoản" autocomplete="username">
  </div>

  <div class="input-group">
    <span class="icon">🔒</span>
    <input id="pass" type="password" placeholder="Mật khẩu" autocomplete="current-password">
    <span class="eye icon" onclick="togglePass()">👁️</span>
  </div>

  <button onclick="login()">Đăng nhập</button>

  <p id="msg" class="msg"></p>

  <a href="dang-ky.html">Chưa có tài khoản? Đăng ký ngay</a>

  <div class="footer">
    © 2026 KaizenMC Server • Lao Cai, VN
  </div>
</div>

<script>
// Danh sách admin mặc định (giữ nguyên các tk bạn đã tạo)
const defaultAdmins = [
  { user: "kaizenadmin", pass: "123456789@" },
  { user: "kaizenadmindz", pass: "123456789@" },
  { user: "minhmeodz@!", pass: "123456789@" }
];

// Khởi tạo admin nếu chưa có
if (!localStorage.getItem("admins")) {
  localStorage.setItem("admins", JSON.stringify(defaultAdmins));
}

// Toggle hiển thị mật khẩu
function togglePass() {
  const passInput = document.getElementById("pass");
  const eye = document.querySelector(".eye");
  if (passInput.type === "password") {
    passInput.type = "text";
    eye.innerText = "🙈";
  } else {
    passInput.type = "password";
    eye.innerText = "👁️";
  }
}

function login() {
  const msg = document.getElementById("msg");
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value;

  if (!user || !pass) {
    msg.className = "msg";
    msg.innerText = "⚠️ Vui lòng nhập đầy đủ thông tin!";
    return;
  }

  msg.innerText = "Đang đăng nhập...";
  msg.className = "msg success";

  // Lấy danh sách admin
  const admins = JSON.parse(localStorage.getItem("admins")) || [];

  // Check admin
  const isAdmin = admins.some(admin => admin.user === user && admin.pass === pass);
  if (isAdmin) {
    localStorage.setItem("login", "true");
    localStorage.setItem("role", "admin");
    localStorage.setItem("username", user); // Lưu tên admin để hiển thị sau
    window.location.href = "admin.html";
    return;
  }

  // Check user thường (từ đăng ký)
  const registeredUser = localStorage.getItem("tk");
  const registeredPass = localStorage.getItem("mk");

  if (registeredUser && user === registeredUser && pass === registeredPass) {
    localStorage.setItem("login", "true");
    localStorage.setItem("role", "member");
    localStorage.setItem("username", user);
    window.location.href = "index.html";
    return;
  }

  // Sai thông tin
  msg.className = "msg";
  msg.innerText = "❌ Sai tên tài khoản hoặc mật khẩu!";
}

// Nếu đã login thì tự động redirect
if (localStorage.getItem("login") === "true") {
  const role = localStorage.getItem("role");
  if (role === "admin") {
    window.location.href = "admin.html";
  } else {
    window.location.href = "index.html";
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>
</head>

<body>

<h1>Đăng nhập</h1>

<input id="user" placeholder="Tên tài khoản"><br><br>
<input id="pass" type="password" placeholder="Mật khẩu"><br><br>

<button onclick="login()">Đăng nhập</button>

<p id="msg"></p>

<a href="dang-ky.html">Đăng ký</a>

<script>

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

let tk=localStorage.getItem("tk")
let mk=localStorage.getItem("mk")

if(user==tk && pass==mk){

localStorage.setItem("login","true")

window.location.href="index.html"

}else{

document.getElementById("msg").innerText="Sai tài khoản hoặc mật khẩu"

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaizenMC | Secure Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary: #3b82f6;
            --accent: #60a5fa;
            --error: #ff4d4d;
            --success: #00ff88;
            --glass: rgba(15, 23, 42, 0.65);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020617;
            color: white;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(37, 99, 235, 0.15) 0%, transparent 40%);
        }

        /* Hiệu ứng hạt trôi lơ lửng */
        .bg-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .blob {
            position: absolute;
            background: var(--primary);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.3;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        .login-card {
            background: var(--glass);
            padding: 50px 40px;
            border-radius: 32px;
            width: 420px;
            max-width: 95%;
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-card:hover { transform: translateY(-5px); }

        .logo-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        h1 {
            font-weight: 800;
            font-size: 30px;
            margin: 0 0 8px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 35px; }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .input-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            font-style: normal;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 25px -5px rgba(59, 130, 246, 0.6);
        }

        .msg {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 600;
            min-height: 20px;
        }

        .msg.error { color: var(--error); animation: shake 0.4s; }
        .msg.success { color: var(--success); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .links {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 14px;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .links a:hover { color: white; text-shadow: 0 0 10px var(--accent); }

        /* Icon mắt cho mật khẩu */
        .toggle-pass {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="bg-blobs">
    <div class="blob" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="blob" style="width: 300px; height: 300px; bottom: -50px; right: -50px; background: #1e40af;"></div>
</div>

<div class="login-card">
    <div class="logo-wrapper">🌍</div>
    <h1>KAIZENMC</h1>
    <p class="subtitle">Welcome back, Traveler!</p>

    <div class="input-box">
        <i>👤</i>
        <input type="text" id="user" placeholder="Username" autocomplete="off">
    </div>

    <div class="input-box">
        <i>🔒</i>
        <input type="password" id="pass" placeholder="Password">
        <span class="toggle-pass" onclick="togglePass()" id="eye">👁️</span>
    </div>

    <button class="btn-login" onclick="login()">ĐĂNG NHẬP</button>

    <p id="msg" class="msg"></p>

    <div class="links">
        New here? <a href="dang-ky.html">Create an Account</a>
    </div>
</div>

<script>
// --- CẤU HÌNH FIREBASE (DÙNG KEY CỦA ÔNG) ---
const firebaseConfig = {
    apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
    authDomain: "kaizenmc-web-ba518.firebaseapp.com",
    projectId: "kaizenmc-web-ba518",
    storageBucket: "kaizenmc-web-ba518.firebasestorage.app",
    messagingSenderId: "342779721859",
    appId: "1:342779721859:web:bc8b9f5ea4ae7fe77283b6",
    measurementId: "G-JYHYYGDPRC",
    databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ADMIN_LIST = ["kaizenadmin", "kaizenadmindz", "minhmeodz@!"];

function togglePass() {
    const p = document.getElementById("pass");
    const e = document.getElementById("eye");
    p.type = p.type === "password" ? "text" : "password";
    e.innerText = p.type === "password" ? "👁️" : "🙈";
}

async function login() {
    const user = document.getElementById("user").value.trim().toLowerCase();
    const pass = document.getElementById("pass").value;
    const msg = document.getElementById("msg");

    if (!user || !pass) {
        showMsg("⚠️ Hãy nhập đủ thông tin sếp ơi!", "error");
        return;
    }

    showMsg("⌛ Đang xác thực...", "success");

    // Clear session cũ
    localStorage.clear();

    // 1. Check Admin
    if (ADMIN_LIST.includes(user) && pass === "123456789@") {
        saveAndGo(user, "admin", "admin.html");
        return;
    }

    // 2. Check Firebase
    try {
        const snapshot = await db.ref('users/' + user).once('value');
        const userData = snapshot.val();

        if (userData && userData.password === pass) {
            saveAndGo(user, "member", "index.html");
        } else {
            showMsg("❌ Sai tài khoản hoặc mật khẩu!", "error");
        }
    } catch (e) {
        showMsg("❗ Lỗi kết nối Firebase!", "error");
    }
}

function saveAndGo(u, r, target) {
    localStorage.setItem("login", "true");
    localStorage.setItem("username", u);
    localStorage.setItem("role", r);
    showMsg("✅ Thành công! Đang chuyển hướng...", "success");
    setTimeout(() => { window.location.href = target; }, 1200);
}

function showMsg(txt, type) {
    const m = document.getElementById("msg");
    m.innerText = txt;
    m.className = "msg " + type;
}
</script>

</body>
</html>

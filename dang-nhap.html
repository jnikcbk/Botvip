<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaizenMC | Đăng Nhập Hệ Thống</title>
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #60a5fa;
            --error: #ef4444;
            --success: #22c55e;
            --bg: #020617;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Hiệu ứng mờ ảo phía sau */
        body::before {
            content: "";
            position: absolute;
            width: 300px; height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.2;
            top: 20%; left: 30%;
            z-index: -1;
        }

        .login-container {
            background: rgba(15, 23, 42, 0.7);
            padding: 40px;
            border-radius: 24px;
            width: 380px;
            max-width: 90%;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: appear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes appear {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo-box {
            font-size: 50px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px var(--primary));
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            margin: 0 0 10px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group span.icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .eye {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.6;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
        }

        button:active { transform: translateY(0); }

        .msg {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
            transition: 0.3s;
        }
        .msg.error { color: var(--error); animation: shake 0.3s; }
        .msg.success { color: var(--success); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .link-area {
            margin-top: 25px;
            font-size: 14px;
        }

        .link-area a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .link-area a:hover { text-decoration: underline; }

        .footer {
            margin-top: 35px;
            font-size: 11px;
            color: #475569;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="login-container" id="loginBox">
    <div class="logo-box">🌍</div>
    <h1>KAIZENMC LOGIN</h1>
    <p class="subtitle">Hành trình Minecraft của bạn bắt đầu tại đây</p>

    <div class="input-group">
        <span class="icon">👤</span>
        <input id="user" placeholder="Tên tài khoản" autocomplete="off">
    </div>

    <div class="input-group">
        <span class="icon">🔒</span>
        <input id="pass" type="password" placeholder="Mật khẩu">
        <span class="eye" onclick="togglePass()" id="eyeIcon">👁️</span>
    </div>

    <button onclick="login()">ĐĂNG NHẬP NGAY</button>

    <p id="msg" class="msg"></p>

    <div class="link-area">
        <span style="opacity: 0.6">Thành viên mới?</span> 
        <a href="dang-ky.html">Đăng ký tài khoản</a>
    </div>

    <div class="footer">© 2026 KAIZENMC SERVER • LAO CAI</div>
</div>

<script>
// Danh sách admin (Phải khớp chính xác)
const admins = [
    { user: "kaizenadmin", pass: "123456789@" },
    { user: "kaizenadmindz", pass: "123456789@" },
    { user: "minhmeodz@!", pass: "123456789@" }
];

function togglePass() {
    const p = document.getElementById("pass");
    const e = document.getElementById("eyeIcon");
    if(p.type === "password") {
        p.type = "text"; e.innerText = "🙈";
    } else {
        p.type = "password"; e.innerText = "👁️";
    }
}

function login() {
    const msg = document.getElementById("msg");
    const user = document.getElementById("user").value.trim();
    const pass = document.getElementById("pass").value;

    if (!user || !pass) {
        msg.innerText = "⚠️ Nhập đầy đủ thông tin đã sếp ơi!";
        msg.className = "msg error";
        return;
    }

    // --- BƯỚC FIX QUAN TRỌNG ---
    // Xóa sạch session cũ trước khi check mới để tránh nhầm Role
    localStorage.removeItem("login");
    localStorage.removeItem("role");
    localStorage.removeItem("username");

    // 1. Kiểm tra Admin
    const adminFound = admins.find(a => a.user === user && a.pass === pass);
    if (adminFound) {
        msg.innerText = "✅ Đang chuyển hướng Admin Panel...";
        msg.className = "msg success";
        
        localStorage.setItem("login", "true");
        localStorage.setItem("role", "admin");
        localStorage.setItem("username", user);
        localStorage.setItem("tk", user); // Giữ cho trang admin cũ
        
        setTimeout(() => window.location.href = "admin.html", 1000);
        return;
    }

    // 2. Kiểm tra Member (Từ đăng ký)
    const regUser = localStorage.getItem("tk");
    const regPass = localStorage.getItem("mk");

    if (regUser && user === regUser && pass === regPass) {
        msg.innerText = "✅ Đăng nhập thành công! Đang vào game...";
        msg.className = "msg success";
        
        localStorage.setItem("login", "true");
        localStorage.setItem("role", "member"); // Gán đúng role member
        localStorage.setItem("username", user);
        
        setTimeout(() => window.location.href = "index.html", 1000);
        return;
    }

    // 3. Sai thông tin
    msg.innerText = "❌ Sai tài khoản hoặc mật khẩu rồi!";
    msg.className = "msg error";
}

// Chặn việc tự ý nhảy trang khi load lại
window.onload = () => {
    if (localStorage.getItem("login") === "true") {
        const role = localStorage.getItem("role");
        if (role === "admin") {
            window.location.href = "admin.html";
        } else if (role === "member") {
            window.location.href = "index.html";
        }
    }
}
</script>

</body>
</html>

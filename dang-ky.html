<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.box{
background:#111827;
padding:40px;
border-radius:14px;
width:350px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.gmail{
background:#ea4335;
}

.verify{
background:#22c55e;
}

.msg{
margin-top:10px;
color:#22c55e;
}

a{
display:block;
margin-top:15px;
color:#60a5fa;
text-decoration:none;
}

</style>
</head>

<body>

<div class="box">

<h1>📝 Đăng ký KaizenMC</h1>

<input id="user" placeholder="Tên tài khoản">
<input id="pass" type="password" placeholder="Mật khẩu">

<button onclick="register()">Đăng ký tài khoản</button>

<hr style="margin:20px 0;opacity:0.2;">

<input id="gmail" placeholder="Nhập Gmail">

<button class="gmail" onclick="sendCode()">Gửi mã xác minh</button>

<input id="code" placeholder="Nhập mã OTP" style="display:none">
<button class="verify" onclick="verify()" style="display:none">Xác minh Gmail</button>

<p id="msg" class="msg"></p>

<a href="dang-nhap.html">Đã có tài khoản? Đăng nhập</a>

</div>

<script>

(function(){
emailjs.init("kcbIQHJFwC1v2brL3")
})();

let otp=""
let verified=false

function register(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value
let gmail=document.getElementById("gmail").value

if(user=="" || pass=="" || gmail==""){
msg("⚠️ Nhập đầy đủ thông tin")
return
}

if(!verified){
msg("⚠️ Bạn phải xác minh Gmail trước")
return
}

localStorage.setItem("tk",user)
localStorage.setItem("mk",pass)
localStorage.setItem("gmail",gmail)

msg("✅ Đăng ký thành công")

}

function sendCode(){

let gmail=document.getElementById("gmail").value

if(gmail==""){
msg("⚠️ Nhập Gmail")
return
}

otp=Math.floor(100000+Math.random()*900000)

emailjs.send("service_uhcqzpe","template_etl5hyj",{
email:gmail,
code:otp
}).then(function(){

msg("📧 Đã gửi mã OTP đến Gmail")

document.getElementById("code").style.display="block"
document.querySelector(".verify").style.display="block"

})

}

function verify(){

let code=document.getElementById("code").value

if(code==otp){

verified=true

msg("✅ Gmail xác minh thành công")

}else{

msg("❌ Sai mã OTP")

}

}

function msg(t){
document.getElementById("msg").innerText=t
}

</script>
</body>
</html>

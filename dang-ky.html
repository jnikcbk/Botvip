<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký - KaizenMC</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  /* Giữ nguyên style cũ của bạn, mình không thay đổi để khớp */
  body { margin:0; font-family:Arial; background:linear-gradient(135deg,#020617,#0f172a); height:100vh; display:flex; justify-content:center; align-items:center; color:white; }
  .box { background:#111827; padding:40px; border-radius:14px; width:350px; text-align:center; box-shadow:0 0 30px rgba(0,0,0,0.6); }
  h1 { margin-bottom:20px; }
  input { width:100%; padding:12px; margin:8px 0; border:none; border-radius:8px; background:#1f2937; color:white; outline:none; }
  button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; background:#2563eb; color:white; font-weight:bold; cursor:pointer; }
  button:hover { background:#1d4ed8; }
  .gmail { background:#ea4335; }
  .verify { background:#22c55e; }
  .msg { margin-top:10px; color:#22c55e; }
  a { display:block; margin-top:15px; color:#60a5fa; text-decoration:none; }
</style>
</head>
<body>
<div class="box">
  <h1>📝 Đăng ký KaizenMC</h1>
  <input id="user" placeholder="Tên tài khoản">
  <input id="pass" type="password" placeholder="Mật khẩu">
  <button onclick="register()">Đăng ký tài khoản</button>
  <hr style="margin:20px 0;opacity:0.2;">
  <input id="gmail" placeholder="Nhập Gmail">
  <button class="gmail" onclick="sendCode()">Gửi mã xác minh</button>
  <input id="code" placeholder="Nhập mã OTP" style="display:none">
  <button class="verify" onclick="verify()" style="display:none">Xác minh Gmail</button>
  <p id="msg" class="msg"></p>
  <a href="dang-nhap.html">Đã có tài khoản? Đăng nhập</a>
</div>

<script>
(function(){
  emailjs.init("YOUR_PUBLIC_KEY_HERE"); // THAY PUBLIC KEY EMAILJS
})();
let otp = "";
let verified = false;

function msg(t, type = "success") {
  const el = document.getElementById("msg");
  el.innerText = t;
  el.style.color = type === "error" ? "#ef4444" : "#22c55e";
}

function sendCode(){
  let gmail = document.getElementById("gmail").value.trim();
  if(gmail==""){
    msg("⚠️ Nhập Gmail", "error");
    return;
  }
  otp = Math.floor(100000 + Math.random()*900000).toString();
  msg("Đang gửi mã OTP...");
  emailjs.send("service_uhcqzpe","template_etl5hyj",{ email:gmail, code:otp })
  .then(function(){
    msg("📧 Đã gửi mã OTP đến Gmail");
    document.getElementById("code").style.display="block";
    document.querySelector(".verify").style.display="block";
  }).catch(err => {
    console.error(err);
    msg("❌ Lỗi gửi OTP", "error");
  });
}

function verify(){
  let code = document.getElementById("code").value.trim();
  if(code == otp){
    verified = true;
    msg("✅ Gmail xác minh thành công");
  }else{
    msg("❌ Sai mã OTP", "error");
  }
}

function register(){
  let user = document.getElementById("user").value.trim();
  let pass = document.getElementById("pass").value;
  let gmail = document.getElementById("gmail").value.trim();

  if(!user || !pass || !gmail){
    msg("⚠️ Nhập đầy đủ thông tin", "error");
    return;
  }
  if(user.toLowerCase().includes("admin") || user.toLowerCase() === "admindz"){
    msg("❌ Tên này bị cấm", "error");
    return;
  }
  if(!verified){
    msg("⚠️ Phải xác minh Gmail trước", "error");
    return;
  }

  localStorage.setItem("tk", user);
  localStorage.setItem("mk", pass);
  localStorage.setItem("gmail", gmail);

  // GỬI LOG DISCORD KHI ĐĂNG KÝ THÀNH CÔNG
  async function sendRegisterLog() {
    console.log("Đang gửi log đăng ký cho user:", user); // Để debug
    try {
      const response = await fetch("/api/send-log", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
          type: "register", 
          username: user 
        })
      });
      const data = await response.json();
      console.log("Kết quả gửi log đăng ký:", data);
      if (!response.ok) {
        console.error("Gửi log đăng ký thất bại:", response.status, data);
      }
    } catch (err) {
      console.error("Lỗi gọi API log đăng ký:", err);
    }
  }

  sendRegisterLog();

  msg("🎉 Đăng ký thành công! Chuyển hướng đến đăng nhập...");
  setTimeout(() => { window.location.href = "dang-nhap.html"; }, 1500);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KaizenMC - Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#020617;
color:white;
}

.wrapper{
max-width:1000px;
margin:auto;
padding:40px;
}

.section{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;
margin:5px;
color:white;
}

.btn-green{background:#22c55e;}
.btn-red{background:#ef4444;}
.btn-blue{background:#3b82f6;}

.card{
background:#111827;
padding:15px;
margin-top:10px;
border-radius:8px;
}

#adminContent{display:none;}

</style>
</head>

<body>

<div class="wrapper">

<div id="authScreen">

<h2>🔒 Admin Access</h2>

<input id="secretKey" type="password" placeholder="Nhập Secret Key">

<button class="btn-blue" onclick="verifyAdmin()">Xác nhận</button>

<p id="msgAuth"></p>

</div>


<div id="adminContent">

<h1>⚙️ KaizenMC Admin Panel</h1>

<div class="section">

<h3>💰 Cộng Xu</h3>

<input id="targetUser" placeholder="Tên user">
<input id="amountXu" type="number" placeholder="Số xu">

<button class="btn-green" onclick="addXu()">Cộng Xu</button>

</div>


<div class="section">

<h3>🗑️ Xóa tài khoản</h3>

<input id="deleteUser" placeholder="Tên user cần xóa">

<button class="btn-red" onclick="deleteAccount()">Xóa Acc</button>

</div>


<div class="section">

<h3>💳 Thẻ nạp chờ duyệt</h3>

<div id="napList"></div>

</div>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
authDomain:"kaizenmc-web-ba518.firebaseapp.com",
databaseURL:"https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"kaizenmc-web-ba518"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();


const SECRET_KEY="aduadmindzvokia";

const ADMIN_NAMES=[
"kaizenadmin",
"kaizenadmindz",
"minhmeodz@!"
];


function verifyAdmin(){

const key=document.getElementById("secretKey").value.trim();
const username=localStorage.getItem("username");
const msg=document.getElementById("msgAuth");

if(!username){
msg.innerText="❌ Chưa đăng nhập";
return;
}

if(!ADMIN_NAMES.includes(username.toLowerCase())){
msg.innerText="❌ Không có quyền admin";
return;
}

if(key!==SECRET_KEY){
msg.innerText="❌ Secret key sai";
return;
}

document.getElementById("authScreen").style.display="none";
document.getElementById("adminContent").style.display="block";

loadCards();

}



async function addXu(){

const user=document.getElementById("targetUser").value.trim().toLowerCase();
const xu=parseInt(document.getElementById("amountXu").value);

if(!user||isNaN(xu)){
alert("Nhập đủ thông tin");
return;
}

const ref=db.ref("users/"+user);
const snap=await ref.once("value");

if(!snap.exists()){
alert("User không tồn tại");
return;
}

const current=snap.val().xu||0;

await ref.update({
xu:current+xu
});

alert("Đã cộng xu");

}



async function deleteAccount(){

const user=document.getElementById("deleteUser").value.trim().toLowerCase();

if(!confirm("Xóa tài khoản "+user+" ?"))return;

await db.ref("users/"+user).remove();

alert("Đã xóa");

}



async function loadCards(){

const list=document.getElementById("napList");

const snap=await db.ref("napthe").once("value");

list.innerHTML="";

if(!snap.exists()){
list.innerHTML="Không có thẻ";
return;
}

snap.forEach(child=>{

const data=child.val();

const div=document.createElement("div");

div.className="card";

div.innerHTML=`

<b>User:</b> ${data.user}<br>
<b>Nhà mạng:</b> ${data.telco}<br>
<b>Mệnh giá:</b> ${data.amount}<br>

<button class="btn-green" onclick="approveCard('${child.key}','${data.user}',${data.amount})">Duyệt</button>

<button class="btn-red" onclick="rejectCard('${child.key}')">Từ chối</button>

`;

list.appendChild(div);

});

}



async function approveCard(id,user,amount){

const ref=db.ref("users/"+user);
const snap=await ref.once("value");

const current=snap.val().xu||0;

await ref.update({
xu:current+amount
});

await db.ref("napthe/"+id).remove();

alert("Đã duyệt thẻ");

loadCards();

}



async function rejectCard(id){

await db.ref("napthe/"+id).remove();

alert("Đã xóa thẻ");

loadCards();

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chill Companion</title>
    <style>
        :root {
            --bg: #f8edeb;
            --text: #4a4e69;
            --accent: #ffb5a7;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: 0.5s;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            width: 320px;
            text-align: center;
        }

        /* Thú ảo */
        .pet-stage {
            font-size: 80px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Thanh trạng thái */
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .stat-item {
            font-size: 14px;
            font-weight: bold;
        }

        .progress-bar {
            width: 80px;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 100%;
            transition: 0.3s;
        }

        /* Nút điều khiển */
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        button {
            border: none;
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            background: var(--bg);
            color: var(--text);
        }

        button:hover {
            filter: brightness(0.9);
            transform: scale(1.05);
        }

        /* Music Player */
        .music-player {
            background: #fdf0ee;
            padding: 15px;
            border-radius: 20px;
            border: 1px dashed var(--accent);
        }

        .song-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="pet-name" style="font-weight: 800; font-size: 20px;">MÈO BÉO</div>
        
        <div class="pet-stage" id="pet-icon">🐱</div>

        <div class="stats">
            <div class="stat-item">
                No bụng
                <div class="progress-bar"><div id="hunger-bar" class="progress-fill"></div></div>
            </div>
            <div class="stat-item">
                Hạnh phúc
                <div class="progress-bar"><div id="happy-bar" class="progress-fill"></div></div>
            </div>
        </div>

        <div class="actions">
            <button onclick="feedPet()">🍕 Cho ăn</button>
            <button onclick="petMe()">🖐 Vuốt ve</button>
            <button onclick="changeTheme()">🌓 Đổi màu</button>
            <button onclick="renamePet()">✏️ Đổi tên</button>
        </div>

        <div class="music-player">
            <span class="song-title">🎵 Đang phát: Chill Lofi Beats</span>
            <button onclick="playMusic()" id="btn-music" style="width: 100%;">Phát nhạc trên YouTube</button>
        </div>
    </div>

    <script>
        let hunger = 100;
        let happiness = 100;
        let isDarkMode = false;

        // Giảm chỉ số theo thời gian
        setInterval(() => {
            hunger = Math.max(0, hunger - 1);
            happiness = Math.max(0, happiness - 0.5);
            updateUI();
            checkStatus();
        }, 3000);

        function updateUI() {
            document.getElementById('hunger-bar').style.width = hunger + "%";
            document.getElementById('happy-bar').style.width = happiness + "%";
        }

        function checkStatus() {
            const pet = document.getElementById('pet-icon');
            if (hunger < 20) pet.innerText = "😿";
            else if (happiness < 20) pet.innerText = "😿";
            else if (hunger > 80 && happiness > 80) pet.innerText = "😸";
            else pet.innerText = "🐱";
        }

        function feedPet() {
            hunger = Math.min(100, hunger + 20);
            document.getElementById('pet-icon').innerText = "😋";
            setTimeout(checkStatus, 1000);
            updateUI();
        }

        function petMe() {
            happiness = Math.min(100, happiness + 15);
            document.getElementById('pet-icon').innerText = "🥰";
            setTimeout(checkStatus, 1000);
            updateUI();
        }

        function renamePet() {
            const newName = prompt("Đặt tên mới cho thú cưng:");
            if(newName) document.getElementById('pet-name').innerText = newName.toUpperCase();
        }

        function changeTheme() {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.documentElement.style.setProperty('--bg', '#2d3436');
                document.documentElement.style.setProperty('--text', '#dfe6e9');
                document.documentElement.style.setProperty('--accent', '#636e72');
            } else {
                document.documentElement.style.setProperty('--bg', '#f8edeb');
                document.documentElement.style.setProperty('--text', '#4a4e69');
                document.documentElement.style.setProperty('--accent', '#ffb5a7');
            }
        }

        // Tích hợp YouTube Music Tool
        function playMusic() {
            // Đây là nơi bạn có thể gọi API YouTube Music nếu muốn
            // Ở đây mình sẽ giả lập hành động phát một playlist chill
            alert("Đang chuẩn bị danh sách nhạc Chill cho bạn...");
        }
    </script>
</body>
</html>

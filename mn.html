<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ASYLUM: FINAL NIGHTMARE</title>
    <style>
        :root { --red: #ff0000; --dark: #050505; --gray: #1a1a1a; --blood: #8b0000; }
        body { background: var(--dark); color: #ccc; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .crt-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05)); background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 100; opacity: 0.7; }
        .game-wrapper { width: 95%; max-width: 1000px; display: grid; grid-template-columns: 1fr 300px; gap: 15px; height: 90vh; }
        .main-view { background: #000; border: 1px solid #333; padding: 25px; position: relative; display: flex; flex-direction: column; }
        #visual { font-size: 100px; flex-grow: 1; display: flex; align-items: center; justify-content: center; text-shadow: 0 0 30px var(--red); transition: transform 0.1s; }
        #dialog { font-size: 15px; min-height: 120px; border-top: 1px solid #222; padding-top: 20px; line-height: 1.6; color: #aaa; }
        .sidebar { background: #0a0a0a; border: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .stat-group { margin-bottom: 15px; }
        .stat-label { font-size: 11px; color: var(--red); font-weight: bold; margin-bottom: 8px; letter-spacing: 1px; }
        .bar-bg { width: 100%; height: 6px; background: #111; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--red); transition: width 0.4s ease; box-shadow: 0 0 10px var(--red); }
        .inventory-box, .log-box { font-size: 12px; background: #000; border: 1px solid #1a1a1a; padding: 10px; min-height: 100px; }
        .item { color: #888; margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 3px; display: block; }
        .log-entry { color: #555; margin-bottom: 8px; border-left: 2px solid #333; padding-left: 8px; font-style: italic; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { background: #000; border: 1px solid #333; color: #888; padding: 15px; cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.2s; }
        button:hover:not(:disabled) { border-color: var(--red); color: #fff; background: rgba(255,0,0,0.05); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .glitch { animation: shake 0.2s infinite; filter: contrast(200%) brightness(150%); }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 25% { transform: translate(-2px, -2px); } 50% { transform: translate(2px, -2px); } 100% { transform: translate(0, 0); } }
        .dead-screen { color: var(--red); font-size: 30px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="game-wrapper">
        <div class="main-view">
            <div id="visual">🏚️</div>
            <div id="dialog">Đang tải dữ liệu bệnh viện...</div>
            <div class="controls" id="choices"></div>
        </div>
        <div class="sidebar">
            <div class="stat-group">
                <div class="stat-label">TÂM LÝ (SANITY)</div>
                <div class="bar-bg"><div id="sanity-bar" class="bar-fill" style="width: 100%"></div></div>
            </div>
            <div class="stat-group">
                <div class="stat-label">KHOẢNG CÁCH KẺ SÁT NHÂN</div>
                <div class="bar-bg"><div id="stalker-bar" class="bar-fill" style="width: 0%; background: orange;"></div></div>
            </div>
            <div class="stat-label">HÀNH TRANG</div>
            <div class="inventory-box" id="inventory"></div>
            <div class="stat-label">NHẬT KÝ THÁM TỬ</div>
            <div class="log-box" id="logs"></div>
        </div>
    </div>

    <script>
        // Cấu hình trạng thái Game
        let state = {
            sanity: 100, stalkerDist: 0, 
            inv: new Set(), logs: [], 
            currentScene: 'start',
            flags: { hasPower: false, cctvChecked: false, doorLocked: false }
        };

        // Dữ liệu cảnh quay (Mở rộng quy mô lớn)
        const scenes = {
            // TẦNG 1: KHỞI ĐẦU
            start: {
                txt: "Bạn tỉnh lại tại sảnh bệnh viện Asylum. Mùi thuốc sát trùng nồng nặc đến nghẹt thở. Một dãy hành lang dẫn vào bóng tối và một phòng trực ban có đèn nhấp nháy.",
                vis: "🏥",
                btns: [
                    { t: "Vào Phòng Trực Ban", next: "security" },
                    { t: "Đi vào Hành Lang", next: "hallway_dark" }
                ]
            },
            security: {
                txt: "Căn phòng ngổn ngang giấy tờ. Hệ thống màn hình CCTV cũ kỹ đang hoạt động. Có một chiếc tủ sắt khóa kín.",
                vis: "🖥️",
                btns: [
                    { t: "Xem Camera", next: "cctv_logic" },
                    { t: "Phá tủ sắt", next: "locker_break" },
                    { t: "Quay ra sảnh", next: "start" }
                ]
            },
            cctv_logic: {
                txt: "Hình ảnh đen trắng nhiễu nặng. Bạn thấy một bóng người cao lớn cầm chiếc rìu rỉ sét đứng ở Khu Phẫu Thuật Tầng 2. Hắn ta vừa viết một con số lên kính: '3'.",
                vis: "📺",
                onEnter: () => { addLog("Số đầu tiên của mật mã: 3"); state.flags.cctvChecked = true; },
                btns: [{ t: "Rời màn hình", next: "security" }]
            },
            locker_break: {
                txt: "Bạn dùng hết sức phá tủ. Bên trong là một khẩu súng Flare (Pháo sáng) nhưng không có đạn. Bạn cũng tìm thấy một tờ giấy: 'Mật mã tầng 2 bắt đầu bằng số 3...'",
                vis: "📦",
                onEnter: () => { state.sanity -= 5; addInv("Flare Gun (Hết đạn)"); },
                btns: [{ t: "Tiếp tục", next: "security" }]
            },

            // KHU VỰC HÀNH LANG & TRUY ĐUỔI
            hallway_dark: {
                txt: "Hành lang tối om. Đèn trần rơi rụng. Bạn nghe thấy tiếng kéo lê vật nặng bằng kim loại từ phía sau. RẤT GẦN.",
                vis: "👣",
                onEnter: () => { state.stalkerDist = 40; },
                btns: [
                    { t: "Chạy vào Nhà Kho", next: "storage" },
                    { t: "Trốn vào Nhà Vệ Sinh", next: "restroom_hide" }
                ]
            },
            restroom_hide: {
                txt: "Bạn nấp vào buồng vệ sinh cuối cùng. Tiếng bước chân dừng lại ngay trước cửa. Hắn đứng đó im lặng 30 giây rồi bỏ đi. Tim bạn đập loạn nhịp.",
                vis: "🚽",
                onEnter: () => { state.stalkerDist = 10; state.sanity -= 15; },
                btns: [{ t: "Ra ngoài", next: "hallway_mid" }]
            },
            storage: {
                txt: "Trong nhà kho, bạn tìm thấy một hũ hóa chất dễ cháy và một hộp diêm.",
                vis: "🧪",
                onEnter: () => { addInv("Hóa chất"); addInv("Diêm"); },
                btns: [{ t: "Đi tiếp hành lang", next: "hallway_mid" }]
            },

            // TẦNG HẦM: KHU THÍ NGHIỆM (HƠN 10 CẢNH LIÊN HOÀN)
            hallway_mid: {
                txt: "Hành lang chia làm hai ngả: Lối xuống Cầu thang hầm và lối lên Tầng 2. Tiếng gào thét u uất vang lên từ dưới hầm.",
                vis: "➿",
                btns: [
                    { t: "Xuống Tầng Hầm", next: "basement_gate" },
                    { t: "Lên Tầng 2", next: "stairs_up" }
                ]
            },
            basement_gate: {
                txt: "Cửa tầng hầm bị khóa bởi xích sắt. Bạn cần thứ gì đó để cắt nó hoặc chìa khóa bảo vệ.",
                vis: "⛓️",
                btns: [
                    { t: "Dùng chìa khóa vạn năng", next: "basement_inside", req: "Chìa khóa vạn năng" },
                    { t: "Quay lại tìm đồ", next: "hallway_mid" }
                ]
            },
            basement_inside: {
                txt: "Phòng thí nghiệm bí mật. Các thùng chứa mẫu vật biến dị. Một cái xác bác sĩ còn giữ một chiếc 'Thẻ Từ Xanh'.",
                vis: "🧬",
                onEnter: () => { addInv("Thẻ Từ Xanh"); addLog("Đã có quyền truy cập khu phẫu thuật."); },
                btns: [
                    { t: "Kiểm tra lò hơi", next: "boiler_room" },
                    { t: "Trở lại hành lang", next: "hallway_mid" }
                ]
            },

            // KẾT THÚC & TRẠNG THÁI
            win: {
                txt: "Bạn mở được cửa sân thượng. Chiếc trực thăng cứu hộ đang hạ cánh. Bạn đã thoát khỏi cơn ác mộng này, nhưng những tiếng thét sẽ còn ám ảnh bạn mãi mãi.",
                vis: "🚁",
                btns: [{ t: "CHƠI LẠI", next: "start", reset: true }]
            },
            death: {
                txt: "Tầm nhìn nhòe đi. Hắn đứng đó, lưỡi rìu vung lên cao. Kết thúc rồi.",
                vis: "🪓",
                btns: [{ t: "THỬ LẠI", next: "start", reset: true }]
            }
        };

        // Hàm bổ trợ hệ thống
        function addInv(item) {
            state.inv.add(item);
            renderInventory();
        }

        function renderInventory() {
            const box = document.getElementById('inventory');
            box.innerHTML = Array.from(state.inv).map(i => `<span class="item">√ ${i}</span>`).join('');
        }

        function addLog(msg) {
            state.logs.push(msg);
            const box = document.getElementById('logs');
            box.innerHTML = state.logs.map(l => `<div class="log-entry">${l}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        function updateUI() {
            document.getElementById('sanity-bar').style.width = state.sanity + "%";
            const sBar = document.getElementById('stalker-bar');
            sBar.style.width = state.stalkerDist + "%";
            
            if(state.stalkerDist > 70 || state.sanity < 20) {
                document.getElementById('visual').classList.add('glitch');
            } else {
                document.getElementById('visual').classList.remove('glitch');
            }
        }

        function render(key) {
            const scene = scenes[key];
            if(!scene) return;
            
            if(scene.reset) {
                state = { sanity: 100, stalkerDist: 0, inv: new Set(), logs: [], currentScene: 'start', flags: {} };
                document.getElementById('inventory').innerHTML = "";
                document.getElementById('logs').innerHTML = "";
            }

            const vis = document.getElementById('visual');
            const dial = document.getElementById('dialog');
            const ctrl = document.getElementById('choices');

            vis.innerText = scene.vis;
            dial.innerText = scene.txt;
            ctrl.innerHTML = "";

            if(scene.onEnter) scene.onEnter();

            scene.btns.forEach(b => {
                const btn = document.createElement('button');
                btn.innerText = b.t;
                if(b.req && !state.inv.has(b.req)) {
                    btn.disabled = true;
                    btn.innerText += " (Cần " + b.req + ")";
                }
                btn.onclick = () => {
                    state.sanity -= 2;
                    if(state.stalkerDist > 0) state.stalkerDist += 5;
                    updateUI();
                    if(state.sanity <= 0 || state.stalkerDist >= 100) render('death');
                    else render(b.next);
                };
                ctrl.appendChild(btn);
            });
            updateUI();
        }

        // Vòng lặp thời gian thực
        setInterval(() => {
            if(state.sanity > 0) {
                state.sanity -= 0.5;
                if(state.stalkerDist > 0 && state.stalkerDist < 100) state.stalkerDist += 0.2;
                updateUI();
            }
        }, 3000);

        // Khởi động Game
        render('start');
        addLog("Hệ thống thám tử đã sẵn sàng...");
    </script>
</body>
</html>

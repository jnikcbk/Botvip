<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_ACCESS_GRANTED</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        #terminal {
            width: 80%;
            height: 70%;
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid #0f0;
            padding: 20px;
            box-shadow: 0 0 20px #0f0;
            overflow-y: auto;
            position: relative;
        }

        .input-area {
            display: flex;
            width: 80%;
            margin-top: 10px;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: inherit;
            font-size: 1.2em;
            width: 100%;
            outline: none;
        }

        .prompt { color: #0f0; font-weight: bold; margin-right: 10px; }

        .error { color: #f00; text-shadow: 0 0 5px #f00; }
        .success { color: #0ff; text-shadow: 0 0 5px #0ff; }

        #timer {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 2em;
            color: #f00;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="timer">TRACING: 60s</div>

    <div id="terminal" id="output">
        <div>[SYSTEM] KHOI DONG GIAO DIEN BE KHOA...</div>
        <div>[SYSTEM] DANG QUET DIA CHI IP... DONE.</div>
        <div>[SYSTEM] GO 'help' DE XEM CAC LENH CO BAN.</div>
        <hr>
    </div>

    <div class="input-area">
        <span class="prompt">ROOT@SYSTEM_V13:~#</span>
        <input type="text" id="cmd-input" autofocus autocomplete="off">
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // Logic Terminal
        const input = document.getElementById('cmd-input');
        const output = document.getElementById('terminal');
        let timeLeft = 60;
        let isHacked = false;

        const countdown = setInterval(() => {
            if(!isHacked) {
                timeLeft--;
                document.getElementById('timer').innerText = `TRACING: ${timeLeft}s`;
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    alert("ACCESS DENIED: BAN DA BI PHAT HIEN!");
                    location.reload();
                }
            }
        }, 1000);

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const cmd = this.value.toLowerCase().trim();
                handleCommand(cmd);
                this.value = '';
            }
        });

        function print(text, type = '') {
            const line = document.createElement('div');
            line.className = type;
            line.innerHTML = `> ${text}`;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function handleCommand(cmd) {
            if (cmd === 'help') {
                print("Lệnh khả dụng: scan, crack, bypass, clear, exit");
            } else if (cmd === 'scan') {
                print("Đang quét lỗ hổng bảo mật...");
                setTimeout(() => print("Tìm thấy cổng 8080 đang hở!", "success"), 1000);
            } else if (cmd === 'crack') {
                print("Bắt đầu brute-force mật khẩu...");
                let progress = 0;
                const i = setInterval(() => {
                    progress += 20;
                    print(`Cracking... ${progress}%`);
                    if(progress >= 100) {
                        clearInterval(i);
                        print("CRACK THANH CONG! MAT KHAU: 123456", "success");
                    }
                }, 500);
            } else if (cmd === 'bypass') {
                print("Đang vượt tường lửa...", "error");
                setTimeout(() => {
                    isHacked = true;
                    print("PHAY HUY TUONG LUA THANH CONG! HE THONG DA BI CHIEM QUYEN.", "success");
                    document.body.style.boxShadow = "inset 0 0 100px #0ff";
                    document.getElementById('timer').innerText = "SYSTEM HIJACKED";
                }, 2000);
            } else if (cmd === 'clear') {
                output.innerHTML = '';
            } else {
                print(`Lệnh không hợp lệ: ${cmd}`, 'error');
            }
        }
    </script>
</body>
</html>

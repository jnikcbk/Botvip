<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Room - Escape Game</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #e0e0e0;
            --accent: #ff003c;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-screen {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            border: 1px solid #333;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* Hình ảnh minh họa căn phòng bằng CSS */
        .room-view {
            height: 200px;
            background: #1a1a1a;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            border: 1px solid #444;
            transition: 0.5s;
        }

        .dialog-box {
            min-height: 80px;
            margin-bottom: 20px;
            line-height: 1.5;
            font-size: 16px;
            color: #ccc;
        }

        /* Nút lựa chọn */
        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            padding: 12px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        button:hover {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        /* Túi đồ */
        .inventory {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #666;
        }

        .inventory span {
            color: var(--accent);
            margin-left: 10px;
            font-weight: bold;
        }

        /* Hiệu ứng nháy đỏ khi sai */
        .flash-error {
            animation: flash 0.3s;
        }
        @keyframes flash {
            50% { background: #500; }
        }
    </style>
</head>
<body>

    <div class="game-screen">
        <div class="room-view" id="visual">🚪</div>
        
        <div class="dialog-box" id="text-display">
            Bạn tỉnh dậy trong một căn phòng lạnh lẽo. Cửa chính đã khóa chặt. Có một chiếc hộp sáu và một bức thư trên bàn.
        </div>

        <div class="choices" id="choice-container">
            </div>

        <div class="inventory" id="inventory">
            HÀNH TRANG: <span id="items">Chưa có gì</span>
        </div>
    </div>

    <script>
        let inventory = [];
        const textDisplay = document.getElementById('text-display');
        const choiceContainer = document.getElementById('choice-container');
        const visual = document.getElementById('visual');
        const itemsList = document.getElementById('items');

        // Các trạng thái của trò chơi
        const scenes = {
            start: {
                text: "Bạn đang ở giữa phòng. Cửa ra vào cần chìa khóa vàng. Trên bàn có một 'Bức thư' và một 'Hộp sắt' cũ.",
                visual: "🪑",
                choices: [
                    { text: "Đọc bức thư", next: "readLetter" },
                    { text: "Mở hộp sắt", next: "checkBox" }
                ]
            },
            readLetter: {
                text: "Bức thư viết: 'Mã số ẩn giấu trong số lượng cạnh của một hình tam giác và một hình vuông'.",
                visual: "📜",
                choices: [
                    { text: "Quay lại", next: "start" }
                ]
            },
            checkBox: {
                text: "Hộp sắt yêu cầu mã số gồm 2 chữ số (Cạnh Tam Giác + Cạnh Hình Vuông).",
                visual: "📦",
                choices: [
                    { text: "Nhập mã '34'", next: "openBox" },
                    { text: "Nhập mã '77'", next: "failBox" },
                    { text: "Quay lại", next: "start" }
                ]
            },
            openBox: {
                text: "Cạch! Hộp mở ra, bên trong có một 'Chìa khóa vàng'.",
                visual: "🗝️",
                onEnter: () => addInventory("Chìa khóa vàng"),
                choices: [
                    { text: "Đến cửa chính", next: "atDoor" }
                ]
            },
            failBox: {
                text: "Sai mã rồi. Có vẻ bạn chưa đọc kỹ gợi ý.",
                visual: "❌",
                choices: [
                    { text: "Thử lại", next: "checkBox" }
                ]
            },
            atDoor: {
                text: "Bạn đứng trước cánh cửa gỗ nặng nề.",
                visual: "🚪",
                choices: [
                    { text: "Dùng chìa khóa", next: "escape" },
                    { text: "Quay lại bàn", next: "start" }
                ]
            },
            escape: {
                text: "Chúc mừng! Bạn đã thoát khỏi căn phòng bí ẩn.",
                visual: "🌤️",
                choices: [
                    { text: "Chơi lại", next: "start", onEnter: () => inventory = [] }
                ]
            }
        };

        function addInventory(item) {
            if (!inventory.includes(item)) {
                inventory.push(item);
                itemsList.innerText = inventory.join(", ");
            }
        }

        function renderScene(sceneKey) {
            const scene = scenes[sceneKey];
            
            // Hiệu ứng chữ máy đánh chữ
            textDisplay.innerText = "";
            let i = 0;
            const typeWriter = setInterval(() => {
                textDisplay.innerText += scene.text.charAt(i);
                i++;
                if (i >= scene.text.length) clearInterval(typeWriter);
            }, 20);

            visual.innerText = scene.visual;
            choiceContainer.innerHTML = "";

            if (scene.onEnter) scene.onEnter();

            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.innerText = choice.text;
                btn.onclick = () => {
                    if (sceneKey === 'atDoor' && choice.text === 'Dùng chìa khóa' && !inventory.includes('Chìa khóa vàng')) {
                        alert("Bạn cần chìa khóa!");
                    } else {
                        renderScene(choice.next);
                    }
                };
                choiceContainer.appendChild(btn);
            });
        }

        // Bắt đầu game
        renderScene('start');
    </script>
</body>
</html>

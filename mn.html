<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ASYLUM - FINAL RECKONING</title>
    <style>
        :root { --r: #ff0000; --b: #000; --g: #1a1a1a; }
        body { background: var(--b); color: #ccc; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .crt::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05)); z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        .wrapper { width: 95%; max-width: 1100px; display: grid; grid-template-columns: 1fr 320px; gap: 10px; height: 95vh; position: relative; }
        .view { background: #000; border: 1px solid #333; padding: 20px; display: flex; flex-direction: column; position: relative; }
        #visual { font-size: 120px; flex-grow: 1; display: flex; align-items: center; justify-content: center; text-shadow: 0 0 20px var(--r); }
        #dialog { font-size: 15px; height: 140px; border-top: 1px solid #222; padding: 15px; overflow-y: auto; color: #999; }
        .sidebar { background: #050505; border: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .stat { margin-bottom: 10px; }
        .label { font-size: 11px; color: var(--r); font-weight: bold; margin-bottom: 5px; }
        .bar { width: 100%; height: 6px; background: #111; border: 1px solid #222; }
        .fill { height: 100%; background: var(--r); transition: 0.3s; box-shadow: 0 0 10px var(--r); }
        .box { font-size: 12px; background: #000; border: 1px solid #1a1a1a; padding: 8px; height: 120px; overflow-y: auto; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { background: #000; border: 1px solid #444; color: #aaa; padding: 12px; cursor: pointer; font-family: inherit; font-size: 11px; text-transform: uppercase; }
        button:hover:not(:disabled) { border-color: var(--r); color: #fff; background: #1a0000; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }
        .glitch { animation: shake 0.1s infinite; filter: hue-rotate(90deg) contrast(150%); }
        @keyframes shake { 0%{transform:translate(2px,2px)} 50%{transform:translate(-2px,-1px)} 100%{transform:translate(0,0)} }
        .flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--r); z-index: 50; display: none; }
    </style>
</head>
<body class="crt">
    <div class="flash" id="flash-effect"></div>
    <div class="wrapper">
        <div class="view">
            <div id="visual">🏚️</div>
            <div id="dialog">Khởi tạo giao diện thám tử... Mọi hành động đều có hậu quả.</div>
            <div class="controls" id="choices"></div>
        </div>
        <div class="sidebar">
            <div class="stat"><div class="label">SANITY (TÂM LÝ)</div><div class="bar"><div id="s-bar" class="fill" style="width: 100%"></div></div></div>
            <div class="stat"><div class="label">DANGER (NGUY HIỂM)</div><div class="bar"><div id="d-bar" class="fill" style="width: 0%; background: #ffaa00"></div></div></div>
            <div class="label">TÚI ĐỒ</div><div class="box" id="inv"></div>
            <div class="label">DỮ LIỆU THU THẬP</div><div class="box" id="logs"></div>
            <button onclick="location.reload()" style="margin-top:auto; font-size: 9px; padding: 5px;">RESET GAME</button>
        </div>
    </div>

    <script>
        let s = { sanity: 100, danger: 0, inv: new Set(), logs: [], code: ["?", "?", "?"], killedBy: "" };

        const scenes = {
            // TẦNG 1: SẢNH
            start: {
                txt: "Bạn đang ở sảnh chính. Có một chiếc máy quay CCTV cũ và lối đi xuống Tầng Hầm. Cánh cửa sân thượng ở phía trên yêu cầu mã 3 số.",
                vis: "🏥",
                btns: [
                    { t: "Soi Camera", next: "cctv" },
                    { t: "Xuống Tầng Hầm", next: "basement_entry" },
                    { t: "Lên Tầng 2", next: "floor2_hallway" }
                ]
            },
            cctv: {
                txt: "Màn hình chập chờn hiện lên cảnh một bệnh nhân đang vẽ số '7' lên tường bằng máu. Đó là số đầu tiên của mật mã.",
                vis: "📺",
                onEnter: () => { addLog("Số thứ 1: 7"); s.code[0] = "7"; },
                btns: [{ t: "Quay lại", next: "start" }]
            },
            // TẦNG HẦM: NHÀ XÁC
            basement_entry: {
                txt: "Không khí ở đây lạnh đến buốt xương. Tiếng cửa sắt va đập đều đặn. Có phòng Lò Hơi và Nhà Xác.",
                vis: "📉",
                onEnter: () => { s.danger += 10; },
                btns: [
                    { t: "Vào Nhà Xác", next: "morgue" },
                    { t: "Phòng Lò Hơi", next: "boiler" },
                    { t: "Lên Sảnh", next: "start" }
                ]
            },
            morgue: {
                txt: "Một cái xác trên bàn phẫu thuật. Trong tay nó nắm chặt một mẩu giấy ghi số '2'.",
                vis: "⚰️",
                onEnter: () => { s.code[1] = "2"; addLog("Số thứ 2: 2"); s.sanity -= 10; },
                btns: [{ t: "Rời đi", next: "basement_entry" }]
            },
            boiler: {
                txt: "Sức nóng kinh người. Bạn tìm thấy một thanh sắt rỉ sét. Nó có thể dùng làm vũ khí.",
                vis: "🔥",
                onEnter: () => { addInv("Thanh Sắt"); },
                btns: [{ t: "Rời đi", next: "basement_entry" }]
            },
            // TẦNG 2: PHÒNG MỔ
            floor2_hallway: {
                txt: "Hành lang Tầng 2. Kẻ Sát Nhân đang lảng vảng ở đây! Bạn cần trốn nhanh.",
                vis: "👣",
                onEnter: () => { s.danger += 30; },
                btns: [
                    { t: "Nấp vào Tủ", next: "hide_closet" },
                    { t: "Dùng Thanh Sắt chiến đấu", next: "fight", req: "Thanh Sắt" }
                ]
            },
            hide_closet: {
                txt: "Bạn nín thở. Hắn đi ngang qua, lưỡi rìu quệt xuống sàn tạo tiếng rít ghê người. Hắn bỏ rơi một tấm thẻ có ghi số '5'.",
                vis: "🚪",
                onEnter: () => { s.code[2] = "5"; addLog("Số thứ 3: 5"); s.danger = 5; },
                btns: [{ t: "Ra ngoài", next: "start" }]
            },
            fight: {
                txt: "Bạn lao ra! Một cú đánh trúng đầu hắn. Hắn lảo đảo lùi lại nhưng bạn cũng bị thương nặng. Chạy ngay!",
                vis: "🩸",
                onEnter: () => { s.sanity -= 40; s.danger = 0; triggerFlash(); },
                btns: [{ t: "Chạy xuống sảnh", next: "start" }]
            },
            // CÁI KẾT
            final_door: {
                txt: "Bạn đứng trước cánh cửa dẫn lên sân thượng. Nhập mã 3 chữ số để thoát thân.",
                vis: "🔐",
                btns: [
                    { t: "Nhập 7-2-5", next: "win" },
                    { t: "Nhập 1-2-3", next: "death_wrong" },
                    { t: "Quay lại", next: "start" }
                ]
            },
            win: {
                txt: "Gió trời lồng lộng! Trực thăng cứu hộ đã đến. Bạn thoát chết trong gang tấc!",
                vis: "🚁",
                btns: [{ t: "CHƠI LẠI", next: "start", reset: true }]
            },
            death_wrong: {
                txt: "Mã sai! Còi báo động vang lên. Hắn xuất hiện ngay sau lưng bạn...",
                vis: "🪓",
                btns: [{ t: "KẾT THÚC", next: "death" }]
            },
            death: {
                txt: "Trò chơi kết thúc. Bạn đã trở thành một phần của bệnh viện Asylum.",
                vis: "💀",
                btns: [{ t: "HỒI SINH", next: "start", reset: true }]
            }
        };

        function addInv(it) { s.inv.add(it); renderInv(); }
        function renderInv() { document.getElementById('inv').innerHTML = Array.from(s.inv).map(i=>`<div style='color:#888'>• ${i}</div>`).join(''); }
        function addLog(m) { s.logs.push(m); let b = document.getElementById('logs'); b.innerHTML = s.logs.map(l=>`<div style='margin-bottom:5px'>> ${l}</div>`).join(''); b.scrollTop = b.scrollHeight; }
        function triggerFlash() { let f = document.getElementById('flash-effect'); f.style.display='block'; setTimeout(()=>f.style.display='none',100); }

        function updateUI() {
            document.getElementById('s-bar').style.width = s.sanity + "%";
            document.getElementById('d-bar').style.width = s.danger + "%";
            if(s.danger > 60 || s.sanity < 30) document.getElementById('visual').classList.add('glitch');
            else document.getElementById('visual').classList.remove('glitch');
        }

        function render(key) {
            const sc = scenes[key];
            if(sc.reset) { s={sanity:100,danger:0,inv:new Set(),logs:[],code:["?","?","?"]}; document.getElementById('inv').innerHTML=""; document.getElementById('logs').innerHTML=""; }
            
            // Logic đặc biệt: Nếu đủ mã thì thêm nút thoát
            if(key === 'start' && !s.code.includes("?")) {
                sc.btns.push({ t: "MỞ CỬA THOÁT HIỂM (MÃ 725)", next: "final_door" });
            }

            document.getElementById('visual').innerText = sc.vis;
            document.getElementById('dialog').innerText = sc.txt;
            let c = document.getElementById('choices'); c.innerHTML = "";

            if(sc.onEnter) sc.onEnter();

            sc.btns.forEach(b => {
                let btn = document.createElement('button');
                btn.innerText = b.t;
                if(b.req && !s.inv.has(b.req)) btn.disabled = true;
                btn.onclick = () => {
                    s.sanity -= 2; s.danger += 2; updateUI();
                    if(s.sanity <= 0 || s.danger >= 100) render('death');
                    else render(b.next);
                };
                c.appendChild(btn);
            });
            updateUI();
        }

        setInterval(() => { if(s.sanity > 0) { s.sanity -= 0.5; updateUI(); if(s.sanity <= 0) render('death'); } }, 3000);
        render('start');
    </script>
</body>
</html>

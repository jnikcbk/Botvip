<!DOCTYPE html>
<html lang="vi">
    
<head>
    <meta charset="UTF-8">
    <title>ZEN_UNIVERSE_v1.0</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background-color: #050505;
            cursor: none; /* Ẩn chuột thật để dùng chuột ảo */
        }

        #canvas { display: block; }

        #instructions {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.2);
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            letter-spacing: 5px;
            pointer-events: none;
            text-transform: uppercase;
            transition: opacity 2s;
        }

        /* Chuột ảo nghệ thuật */
        #cursor {
            position: fixed;
            width: 40px; height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            transition: transform 0.1s ease-out;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="instructions">CLICK ĐỂ TẠO RA ÂM THANH & ÁNH SÁNG</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        const instructions = document.getElementById('instructions');

        let width, height;
        let particles = [];
        const mouse = { x: -1000, y: -1000, active: false };

        // 1. Khởi tạo kích thước
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 2. Đối tượng Hạt
        class Particle {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 0.5;
                this.color = `hsl(${Math.random() * 60 + 180}, 70%, 70%)`; // Tông xanh dương/cyan
                this.alpha = Math.random() * 0.5 + 0.2;
            }

            update() {
                // Lực hút từ chuột
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 200) {
                    const force = (200 - distance) / 2000;
                    this.vx += dx * force;
                    this.vy += dy * force;
                }

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98; // Ma sát
                this.vy *= 0.98;

                // Quay lại màn hình nếu ra ngoài
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
            }
        }

        // Tạo 300 hạt ban đầu
        for (let i = 0; i < 300; i++) particles.push(new Particle());

        // 3. Audio Engine (Dùng Web Audio API tạo nhạc không cần file)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1.5);
        }

        // 4. Sự kiện chuột
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            cursor.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
            
            // Xóa hướng dẫn khi người dùng di chuyển chuột
            if (!mouse.active) {
                instructions.style.opacity = '0';
                mouse.active = true;
            }
        });

        window.addEventListener('mousedown', () => {
            // Click tạo âm thanh dựa trên vị trí chuột (tần số thấp bên trái, cao bên phải)
            const freq = 200 + (mouse.x / width) * 600;
            playNote(freq);
            
            // Đẩy hạt ra xa khi click
            particles.forEach(p => {
                const dx = p.x - mouse.x;
                const dy = p.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 300) {
                    p.vx = (dx / dist) * 10;
                    p.vy = (dy / dist) * 10;
                }
            });
            cursor.style.transform += ' scale(1.5)';
            setTimeout(() => cursor.style.transform = cursor.style.transform.replace(' scale(1.5)', ''), 100);
        });

        // 5. Vòng lặp chính
        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)'; // Hiệu ứng đuôi mờ
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Vẽ các đường nối nhẹ nhàng
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 80) {
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                    }
                }
            }
            ctx.stroke();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>

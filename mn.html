<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ASYLUM - DARK DETECTIVE</title>
    <style>
        :root {
            --red: #ff0000;
            --dark: #0a0a0a;
            --gray: #222;
        }

        body {
            background: var(--dark);
            color: #eee;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Hiệu ứng màn hình nhiễu */
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; z-index: 100;
        }

        .game-wrapper {
            width: 90%; max-width: 800px;
            display: grid; grid-template-columns: 1fr 250px; gap: 20px;
        }

        .main-view {
            background: #000; border: 2px solid var(--gray); padding: 20px;
            position: relative; box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        #visual {
            font-size: 120px; height: 250px; display: flex;
            align-items: center; justify-content: center;
            text-shadow: 0 0 20px var(--red);
        }

        #dialog {
            font-size: 16px; min-height: 100px; border-top: 1px solid var(--gray);
            padding-top: 15px; margin-top: 10px; color: #bbb;
        }

        /* Sidebar: Inventory & Stats */
        .sidebar {
            background: #111; border: 1px solid var(--gray); padding: 15px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .stat-label { font-size: 12px; color: var(--red); margin-bottom: 5px; }
        .bar-bg { width: 100%; height: 10px; background: #000; border: 1px solid #333; }
        .bar-fill { height: 100%; background: var(--red); transition: 0.5s; }

        .item-slot {
            font-size: 12px; padding: 5px; border-bottom: 1px solid #222;
            color: #888; display: block;
        }

        /* Điều khiển */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button {
            background: transparent; border: 1px solid #444; color: #aaa;
            padding: 12px; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        button:hover { color: #fff; border-color: var(--red); background: rgba(255,0,0,0.1); }

        /* Hiệu ứng kinh dị */
        .glitch { animation: shake 0.1s infinite; filter: invert(1); }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <div class="game-wrapper">
        <div class="main-view">
            <div id="visual">🏚️</div>
            <div id="dialog">Khởi động hệ thống thám tử... Đang quét phòng...</div>
            <div class="controls" id="choices"></div>
        </div>

        <div class="sidebar">
            <div>
                <div class="stat-label">TÂM LÝ (SANITY)</div>
                <div class="bar-bg"><div id="sanity-bar" class="bar-fill" style="width: 100%"></div></div>
            </div>
            <div>
                <div class="stat-label">HÀNH TRANG</div>
                <div id="inventory-list">
                    <span class="item-slot">- Trống -</span>
                </div>
            </div>
            <div>
                <div class="stat-label">MANH MỐI (LOGS)</div>
                <div id="logs-list" style="font-size: 10px; color: #555;">- Chưa có -</div>
            </div>
        </div>
    </div>

    <script>
        let state = {
            sanity: 100,
            inv: [],
            logs: [],
            location: 'entrance',
            stalkerDistance: 5 // Càng về 0 càng nguy hiểm
        };

        const scenes = {
            entrance: {
                txt: "Sảnh bệnh viện bỏ hoang. Không khí đặc quánh mùi hóa chất. Có một màn hình Camera cũ còn sáng và một hành lang tối tăm.",
                vis: "🏥",
                btns: [
                    { t: "Xem Camera", next: 'cctv' },
                    { t: "Đi vào Hành lang", next: 'hallway' }
                ]
            },
            cctv: {
                txt: "Màn hình nhiễu hạt. Bạn thấy một bóng người cầm rìu đang kéo lê thứ gì đó ở Phòng Cấp Cứu (Mã: 9-1-1).",
                vis: "📺",
                onEnter: () => addLog("Mã phòng cấp cứu: 911"),
                btns: [{ t: "Quay lại", next: 'entrance' }]
            },
            hallway: {
                txt: "Hành lang dài hun hút. Tiếng nước nhỏ giọt đều đặn. Có tiếng bước chân nặng nề đằng sau bạn!",
                vis: "👣",
                onEnter: () => { state.stalkerDistance -= 1; },
                btns: [
                    { t: "Chạy thật nhanh", next: 'emergency' },
                    { t: "Nấp vào tủ đồ", next: 'hide' }
                ]
            },
            hide: {
                txt: "Bạn nín thở trong tủ. Kẻ đó đi ngang qua, hơi thở hắn phả vào khe cửa. Hắn đã đi xa.",
                vis: "🚪",
                onEnter: () => { state.stalkerDistance = 5; state.sanity -= 10; },
                btns: [{ t: "Ra ngoài", next: 'emergency' }]
            },
            emergency: {
                txt: "Phòng Cấp Cứu. Cửa yêu cầu mã số 3 chữ số để khóa trái ngăn kẻ kia lại.",
                vis: "🔐",
                btns: [
                    { t: "Nhập 911", next: 'win' },
                    { t: "Nhập 666", next: 'death' },
                    { t: "Phá cửa", next: 'death' }
                ]
            },
            win: {
                txt: "Cửa đóng sập! Bạn đã tạm thời an toàn. Nhưng đây mới chỉ là tầng 1...",
                vis: "🏆",
                btns: [{ t: "Chơi lại", next: 'entrance', reset: true }]
            },
            death: {
                txt: "Hắn đã bắt được bạn. Cảm giác lạnh lẽo của lưỡi rìu là thứ cuối cùng bạn nhận thấy.",
                vis: "🪓",
                btns: [{ t: "HỒI SINH", next: 'entrance', reset: true }]
            }
        };

        function addLog(msg) {
            if(!state.logs.includes(msg)) {
                state.logs.push(msg);
                document.getElementById('logs-list').innerHTML = state.logs.map(l => `<div>• ${l}</div>`).join('');
            }
        }

        function updateUI() {
            document.getElementById('sanity-bar').style.width = state.sanity + "%";
            if(state.stalkerDistance <= 1) {
                document.getElementById('visual').classList.add('glitch');
                document.getElementById('dialog').style.color = "var(--red)";
            } else {
                document.getElementById('visual').classList.remove('glitch');
                document.getElementById('dialog').style.color = "#bbb";
            }
        }

        function render(key) {
            const scene = scenes[key];
            if(scene.reset) {
                state = { sanity: 100, inv: [], logs: [], location: 'entrance', stalkerDistance: 5 };
                document.getElementById('logs-list').innerHTML = "- Chưa có -";
            }

            const vis = document.getElementById('visual');
            const dial = document.getElementById('dialog');
            const ctrl = document.getElementById('choices');

            vis.innerText = scene.vis;
            dial.innerText = scene.txt;
            ctrl.innerHTML = "";

            if(scene.onEnter) scene.onEnter();

            scene.btns.forEach(b => {
                const btn = document.createElement('button');
                btn.innerText = b.t;
                btn.onclick = () => {
                    state.sanity -= 2;
                    updateUI();
                    if(state.sanity <= 0) render('death');
                    else render(b.next);
                };
                ctrl.appendChild(btn);
            });
            updateUI();
        }

        // Khởi động
        render('entrance');

        // Loop giảm sanity tự động
        setInterval(() => {
            if(state.sanity > 0) {
                state.sanity -= 1;
                updateUI();
            }
        }, 4000);
    </script>
</body>
</html>

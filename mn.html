<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SILENT MANIAC</title>
    <style>
        :root {
            --red: #800000;
            --dark-red: #330000;
            --blood: #ff0000;
            --bg: #050505;
        }

        body {
            background: var(--bg);
            color: #ccc;
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Hiệu ứng nhiễu màn hình (CRT Scanlines) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            width: 90%;
            max-width: 600px;
            z-index: 5;
            padding: 20px;
            border: 1px solid #222;
            background: rgba(10, 0, 0, 0.9);
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* Khu vực hiển thị tâm linh */
        #visual {
            font-size: 100px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--blood);
            transition: all 0.1s;
        }

        /* Thanh Tâm lý (Sanity) */
        .sanity-border {
            width: 100%;
            height: 4px;
            background: #111;
            margin-bottom: 20px;
        }
        #sanity-bar {
            width: 100%;
            height: 100%;
            background: var(--red);
            transition: width 0.5s;
            box-shadow: 0 0 10px var(--blood);
        }

        #dialog {
            font-size: 18px;
            min-height: 120px;
            margin-bottom: 30px;
            color: #999;
            border-left: 3px solid var(--red);
            padding-left: 15px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            background: transparent;
            border: 1px solid var(--dark-red);
            color: #666;
            padding: 15px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            color: var(--blood);
            border-color: var(--blood);
            background: rgba(50, 0, 0, 0.2);
            text-shadow: 0 0 5px var(--blood);
        }

        /* Hiệu ứng Glitch */
        .glitch {
            animation: glitch 0.2s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(2px, 0); }
            50% { transform: translate(-2px, -1px); filter: hue-rotate(90deg); }
            100% { transform: translate(1px, 1px); }
        }

        .dead {
            color: var(--blood);
            font-size: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container" id="game-ui">
        <div id="visual">👁️</div>
        
        <div class="sanity-border">
            <div id="sanity-bar"></div>
        </div>

        <div id="dialog">...đang khởi động tiềm thức...</div>

        <div class="btn-grid" id="choices">
            </div>
    </div>

    <script>
        let sanity = 100;
        let hasKnife = false;
        let hasKey = false;
        
        const visual = document.getElementById('visual');
        const dialog = document.getElementById('dialog');
        const choices = document.getElementById('choices');
        const sanityBar = document.getElementById('sanity-bar');

        // Giảm tâm lý theo thời gian
        const sanityClock = setInterval(() => {
            if(sanity > 0) {
                sanity -= 2;
                sanityBar.style.width = sanity + "%";
                if(sanity < 30) visual.classList.add('glitch');
            } else {
                clearInterval(sanityClock);
                gameOver("BẠN ĐÃ PHÁT ĐIÊN TRONG BÓNG TỐI.");
            }
        }, 3000);

        const scenes = {
            start: {
                txt: "Bạn tỉnh lại trong căn hầm đẫm mùi rỉ sét. Một cái xác treo trên trần nhà. Trên sàn có một mảnh kính vỡ và một cánh cửa sắt.",
                img: "⛓️",
                btns: [
                    { t: "Nhặt mảnh kính", next: "getKnife" },
                    { t: "Kiểm tra cái xác", next: "checkBody" }
                ]
            },
            getKnife: {
                txt: "Mảnh kính rất sắc. Tay bạn rỉ máu, nhưng giờ bạn đã có vũ khí.",
                img: "🔪",
                onEnter: () => { hasKnife = true; sanity -= 10; },
                btns: [{ t: "Quay lại", next: "start" }]
            },
            checkBody: {
                txt: "Cái xác đột ngột mở mắt! Nó thì thầm: 'Mật mã là số người đã chết ở đây: 4-0-4'. Bạn thấy một chiếc hộp số trên ngực nó.",
                img: "💀",
                btns: [
                    { t: "Nhập 404", next: "openBox" },
                    { t: "Bỏ chạy", next: "start" }
                ]
            },
            openBox: {
                txt: "Hộp mở ra. Bên trong là một chùm chìa khóa dính máu.",
                img: "🔑",
                onEnter: () => { hasKey = true; },
                btns: [{ t: "Đến cửa sắt", next: "ironDoor" }]
            },
            ironDoor: {
                txt: "Cửa sắt lạnh lẽo. Bạn nghe tiếng bước chân nặng nề đang tiến lại gần từ phía sau...",
                img: "🚪",
                btns: [
                    { t: "Dùng chìa khóa", next: "escape" },
                    { t: "Quay lại chiến đấu", next: "fight" }
                ]
            },
            fight: {
                txt: "Bạn lao vào bóng tối với mảnh kính. Nhưng thứ đó không phải con người. Nó bẻ gãy tay bạn trong nháy mắt.",
                img: "🩸",
                btns: [{ t: "CHẾT", next: "death" }]
            },
            escape: {
                txt: "Cửa mở! Bạn lao ra ngoài cánh đồng ngập ánh trăng. Bạn đã sống sót... hay đây chỉ là một giấc mơ khác?",
                img: "🌕",
                btns: [{ t: "KẾT THÚC", next: "start" }]
            }
        };

        function render(key) {
            const s = scenes[key];
            if(key === 'death') return gameOver("BẠN ĐÃ BỊ XẺ THỊT.");

            // Hiệu ứng chuyển cảnh
            document.getElementById('game-ui').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('game-ui').style.opacity = 1;
                visual.innerText = s.img;
                dialog.innerText = s.txt;
                choices.innerHTML = "";

                if(s.onEnter) s.onEnter();

                s.btns.forEach(b => {
                    const btn = document.createElement('button');
                    btn.innerText = b.t;
                    btn.onclick = () => {
                        if(b.next === 'escape' && !hasKey) {
                            dialog.innerText = "Cửa đã khóa. Tiếng bước chân gần hơn... gần hơn...";
                            sanity -= 20;
                        } else {
                            render(b.next);
                        }
                    };
                    choices.appendChild(btn);
                });
            }, 200);
        }

        function gameOver(msg) {
            visual.innerText = "💀";
            visual.classList.add('glitch');
            dialog.innerHTML = `<span class="dead">${msg}</span>`;
            choices.innerHTML = `<button onclick="location.reload()">HỒI SINH</button>`;
            clearInterval(sanityClock);
        }

        render('start');
    </script>
</body>
</html>

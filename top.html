<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaizenMC - Bảng Xếp Hạng Đại Gia</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --gold: #f59e0b;
            --silver: #94a3b8;
            --bronze: #b45309;
            --bg-dark: #020617;
            --card-bg: #1e293b;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
        }

        /* Nav Bar - Giống hệt file Chat để đồng bộ */
        .nav-bar {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #334155;
            overflow-x: auto;
            white-space: nowrap;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-bar::-webkit-scrollbar { display: none; }
        .nav-bar a {
            color: #94a3b8; text-decoration: none; font-weight: 600;
            padding: 8px 14px; border-radius: 8px; font-size: 14px;
        }
        .nav-bar a.active { background: var(--primary); color: white; }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Podium - Bục vinh quang Top 3 */
        .podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 10px;
            margin: 40px 0;
            text-align: center;
        }

        .rank-card {
            background: var(--card-bg);
            border-radius: 12px 12px 8px 8px;
            padding: 15px 5px;
            width: 100px;
            border: 1px solid #334155;
            position: relative;
        }

        .rank-1 { height: 160px; border-color: var(--gold); box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); width: 120px; }
        .rank-2 { height: 130px; border-color: var(--silver); }
        .rank-3 { height: 110px; border-color: var(--bronze); }

        .crown { font-size: 24px; position: absolute; top: -30px; left: 50%; transform: translateX(-50%); }
        .name { font-weight: bold; font-size: 14px; margin-top: 10px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .xu-val { color: var(--gold); font-size: 12px; font-weight: bold; }

        /* Bảng danh sách Top 4-10 */
        .top-list {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .row {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
            transition: 0.3s;
        }
        .row:last-child { border: none; }
        .row:hover { background: rgba(255,255,255,0.02); }

        .num { width: 40px; font-weight: bold; color: var(--text-dim); }
        .user-info { flex: 1; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .user-xu { color: var(--gold); font-weight: bold; }

        /* Mobile */
        @media (max-width: 480px) {
            .rank-card { width: 85px; }
            .rank-1 { width: 100px; }
            .num { width: 30px; }
            .user-info { font-size: 14px; }
        }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html">🏠 Trang chủ</a>
    <a href="shop.html">🛒 Shop</a>
    <a href="nap-xu.html">💳 Nạp Thẻ</a>
    <a href="chattg.html">🌍 Chat Thế Giới</a>
    <a href="top.html" class="active">🏆 Đua Top</a>
</nav>

<div class="container">
    <h2 style="text-align: center; color: var(--gold); letter-spacing: 2px;">🏆 BẢNG XẾP HẠNG ĐẠI GIA</h2>

    <div class="podium" id="podiumArea">
        </div>

    <div class="top-list" id="otherRanks">
        </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsYTU5j-jh4LlHnRez1Tnm5o6Rq-RrSyA",
        databaseURL: "https://kaizenmc-web-ba518-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kaizenmc-web-ba518"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function loadLeaderboard() {
        const podiumArea = document.getElementById("podiumArea");
        const otherRanks = document.getElementById("otherRanks");

        db.ref("users").on("value", snap => {
            let members = [];
            snap.forEach(child => {
                members.push({ name: child.key, xu: child.val().xu || 0 });
            });

            // Sắp xếp Xu từ cao xuống thấp
            members.sort((a, b) => b.xu - a.xu);

            // Xử lý Top 3 (Hiển thị theo thứ tự 2 - 1 - 3 để bục cao nhất ở giữa)
            const t1 = members[0] || {name: "Trống", xu: 0};
            const t2 = members[1] || {name: "Trống", xu: 0};
            const t3 = members[2] || {name: "Trống", xu: 0};

            podiumArea.innerHTML = `
                <div class="rank-card rank-2">
                    <div class="crown">🥈</div>
                    <span class="name">${t2.name}</span>
                    <span class="xu-val">${t2.xu.toLocaleString()}</span>
                </div>
                <div class="rank-card rank-1">
                    <div class="crown">👑</div>
                    <span class="name">${t1.name}</span>
                    <span class="xu-val">${t1.xu.toLocaleString()}</span>
                </div>
                <div class="rank-card rank-3">
                    <div class="crown">🥉</div>
                    <span class="name">${t3.name}</span>
                    <span class="xu-val">${t3.xu.toLocaleString()}</span>
                </div>
            `;

            // Xử lý Top 4 trở đi
            otherRanks.innerHTML = "";
            members.slice(3, 10).forEach((m, i) => {
                otherRanks.innerHTML += `
                    <div class="row">
                        <div class="num">#${i + 4}</div>
                        <div class="user-info">${m.name}</div>
                        <div class="user-xu">${m.xu.toLocaleString()} Xu</div>
                    </div>
                `;
            });
        });
    }

    loadLeaderboard();
</script>

</body>
</html>
